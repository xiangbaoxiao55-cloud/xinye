<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>共读</title>
<style>
:root {
  --pink: #f06292;
  --pink-light: #fce4ec;
  --pink-deep: #e91e8c;
  --blue: #90caf9;
  --bg: #fff9fb;
  --text: #4a4a4a;
  --border: #f8bbd0;
  --radius: 16px;
  --font-size: 16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, 'PingFang SC', sans-serif; background: var(--bg); color: var(--text); height: 100dvh; overflow: hidden; }

/* ---- 页面切换 ---- */
.page { display: none; height: 100dvh; flex-direction: column; }
.page.active { display: flex; }

/* ---- 顶栏 ---- */
.top-bar {
  display: flex; align-items: center; padding: 12px 16px;
  background: white; border-bottom: 1px solid var(--border);
  gap: 10px; min-height: 52px; flex-shrink: 0;
}
.btn-icon {
  background: none; border: none; font-size: 20px; cursor: pointer;
  padding: 4px 6px; border-radius: 8px; color: var(--text);
}
.btn-icon:active { background: var(--pink-light); }
.top-title { flex: 1; font-size: 15px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ---- 书架 ---- */
.shelf-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px 8px; flex-shrink: 0;
}
.shelf-heading { font-size: 20px; font-weight: 700; }
.btn-add {
  background: var(--pink); color: white; border: none;
  border-radius: 20px; padding: 8px 18px; font-size: 14px; cursor: pointer;
}
.book-list {
  flex: 1; overflow-y: auto; padding: 8px 16px 20px;
  display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
  align-items: start;
}
.book-card {
  background: white; border-radius: var(--radius); padding: 14px;
  border: 1px solid var(--border); cursor: pointer; position: relative;
  transition: box-shadow .15s;
}
.book-card:active { box-shadow: 0 2px 12px rgba(240,98,146,.2); }
.book-cover {
  width: 100%; aspect-ratio: 1/1; border-radius: 10px;
  background: linear-gradient(135deg, #fce4ec, #e3f2fd);
  display: flex; align-items: center; justify-content: center;
  font-size: 36px; margin-bottom: 8px;
}
.book-title { font-size: 13px; font-weight: 600; line-height: 1.4; }
.book-author { font-size: 11px; color: #aaa; margin-top: 2px; }
.book-meta { font-size: 11px; color: var(--pink); margin-top: 4px; }
.book-menu-btn {
  position: absolute; top: 8px; right: 8px;
  background: none; border: none; font-size: 16px; color: #bbb; cursor: pointer; padding: 4px;
}
.empty-shelf {
  grid-column: 1/-1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; padding: 60px 0;
  color: #ccc; gap: 12px; font-size: 14px; text-align: center;
}

/* ---- 阅读器 ---- */
.reader-content {
  flex: 1; overflow-y: scroll; padding: 20px 16px 80px 20px;
  line-height: 1.9; font-size: var(--font-size);
  -webkit-user-select: text; user-select: text;
}
.reader-content::-webkit-scrollbar { width: 12px; }
.reader-content::-webkit-scrollbar-track { background: transparent; }
.reader-content::-webkit-scrollbar-thumb {
  background: rgba(0,0,0,.15); border-radius: 3px; min-height: 40px;
}
.reader-content::-webkit-scrollbar-thumb:active { background: rgba(0,0,0,.3); }
.reader-content .chapter-title {
  font-size: 18px; font-weight: 700; margin-bottom: 24px;
  color: var(--pink); line-height: 1.4;
}
.reader-content p { margin-bottom: .9em; }
.annotation-mark {
  cursor: pointer; border-radius: 2px;
}
.reader-footer {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: white; border-top: 1px solid var(--border);
  padding: 6px 8px; display: flex; align-items: center; gap: 4px;
  font-size: 13px; color: var(--text); flex-shrink: 0; height: 48px;
}
.footer-nav-btn {
  background: none; border: none; font-size: 26px; color: var(--pink);
  padding: 0 10px; cursor: pointer; flex-shrink: 0; line-height: 1;
  opacity: 1; transition: opacity .15s;
}
.footer-nav-btn:disabled { opacity: .25; }
.footer-center {
  flex: 1; display: flex; align-items: center; justify-content: center;
  overflow: hidden; cursor: pointer; padding: 4px 0;
}
#footerChap {
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  max-width: 180px; font-size: 13px;
}

/* ---- 选中工具栏 ---- */
#selBar {
  display: none; position: fixed; bottom: 72px;
  left: 50%; transform: translateX(-50%);
  background: #333; color: white; z-index: 100;
  flex-direction: row; gap: 2px;
  padding: 4px 8px; border-radius: 24px;
  white-space: nowrap;
}
#selBar.show { display: flex; }
.sel-btn {
  background: none; border: none; color: white; padding: 8px 14px;
  cursor: pointer; font-size: 14px; border-radius: 20px; white-space: nowrap;
}
.sel-btn:active { background: rgba(255,255,255,.15); }

/* ---- 批注高亮颜色 ---- */
.annotation-mark.user-ann  { background: rgba(240,98,146,.18); border-bottom: 2px solid var(--pink); }
.annotation-mark.xinye-ann { background: rgba(100,181,246,.18); border-bottom: 2px solid #64b5f6; }
.annotation-mark.both-ann  { background: rgba(200,140,220,.15); border-bottom: 2px solid #ba68c8; }

/* ---- 批注弹窗 ---- */
#annModal {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.4); z-index: 200; align-items: flex-end;
}
#annModal.show { display: flex; }
.ann-sheet {
  background: white; border-radius: 24px 24px 0 0; padding: 20px;
  width: 100%; max-height: 72dvh; overflow-y: auto;
}
.ann-quote {
  font-size: 13px; color: #999; border-left: 3px solid var(--pink);
  padding: 6px 10px; margin-bottom: 14px; line-height: 1.6;
  max-height: 72px; overflow: hidden;
}
.ann-input {
  width: 100%; border: 1px solid var(--border); border-radius: 12px;
  padding: 12px; font-size: 15px; resize: none; height: 90px;
  font-family: inherit; outline: none;
}
.ann-input:focus { border-color: var(--pink); }
.ann-actions { display: flex; gap: 8px; margin-top: 12px; }
.btn-save-ann {
  flex: 1; background: var(--pink); color: white; border: none;
  border-radius: 12px; padding: 12px; cursor: pointer; font-size: 15px;
}
.btn-cancel-ann, .btn-del-ann {
  background: #f5f5f5; color: var(--text); border: none;
  border-radius: 12px; padding: 12px 14px; cursor: pointer; font-size: 15px;
}
.btn-del-ann { color: #e57373; }

/* ---- 章节弹窗 ---- */
#chapModal {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.4); z-index: 200;
}
#chapModal.show { display: flex; flex-direction: column; }
.chap-sheet {
  margin-top: auto; background: white;
  border-radius: 24px 24px 0 0; height: 70dvh; display: flex; flex-direction: column;
}
.chap-header { padding: 18px 20px; font-weight: 700; font-size: 15px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.chap-list { flex: 1; overflow-y: auto; }
.chap-item {
  padding: 13px 20px; border-bottom: 1px solid #f5f5f5;
  cursor: pointer; font-size: 14px; display: flex; align-items: center; gap: 8px;
}
.chap-item.active { color: var(--pink); font-weight: 600; }
.chap-item:active { background: var(--pink-light); }
.chap-ann-badge {
  margin-left: auto; background: var(--pink); color: white;
  font-size: 10px; border-radius: 10px; padding: 1px 6px; flex-shrink: 0;
}

/* ---- 上传弹窗 ---- */
#uploadModal {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.4); z-index: 200;
  align-items: center; justify-content: center;
}
#uploadModal.show { display: flex; }
.upload-sheet {
  background: white; border-radius: 24px; padding: 24px;
  width: calc(100% - 48px); max-width: 380px;
}
.upload-title { font-size: 17px; font-weight: 700; margin-bottom: 16px; }
.upload-zone {
  border: 2px dashed var(--border); border-radius: 14px; padding: 28px 16px;
  text-align: center; cursor: pointer; color: #bbb; font-size: 14px; line-height: 1.8;
}
.upload-zone:active { border-color: var(--pink); color: var(--pink); }
.btn-close-modal {
  width: 100%; margin-top: 14px; background: #f5f5f5;
  border: none; border-radius: 12px; padding: 12px; cursor: pointer; font-size: 15px;
}

/* ---- 书籍菜单 ---- */
#bookMenuModal {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.4); z-index: 200; align-items: flex-end;
}
#bookMenuModal.show { display: flex; }
.book-menu-sheet {
  background: white; border-radius: 24px 24px 0 0; padding: 16px;
  width: 100%;
}
.book-menu-title { font-size: 14px; color: #999; padding: 8px 8px 12px; }
.menu-item {
  padding: 14px 12px; font-size: 15px; cursor: pointer; border-radius: 12px;
}
.menu-item:active { background: var(--pink-light); }
.menu-item.danger { color: #e57373; }

/* ---- 问炘也弹窗 ---- */
#askModal {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.4); z-index: 200; align-items: flex-end;
}
#askModal.show { display: flex; }

/* ---- 批注汇总弹窗 ---- */
#annListModal {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.4); z-index: 200;
}
#annListModal.show { display: flex; flex-direction: column; }
.ann-list-chapter {
  padding: 8px 16px 4px; font-size: 11px; color: #aaa;
  font-weight: 600; text-transform: uppercase; letter-spacing: .5px;
  background: var(--bg); position: sticky; top: 0;
}
.ann-list-item {
  padding: 10px 16px; border-bottom: 1px solid #f5f5f5; cursor: pointer;
}
.ann-list-item:active { background: var(--pink-light); }
.ann-list-quote {
  font-size: 12px; color: var(--pink); border-left: 2px solid var(--pink);
  padding-left: 7px; margin-bottom: 4px; line-height: 1.5;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.ann-list-note { font-size: 13px; color: var(--text); line-height: 1.6; }
.ann-list-xinye { font-size: 12px; color: #64b5f6; margin-top: 3px; line-height: 1.5; }
body.dark .ann-list-item { border-bottom-color: #2a2a42; }
body.dark .ann-list-chapter { background: var(--bg); }
.ann-xinye-note {
  background: #f0f7ff; border-radius: 12px; padding: 10px;
  font-size: 13px; color: #3a3a5a; margin-top: 10px; line-height: 1.8; white-space: pre-wrap;
}
body.dark .ann-xinye-note { background: #1e2a3a; color: #b0c8e8; }

/* ---- 书架菜单 ---- */
#shelfMenuModal {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.4); z-index: 200; align-items: flex-end;
}
#shelfMenuModal.show { display: flex; }

/* ---- 封面选择 ---- */
#coverModal {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.4); z-index: 200; align-items: flex-end;
}
#coverModal.show { display: flex; }
.cover-emoji-btn {
  font-size: 28px; border: none; background: none; cursor: pointer;
  border-radius: 10px; padding: 6px; text-align: center; line-height: 1;
}
.cover-emoji-btn:active { background: var(--pink-light); }

/* ---- loading ---- */
#loadingMask {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.5); z-index: 999;
  align-items: center; justify-content: center;
  flex-direction: column; gap: 12px; color: white; font-size: 16px;
}
#loadingMask.show { display: flex; }
.spinner {
  width: 36px; height: 36px; border: 3px solid rgba(255,255,255,.3);
  border-top-color: white; border-radius: 50%; animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ---- 小按钮（A- A+） ---- */
.btn-sm { font-size: 12px !important; padding: 4px 5px !important; font-weight: 600; }

/* ---- 进度滑块 ---- */
.prog-slider {
  flex: 1; height: 3px; -webkit-appearance: none; appearance: none;
  border-radius: 2px; outline: none; cursor: pointer; padding: 0;
  background: #f0f0f0;
}
.prog-slider::-webkit-slider-thumb {
  -webkit-appearance: none; width: 14px; height: 14px;
  border-radius: 50%; background: var(--pink); cursor: pointer;
}
.prog-slider::-moz-range-thumb {
  width: 14px; height: 14px; border-radius: 50%;
  background: var(--pink); border: none; cursor: pointer;
}

/* ---- 夜间模式 ---- */
body.dark {
  --bg: #1a1a2e; --text: #d0d0e0; --border: #333355; --pink-light: #2d1e2a;
}
body.dark .top-bar,
body.dark .reader-footer { background: #22223a; }
body.dark .book-card { background: #22223a; }
body.dark .book-cover { background: linear-gradient(135deg, #2d1e2a, #1e2a3a); }
body.dark .shelf-header { background: #22223a; border-bottom-color: #333355; }
body.dark .ann-sheet,
body.dark .chap-sheet,
body.dark .upload-sheet,
body.dark .book-menu-sheet { background: #22223a; }
body.dark .ann-input { background: #1a1a2e; color: var(--text); }
body.dark #askReply { background: #1e2a3a; color: #b0c8e8; }
body.dark .btn-cancel-ann,
body.dark .btn-del-ann,
body.dark .btn-close-modal { background: #2a2a42; color: var(--text); }
body.dark .chap-item { border-bottom-color: #2a2a42; }
body.dark .prog-slider { background: #2e2e4a; }
body.dark .reader-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,.2); }
body.dark .reader-content::-webkit-scrollbar-thumb:active { background: rgba(255,255,255,.35); }
body.dark .footer-center { color: var(--text); }
</style>
</head>
<body>

<!-- 书架 -->
<div class="page active" id="shelfPage">
  <div class="shelf-header">
    <div style="display:flex;align-items:center;gap:6px">
      <button class="btn-icon" onclick="goHome()">←</button>
      <span class="shelf-heading">🍓 书架</span>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <button class="btn-icon" id="btnDarkShelf" onclick="toggleDark()" title="暗夜模式"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M20 14.12A8 8 0 119.88 4a6 6 0 0010.12 10.12z" fill="currentColor" opacity="0.25" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><circle cx="18.5" cy="5" r="1.2" fill="currentColor"/><circle cx="21" cy="8.5" r="0.8" fill="currentColor"/></svg></button>
      <button class="btn-icon" onclick="openShelfMenu()" style="font-size:18px">⋯</button>
      <button class="btn-add" onclick="openUpload()">＋ 添加书</button>
    </div>
  </div>
  <div class="book-list" id="bookList"></div>
</div>

<!-- 阅读器 -->
<div class="page" id="readerPage">
  <div class="top-bar">
    <button class="btn-icon" onclick="goShelf()">←</button>
    <div class="top-title" id="readerTitle"></div>
    <button class="btn-icon btn-sm" onclick="changeFontSize(-1)" title="字小一点">A-</button>
    <button class="btn-icon btn-sm" onclick="changeFontSize(1)" title="字大一点">A+</button>
    <button class="btn-icon" onclick="toggleDark()" id="btnDark" title="夜间模式"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M20 14.12A8 8 0 119.88 4a6 6 0 0010.12 10.12z" fill="currentColor" opacity="0.25" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><circle cx="18.5" cy="5" r="1.2" fill="currentColor"/><circle cx="21" cy="8.5" r="0.8" fill="currentColor"/></svg></button>
    <button class="btn-icon" onclick="openChapters()" title="目录"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M4 6h16M4 12h16M4 18h10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg></button>
    <button class="btn-icon" onclick="openAnnList()" title="所有批注"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M17 3a2.83 2.83 0 114 4L8 19l-5 1 1-5L17 3z" fill="currentColor" opacity="0.2" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg></button>
    <button class="btn-icon" onclick="archiveToMemory()" title="整理进记忆"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z" fill="currentColor" opacity="0.2" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg></button>
    <button class="btn-icon" onclick="sendCurrentToChat()" title="发给炘也" style="color:var(--pink)"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" fill="currentColor" opacity="0.2" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><circle cx="9" cy="10" r="1.2" fill="currentColor"/><circle cx="12" cy="10" r="1.2" fill="currentColor"/><circle cx="15" cy="10" r="1.2" fill="currentColor"/></svg></button>
  </div>
  <div class="reader-content" id="readerContent"
       onmouseup="onSelect()" ontouchend="onSelect()"></div>
  <div class="reader-footer">
    <button class="footer-nav-btn" onclick="prevChapter()" id="btnPrevChap">‹</button>
    <div class="footer-center" onclick="openChapters()">
      <span id="footerChap"></span>
      <span id="footerPct" style="color:#aaa;font-size:11px;margin-left:6px"></span>
    </div>
    <button class="footer-nav-btn" onclick="nextChapter()" id="btnNextChap">›</button>
  </div>
</div>

<!-- 选中工具栏 -->
<div id="selBar">
  <button class="sel-btn" onclick="doAnnotate()">✏️ 批注</button>
  <button class="sel-btn" onclick="doAskXinye()">💙 问炘也</button>
  <button class="sel-btn" onclick="clearSel()">✕</button>
</div>

<!-- 批注弹窗 -->
<div id="annModal">
  <div class="ann-sheet">
    <div class="ann-quote" id="annQuote"></div>
    <textarea class="ann-input" id="annInput" placeholder="写下你的想法……"></textarea>
    <div class="ann-actions">
      <button class="btn-cancel-ann" onclick="closeAnn()">取消</button>
      <button class="btn-del-ann" id="btnDelAnn" onclick="deleteAnn()" style="display:none">删除</button>
      <button class="btn-save-ann" style="background:#64b5f6" id="btnAskFromAnn" onclick="askFromAnnotation()" style="display:none">💙 问炘也</button>
      <button class="btn-save-ann" onclick="saveAnn()">保存</button>
    </div>
  </div>
</div>

<!-- 问炘也弹窗 -->
<div id="askModal">
  <div class="ann-sheet">
    <div style="font-size:13px;color:#999;margin-bottom:10px">💙 问炘也</div>
    <div class="ann-quote" id="askQuote"></div>
    <div id="askReply" style="display:none;background:#f0f7ff;border-radius:12px;padding:12px;font-size:14px;line-height:1.8;margin-bottom:12px;color:#3a3a5a;white-space:pre-wrap"></div>
    <div id="askLoading" style="display:none;text-align:center;padding:16px;color:#90caf9;font-size:14px">炘也在想……</div>
    <div class="ann-actions" id="askActions">
      <button class="btn-cancel-ann" onclick="closeAsk()">取消</button>
      <button class="btn-save-ann" onclick="doAsk()">问他</button>
    </div>
    <div class="ann-actions" id="askSaveActions" style="display:none">
      <button class="btn-cancel-ann" onclick="closeAsk()">关闭</button>
      <button class="btn-save-ann" style="background:#64b5f6" onclick="saveAskReply()">存进书里 💙</button>
    </div>
  </div>
</div>

<!-- 章节弹窗 -->
<div id="chapModal" onclick="closeChapters()">
  <div class="chap-sheet" onclick="event.stopPropagation()">
    <div class="chap-header">目录</div>
    <div class="chap-list" id="chapList"></div>
  </div>
</div>

<!-- 批注汇总弹窗 -->
<div id="annListModal" onclick="closeAnnList()">
  <div class="chap-sheet" onclick="event.stopPropagation()">
    <div class="chap-header" style="display:flex;align-items:center;justify-content:space-between">
      <span>📝 所有批注</span>
      <span id="annListCount" style="font-size:12px;color:#aaa;font-weight:400"></span>
    </div>
    <div class="chap-list" id="annListContent"></div>
  </div>
</div>

<!-- 上传弹窗 -->
<div id="uploadModal">
  <div class="upload-sheet">
    <div class="upload-title">📥 添加书籍</div>
    <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
      <div style="font-size:40px;margin-bottom:8px">📖</div>
      <div>点击选择文件</div>
      <div style="font-size:12px;color:#ccc;margin-top:4px">支持 .epub / .txt</div>
    </div>
    <input type="file" id="fileInput" accept=".epub,.txt" hidden>
    <button class="btn-close-modal" onclick="closeUpload()">取消</button>
  </div>
</div>

<!-- 书籍菜单 -->
<div id="bookMenuModal" onclick="closeBookMenu()">
  <div class="book-menu-sheet" onclick="event.stopPropagation()">
    <div class="book-menu-title" id="bookMenuTitle"></div>
    <div class="menu-item" onclick="menuEditTitle()">✏️ 编辑书名 / 作者</div>
    <div class="menu-item" onclick="menuChangeCover()">🎨 换封面</div>
    <div class="menu-item" onclick="menuExport()">📤 导出（含批注）</div>

<script>
// ==================== DB ====================
let db;
function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open('ReadingDB', 1);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('books'))       d.createObjectStore('books', { keyPath: 'id' });
      if (!d.objectStoreNames.contains('chapters'))    d.createObjectStore('chapters', { keyPath: 'bookId' });
      if (!d.objectStoreNames.contains('annotations')) d.createObjectStore('annotations', { keyPath: 'bookId' });
    };
    req.onsuccess = e => { db = e.target.result; res(); };
    req.onerror = rej;
  });
}
const dbOp = (store, mode, fn) => new Promise((res, rej) => {
  const tx = db.transaction(store, mode);
  const s = tx.objectStore(store);
  const r = fn(s); r.onsuccess = e => res(e.target.result); r.onerror = rej;
});
const dbGet    = (store, key) => dbOp(store, 'readonly',  s => s.get(key));
const dbPut    = (store, val) => dbOp(store, 'readwrite', s => s.put(val));
const dbDel    = (store, key) => dbOp(store, 'readwrite', s => s.delete(key));
const dbGetAll = (store)      => dbOp(store, 'readonly',  s => s.getAll());

// ==================== STATE ====================

let curBook = null, curChapters = [], curChapterIdx = 0, curAnns = [];
let pendingSel = null, editingAnnId = null;

// ==================== UPLOAD ====================

document.getElementById('fileInput').onchange = async function() {

    const isTxt  = name.endsWith('.txt')  || file.type === 'text/plain';
    if (isEpub) await parseEpub(file);
    else if (isTxt) await parseTxt(file);
    else alert('只支持 .epub 和 .txt（当前文件：' + (file.name||'未知') + '，类型：' + (file.type||'未知') + '）');
  } catch(e) { alert('解析失败：' + e.message); console.error(e); }
  hideLoading();
  renderShelf();
};

// ==================== EPUB ====================
async function parseEpub(file) {
  const zip = await JSZip.loadAsync(file);
  const containerXml = await zip.file('META-INF/container.xml').async('string');
  const opfPath = containerXml.match(/full-path="([^"]+\.opf)"/)?.[1];
  if (!opfPath) throw new Error('找不到 OPF 文件');
  const opfDir = opfPath.includes('/') ? opfPath.slice(0, opfPath.lastIndexOf('/')+1) : '';
  const opfXml = await zip.file(opfPath).async('string');

  const title  = opfXml.match(/<dc:title[^>]*>([^<]+)<\/dc:title>/)?.[1]?.trim()   || file.name.replace(/\.epub$/i,'');
  const author = opfXml.match(/<dc:creator[^>]*>([^<]+)<\/dc:creator>/)?.[1]?.trim() || '';

  // 逐个 <item> 标签解析，记录 properties（用于识别 nav 文件）
  const manifest = {};
  for (const m of opfXml.matchAll(/<item\b([^>]+)>/gi)) {
    const attrs = m[1];
    const idM    = attrs.match(/\bid="([^"]+)"/);
    const hrefM  = attrs.match(/\bhref="([^"]+)"/);
    const mediaM = attrs.match(/\bmedia-type="([^"]+)"/);
    const propsM = attrs.match(/\bproperties="([^"]+)"/);
    if (idM && hrefM) manifest[idM[1]] = { href: hrefM[1], media: mediaM?.[1] || '', props: propsM?.[1] || '' };
  }

  // 路径解析：处理相对路径和URL编码
  function resolveHref(base, href) {
    href = decodeURIComponent(href).split('#')[0];
    if (!base || href.startsWith('/')) return href;
    return base + href;
  }

  // 从 NCX 提取 href→title 映射（EPUB2）
  const titleMap = {};
  const ncxItem = Object.values(manifest).find(v => v.media.includes('ncx'));
  if (ncxItem) {
    try {
      const ncxPath = resolveHref(opfDir, ncxItem.href);
      const ncxXml = await (zip.file(ncxPath) || zip.file(ncxItem.href))?.async('string') || '';
      for (const m of ncxXml.matchAll(/<navPoint[\s\S]*?<text>([^<]+)<\/text>[\s\S]*?<content\s[^>]*src="([^"#]+)/gi)) {
        const t = m[1].trim(), src = decodeURIComponent(m[2].trim());
        titleMap[src] = t;
        titleMap[src.split('/').pop()] = t;
      }
    } catch(_) {}
  }

  // 找出 nav 文件（EPUB3 目录），要跳过
  const navIds = new Set(
    Object.entries(manifest).filter(([,v]) => v.props.includes('nav')).map(([k]) => k)
  );

  const spineIds = [...opfXml.matchAll(/<itemref\b[^>]*\bidref="([^"]+)"/g)].map(m=>m[1]);
  const chapters = [];
  let pendingTitle = null; // 章节标题文件（无正文）把标题留给下一个正文文件

  for (const id of spineIds) {
    const item = manifest[id]; if (!item) continue;
    // 跳过导航文件
    if (navIds.has(id)) continue;

    const fullPath = resolveHref(opfDir, item.href);
    const f = zip.file(fullPath) || zip.file(item.href) || zip.file(fullPath.replace(/^\//, '')); if (!f) continue;
    const html = await f.async('string');

    // 跳过 EPUB3 nav 文档（万一没有 properties 标记）
    if (/<nav\b[^>]*epub:type="toc"/i.test(html)) continue;

    const text = htmlToText(html);
    if (text.trim().length < 10) continue;

    // 章节标题：优先 NCX 映射，其次 h 标签，最后序号
    const filename = item.href.split('/').pop();
    const chTitle = titleMap[filename]
                  || titleMap[item.href]
                  || html.match(/<h[1-6][^>]*>([\s\S]*?)<\/h[1-6]>/i)?.[1]?.replace(/<[^>]+>/g,'').trim()
                  || `第${chapters.length+1}章`;

    // 正文开头若包含章节标题，从标题处截断（去掉导航残留前缀）
    let content = text.trim();
    let stripped = content;
    if (chTitle.length > 1) {
      // 全角/半角空格归一化后再查找
      const chTitleNorm = chTitle.replace(/\s/g, ' ');
      const contentNorm = content.replace(/\s/g, ' ');
      const ti = contentNorm.indexOf(chTitleNorm);
      if (ti >= 0 && ti < 300) {
        stripped = content.slice(ti + chTitleNorm.length).trim();
        if (stripped.length >= 20) content = stripped; // 截断后有实质内容才使用截断版
      }
    }

    // 截断后内容很短 且 整体也不长 → 这是"纯标题文件"，把标题存起来给下一个正文文件用
    if (stripped.length < 20 && content.length < 60) {
      if (!pendingTitle) pendingTitle = chTitle; // 只保留第一个，不覆盖
      continue;
    }

    // 纯数字标题 = 章节内小节（如"1""2""3"），合并到上一章而不是单独成章
    if (/^\d+$/.test(chTitle.trim())) {
      if (pendingTitle) {
        // 该小节是新章节的第一节，用 pendingTitle 创建章节
        chapters.push({ title: pendingTitle, content });
        pendingTitle = null;
      } else if (chapters.length > 0) {
        // 后续小节，追加到上一章
        chapters[chapters.length - 1].content += '\n\n' + content;
      }
      continue;
    }

    // 使用上一个标题文件留下的标题（如果有）
    const finalTitle = pendingTitle || chTitle;
    pendingTitle = null;
    chapters.push({ title: finalTitle, content });
  }

  // fallback：遍历所有 xhtml（跳过 nav）
  if (!chapters.length) {
    for (const [id, item] of Object.entries(manifest)) {
      if (navIds.has(id)) continue;
      if (!item.media.includes('html') && !item.href.match(/\.(xhtml|html|htm)$/i)) continue;
      const fullPath = resolveHref(opfDir, item.href);
      const f = zip.file(fullPath) || zip.file(item.href); if (!f) continue;
      const html = await f.async('string');
      if (/<nav\b[^>]*epub:type="toc"/i.test(html)) continue;
      const text = htmlToText(html);
      if (text.trim().length < 10) continue;
      const filename = item.href.split('/').pop();
      const chTitle = titleMap[filename]
                    || html.match(/<h[1-6][^>]*>([\s\S]*?)<\/h[1-6]>/i)?.[1]?.replace(/<[^>]+>/g,'').trim()
                    || `第${chapters.length+1}章`;
      chapters.push({ title: chTitle, content: text.trim() });
    }
  }

  if (!chapters.length) throw new Error('未能提取章节内容');
  await saveBook({ title, author, format:'epub' }, chapters);
}

function htmlToText(html) {
  html = html.replace(/<script[\s\S]*?<\/script>/gi,'').replace(/<style[\s\S]*?<\/style>/gi,'');
  // 去除 nav 导航块（EPUB3 目录/侧边栏）
  html = html.replace(/<nav\b[\s\S]*?<\/nav>/gi,'');
  // 段落/标题结束标签换成双换行，保证 split('\n\n') 能正确切段
  html = html.replace(/<\/p>/gi,'\n\n').replace(/<\/h[1-6]>/gi,'\n\n').replace(/<br\s*\/?>/gi,'\n').replace(/<\/div>/gi,'\n');
  html = html.replace(/<[^>]+>/g,'');
  html = html.replace(/&nbsp;/g,' ').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&amp;/g,'&').replace(/&quot;/g,'"').replace(/&#(\d+);/g,(_,n)=>String.fromCharCode(n));
  return html.replace(/\n{3,}/g,'\n\n').trim();
}

// ==================== TXT ====================
async function parseTxt(file) {
  const text = await new Promise(res => {
    const r = new FileReader();
    r.onload = e => res(e.target.result);
    r.readAsText(file, 'UTF-8');
  });
  const title = file.name.replace(/\.txt$/i,'');
  const lines = text.split('\n');
  let chapters = [], cur = { title:'全文', content:'' }, hasChap = false;
  for (const line of lines) {
    if (/^第[零一二三四五六七八九十百千万\d]+[章节卷集部回篇]/.test(line.trim()) ||
        /^Chapter\s+\d+/i.test(line.trim()) ||
        /^[序前后附][言记章]/i.test(line.trim())) {
      if (cur.content.trim()) chapters.push(cur);
      cur = { title: line.trim(), content:'' }; hasChap = true;
    } else { cur.content += line + '\n'; }
  }
  if (cur.content.trim()) chapters.push(cur);
  if (!hasChap || chapters.length <= 1) {
    chapters = [];
    for (let i = 0; i < text.length; i += 4000)
      chapters.push({ title:`第${chapters.length+1}段`, content: text.slice(i, i+4000) });
  }
  await saveBook({ title, author:'', format:'txt' }, chapters);
}

async function saveBook(meta, chapters) {
  const id = 'book_' + Date.now();
  const book = { id, ...meta, addedAt:Date.now(), lastRead:null, lastChapter:0, annotationCount:0 };
  await dbPut('books', book);
  await dbPut('chapters', { bookId:id, chapters });
  await dbPut('annotations', { bookId:id, list:[] });
  books.push(book);
}

// ==================== READER ====================
async function openBook(bookId) {
  curBook = books.find(b => b.id === bookId); if (!curBook) return;
  const cd = await dbGet('chapters', bookId); curChapters = cd?.chapters || [];
  const ad = await dbGet('annotations', bookId); curAnns = ad?.list || [];
  curChapterIdx = curBook.lastChapter || 0;
  showPage('readerPage');
  document.getElementById('readerTitle').textContent = curBook.title;
  renderChapter();
  curBook.lastRead = Date.now(); await dbPut('books', curBook);
}

function renderChapter() {
  if (!curChapters.length) return;
  const ch = curChapters[curChapterIdx];
  const chAnns = curAnns.filter(a => a.chapterIndex === curChapterIdx);
  const content = document.getElementById('readerContent');
  content.innerHTML = `<div class="chapter-title">${esc(ch.title)}</div>` + renderWithAnns(ch.content, chAnns);
  // 同一章节恢复滚动位置，切换章节则回顶
  content.scrollTop = (curBook.lastScrollTop && curBook.lastChapter === curChapterIdx) ? curBook.lastScrollTop : 0;
  const pct = Math.round((curChapterIdx+1)/curChapters.length*100);
  document.getElementById('footerChap').textContent = ch.title;
  document.getElementById('footerPct').textContent = pct+'%';
  document.getElementById('btnPrevChap').disabled = curChapterIdx <= 0;
  document.getElementById('btnNextChap').disabled = curChapterIdx >= curChapters.length - 1;
  content.querySelectorAll('.annotation-mark').forEach(el =>
    el.addEventListener('click', () => openExistingAnn(el.dataset.annId)));
}

function renderWithAnns(text, anns) {
  const paras = text.split('\n\n').filter(p => p.trim());
  if (!anns.length)
    return paras.map(p => `<p>${esc(p.trim())}</p>`).join('');
  // 直接在每个段落里用 selectedText 文字搜索，不依赖 offset
  return paras.map(p => {
    let s = esc(p.trim());
    const sNorm = s.replace(/\s+/g, ' ');
    // 找在这段出现的批注（空白归一化匹配，解决\n vs 空格不一致问题）
    const hits = [];
    for (const a of anns) {
      if (!a.selectedText) continue;
      const needle = esc(a.selectedText);
      const needleNorm = needle.replace(/\s+/g, ' ');
      const idxNorm = sNorm.indexOf(needleNorm);
      if (idxNorm < 0) continue;
      // 把归一化索引映射回原始字符串索引
      let orig = 0, norm = 0;
      while (norm < idxNorm && orig < s.length) {
        if (/\s/.test(s[orig])) {
          while (orig < s.length && /\s/.test(s[orig])) orig++;
          norm++;
        } else { orig++; norm++; }
      }
      const startOrig = orig;
      let endNorm = idxNorm + needleNorm.length;
      while (norm < endNorm && orig < s.length) {
        if (/\s/.test(s[orig])) {
          while (orig < s.length && /\s/.test(s[orig])) orig++;
          norm++;
        } else { orig++; norm++; }
      }
      hits.push({ idx: startOrig, len: orig - startOrig, a });
    }
    // 按出现位置倒序替换，避免偏移
    hits.sort((x, y) => y.idx - x.idx);
    for (const { idx, len, a } of hits) {
      const cls = (a.note && a.xinye_note) ? 'both-ann' : a.xinye_note ? 'xinye-ann' : 'user-ann';
      s = s.slice(0, idx)
        + `<span class="annotation-mark ${cls}" data-ann-id="${a.id}">`
        + s.slice(idx, idx + len)
        + '</span>'
        + s.slice(idx + len);
    }
    return `<p>${s}</p>`;
  }).join('');
}

// ==================== 文字选中 ====================
// 用 selectionchange 代替 touchend，等用户拖完整段再更新 pendingSel
let _selTimer = null;
document.addEventListener('selectionchange', () => {
  clearTimeout(_selTimer);
  _selTimer = setTimeout(() => {
    const sel = window.getSelection();
    const rawTxt = sel ? sel.toString() : '';
    if (!rawTxt.trim()) {
      // 选区清空了
      hideSelBar();
      return;
    }
    // 确认选区在阅读内容区域内
    const readerContent = document.getElementById('readerContent');
    if (!readerContent || !readerContent.contains(sel.anchorNode)) return;
    if (!curChapters.length) return;

    const firstParaRaw = (rawTxt.split(/\n\n+/)[0] || rawTxt).replace(/\s+/g, ' ').trim();
    const locTxt = firstParaRaw;
    if (!locTxt) return;
    const chContent = curChapters[curChapterIdx]?.content || '';
    let startOffset = chContent.indexOf(locTxt);
    if (startOffset < 0) {
      const normContent = chContent.replace(/[ \t]+/g, ' ');
      startOffset = normContent.indexOf(locTxt);
    }
    if (startOffset < 0) startOffset = 0;
    const fullQuote = rawTxt.replace(/\s+/g, ' ').trim();
    pendingSel = { selectedText: locTxt, fullQuote, startOffset, endOffset: startOffset + locTxt.length };
    document.getElementById('selBar').classList.add('show');
  }, 300); // 300ms debounce，等用户拖完
});

function onSelect() {} // 保留空函数，HTML 里的 onmouseup/ontouchend 不影响

function hideSelBar() { document.getElementById('selBar').classList.remove('show'); }
function clearSel()   { window.getSelection()?.removeAllRanges(); hideSelBar(); pendingSel = null; }

// ==================== 批注 ====================
function doAnnotate() {
  if (!pendingSel) return;
  editingAnnId = null;
  document.getElementById('annQuote').textContent = '「' + (pendingSel.fullQuote || pendingSel.selectedText) + '」';
  document.getElementById('annInput').value = '';
  document.getElementById('btnDelAnn').style.display = 'none';
  document.getElementById('btnAskFromAnn').style.display = 'none';
  document.getElementById('annModal').classList.add('show');
  hideSelBar();
  setTimeout(() => document.getElementById('annInput').focus(), 300);
}

function openExistingAnn(annId) {
  const a = curAnns.find(x => x.id === annId); if (!a) return;
  editingAnnId = annId;
  pendingSel = { selectedText: a.selectedText, fullQuote: a.fullQuote||a.selectedText, startOffset: a.startOffset, endOffset: a.endOffset };
  document.getElementById('annQuote').textContent = '「' + (a.fullQuote || a.selectedText) + '」';
  document.getElementById('annInput').value = a.note || '';
  document.getElementById('btnDelAnn').style.display = 'block';
  // 如果有炘也批注，显示在 textarea 下方（用户在上，炘也在下）
  const xinyeArea = document.getElementById('annXinyeNote');
  if (xinyeArea) xinyeArea.remove();

function sendCurrentToChat() {
  const ch = curChapters[curChapterIdx];
  let msg = `📖《${curBook.title}》${ch.title}\n`;
  if (pendingSel) {
    // 有选中文字，只发那段 + 那段的批注（如果有）
    const quote = pendingSel.fullQuote || pendingSel.selectedText;
    msg += `\n我选了这段：\n「${quote}」`;
    // 找批注：选中文字包含 selectedText，或 selectedText 包含在 quote 里
    const ann = curAnns.find(a => a.chapterIndex === curChapterIdx &&
      (a.selectedText === pendingSel.selectedText || quote.includes(a.selectedText)));
    if (ann?.note) msg += `\n\n我的想法：${ann.note}`;
  } else {
    // 没选中，只报告批注数量，不全发
    const chAnns = curAnns.filter(a => a.chapterIndex === curChapterIdx);
    if (chAnns.length) msg += `\n这章我写了 ${chAnns.length} 条批注，想聊哪段告诉我～`;
    else msg += '\n（这章我还没有写批注）';

function _toast(msg, dur) {
  // 优先用已有 toast，否则临时创建
  const t = document.getElementById('readingToast') || (() => {
    const el = document.createElement('div');
    el.id = 'readingToast';
    el.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(30,10,20,.88);color:#fff;padding:9px 20px;border-radius:20px;font-size:13px;z-index:9999;transition:opacity .3s;pointer-events:none;white-space:nowrap';
    document.body.appendChild(el);
    return el;
  })();
  t.textContent = msg; t.style.opacity = '1';
  clearTimeout(t._t); t._t = setTimeout(() => t.style.opacity = '0', dur || 2800);
}
async function saveFile(content, filename) {
  // 优先用父页面的 downloadFile（主框架，Capacitor 可靠）
  if (window.parent !== window && typeof window.parent.downloadFile === 'function') {
    try {
      await window.parent.downloadFile(content, filename, 'application/json');
      _toast('✅ 已保存到 Download 文件夹');
    } catch(e) {
      _toast('保存失败：' + (e.message || e));
    }
    return;
  }
  // 独立打开时降级：blob 下载
  const blob = new Blob([content], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

async function archiveToMemory() {
  if (!curBook) return;
  if (!curAnns.length) { alert('这本书还没有批注，先写几条吧～'); return; }
  // confirm在APK里不可用，直接执行

  showLoading('炘也整理中…');
  try {
    // 读炘也的设置
    const xinyeDB = await new Promise((res, rej) => {
      const req = indexedDB.open('XinyeChatDB');
      req.onsuccess = e => res(e.target.result);
      req.onerror = rej;
    });
    const cfg = await new Promise((res, rej) => {
      const tx = xinyeDB.transaction('settings', 'readonly');
      const r = tx.objectStore('settings').get('main');
      r.onsuccess = e => res(e.target.result); r.onerror = rej;
    });
    if (!cfg) { hideLoading(); alert('找不到炘也的设置，先打开炘也聊天界面一次再试'); return; }

    const apiKey = cfg.apiKey;
    const baseUrl = (cfg.baseUrl || 'https://api.openai.com').replace(/\/+$/, '');
    const model = cfg.model || 'claude-sonnet-4-6';
    if (!apiKey) { hideLoading(); alert('没有找到API Key，请在炘也设置里填写'); return; }

    // 构建批注摘要
    const annText = curAnns.map(a =>
      `【${curChapters[a.chapterIndex]?.title||''}】\n"${a.selectedText}"\n→ ${a.note}`
    ).join('\n\n');

    const prompt = `兔宝在读《${curBook.title}》${curBook.author?`（${curBook.author}）`:''}，写了以下批注：\n\n${annText}\n\n请用100字以内，以"兔宝读《${curBook.title}》时……"开头，整理成一段适合放进记忆档案的文字。只输出那一段话，不要其他内容。`;

    const url = baseUrl.endsWith('/v1') ? `${baseUrl}/chat/completions` : `${baseUrl}/v1/chat/completions`;
    const resp = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
      body: JSON.stringify({ model, messages: [{ role:'user', content: prompt }] })
    });
    if (!resp.ok) { const e = await resp.json(); throw new Error(e.error?.message || resp.status); }
    const result = await resp.json();
    const newMemory = result.choices?.[0]?.message?.content?.trim();
    if (!newMemory) throw new Error('API 没有返回内容');

    // 追加进记忆档案
    const existing = cfg.memoryArchive || '';
    const today = new Date().toLocaleDateString('zh');
    cfg.memoryArchive = existing + (existing ? '\n\n' : '') + `[${today}] ${newMemory}`;
    await new Promise((res, rej) => {
      const tx = xinyeDB.transaction('settings', 'readwrite');
      const r = tx.objectStore('settings').put(cfg);
      r.onsuccess = res; r.onerror = rej;
    });
    hideLoading();
    alert('已整理进记忆档案 💙\n\n' + newMemory);
  } catch(e) { hideLoading(); alert('整理失败：' + e.message); console.error(e); }
}

async function doAsk() {
  if (!pendingSel) return;
  document.getElementById('askActions').style.display = 'none';
  document.getElementById('askLoading').style.display = 'block';
  document.getElementById('askReply').style.display = 'none';
  try {
    const xinyeDB = await new Promise((res, rej) => {
      const req = indexedDB.open('XinyeChatDB'); req.onsuccess = e => res(e.target.result); req.onerror = rej;
    });
    const cfg = await new Promise((res, rej) => {
      const tx = xinyeDB.transaction('settings','readonly');
      const r = tx.objectStore('settings').get('main'); r.onsuccess = e => res(e.target.result); r.onerror = rej;
    });
    if (!cfg) throw new Error('找不到炘也设置');
    const apiKey = cfg.apiKey; if (!apiKey) throw new Error('没有API Key');
    const baseUrl = (cfg.baseUrl || 'https://api.anthropic.com').replace(/\/+$/,'');
    const model = cfg.model || 'claude-sonnet-4-6';
    const sysPrompt = cfg.systemPrompt || '';
    const memory = cfg.memoryArchive || '';

    const ch = curChapters[curChapterIdx];
    const userNote = curAnns.find(a => a.chapterIndex === curChapterIdx && a.startOffset === pendingSel.startOffset)?.note || '';
    const quote = pendingSel.fullQuote || pendingSel.selectedText;
    const prompt = `我在读《${curBook.title}》，选了这段文字：\n\n「${quote}」\n\n${userNote ? `我的想法：${userNote}\n\n` : ''}你怎么看这段？`;

    const msgs = [];
    if (sysPrompt) msgs.push({ role:'system', content: sysPrompt });
    if (memory) msgs.push({ role:'user', content:`【记忆档案】\n${memory}` }, { role:'assistant', content:'好，我记住了。' });
    msgs.push({ role:'user', content: prompt });

    const url = baseUrl.endsWith('/v1') ? `${baseUrl}/chat/completions` : `${baseUrl}/v1/chat/completions`;
    const resp = await fetch(url, {
      method:'POST',
      headers:{ 'Content-Type':'application/json', 'Authorization':`Bearer ${apiKey}` },
      body: JSON.stringify({ model, messages: msgs, temperature: 0.8 })
    });
    if (!resp.ok) { const e = await resp.json(); throw new Error(e.error?.message || resp.status); }
    const result = await resp.json();
    askReplyText = result.choices?.[0]?.message?.content?.trim() || '';
    document.getElementById('askLoading').style.display = 'none';
    document.getElementById('askReply').textContent = askReplyText;
    document.getElementById('askReply').style.display = 'block';
    document.getElementById('askSaveActions').style.display = 'flex';
  } catch(e) {
    document.getElementById('askLoading').style.display = 'none';
    document.getElementById('askActions').style.display = 'flex';
    alert('出错了：' + e.message);
  }
}

async function saveAskReply() {
  if (!askReplyText || !pendingSel) return;
  // 找已有批注或新建
  let ann = curAnns.find(a => a.startOffset === pendingSel.startOffset && a.chapterIndex === curChapterIdx);
  if (ann) {
    ann.xinye_note = askReplyText;
  } else {
    ann = { id:'ann_'+Date.now(), chapterIndex:curChapterIdx, selectedText:pendingSel.selectedText,
      startOffset:pendingSel.startOffset, endOffset:pendingSel.endOffset, note:'', xinye_note:askReplyText, createdAt:Date.now() };
    curAnns.push(ann);
  }
  await dbPut('annotations', { bookId:curBook.id, list:curAnns });
  curBook.annotationCount = curAnns.length; await dbPut('books', curBook);
  closeAsk(); clearSel(); renderChapter();
}

      for (const b of data.books) await dbPut('books', b);

  document.body.classList.toggle('dark', isDark);
  const moonSvg = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M20 14.12A8 8 0 119.88 4a6 6 0 0010.12 10.12z" fill="currentColor" opacity="0.25" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><circle cx="18.5" cy="5" r="1.2" fill="currentColor"/><circle cx="21" cy="8.5" r="0.8" fill="currentColor"/></svg>`;
  const sunSvg = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="5" fill="currentColor" opacity="0.3" stroke="currentColor" stroke-width="1.5"/><path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>`;
  const icon = isDark ? sunSvg : moonSvg;
  const b1 = document.getElementById('btnDark');
  const b2 = document.getElementById('btnDarkShelf');
  if (b1) b1.innerHTML = icon;
  if (b2) b2.innerHTML = icon;
}
function toggleDark() {
  const isDark = !document.body.classList.contains('dark');
  setDarkUI(isDark);
  localStorage.setItem('reading_dark', isDark ? '1' : '0');
}

// ==================== 字体大小 ====================
function changeFontSize(delta) {
  const current = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--font-size')) || 16;
  const next = Math.min(22, Math.max(12, current + delta * 2));
  document.documentElement.style.setProperty('--font-size', next + 'px');
  localStorage.setItem('reading_fs', next);
}

// ==================== 上一章 / 下一章 ====================
async function prevChapter() {
  if (!curChapters.length || curChapterIdx <= 0) return;
  curChapterIdx--;
  curBook.lastChapter = curChapterIdx; curBook.lastScrollTop = 0;
  await dbPut('books', curBook);
  renderChapter();
}

async function nextChapter() {
  if (!curChapters.length || curChapterIdx >= curChapters.length - 1) return;
  curChapterIdx++;
  curBook.lastChapter = curChapterIdx; curBook.lastScrollTop = 0;
  await dbPut('books', curBook);
  renderChapter();
}

// ==================== 应用保存的偏好 ====================
function applyReadingPrefs() {
  const saved = localStorage.getItem('reading_dark');
  const dark = saved !== null
    ? saved === '1'
    : window.matchMedia('(prefers-color-scheme:dark)').matches;
  setDarkUI(dark);
  const fs = parseInt(localStorage.getItem('reading_fs')) || 16;
  document.documentElement.style.setProperty('--font-size', fs + 'px');
}

init();
</script>
