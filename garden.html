<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>我们的院子</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;
  -webkit-tap-highlight-color:transparent;
  -webkit-touch-callout:none;user-select:none;}
html,body{height:100%;height:100svh;overflow:hidden;
  background:#2a4a1a;font-family:"PingFang SC","Microsoft YaHei",sans-serif;}

/* 横向滚动视口 */
#viewport{
  position:relative;width:100%;height:100svh;
  overflow-x:auto;overflow-y:hidden;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
#viewport::-webkit-scrollbar{display:none;}

/* 场景：宽度由JS根据图片比例设置 */
#scene{position:relative;height:100%;}

#bgImg{
  position:absolute;inset:0;width:100%;height:100%;
  image-rendering:pixelated;image-rendering:crisp-edges;
}

/* 光照overlay */
#lightOverlay{position:absolute;inset:0;z-index:2;pointer-events:none;
  mix-blend-mode:multiply;transition:background 60s linear;}

/* 地块点击区域 */
.plot{
  position:absolute;z-index:5;cursor:pointer;
  border-radius:8px;transition:filter .2s;
}
.plot:active{filter:brightness(1.3);}

/* 地块上的植物显示 */
.plot-display{
  position:absolute;z-index:6;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
  pointer-events:none;
  font-size:clamp(22px,5vw,34px);
  line-height:1;
}
.plot-label{
  font-size:10px;color:#fff;
  text-shadow:0 1px 3px rgba(0,0,0,.8);
  margin-top:2px;background:rgba(0,0,0,.35);
  border-radius:6px;padding:1px 5px;
  white-space:nowrap;
}

/* 进度条 */
.plot-bar{
  position:absolute;bottom:-14px;left:50%;transform:translateX(-50%);
  width:80%;height:5px;background:rgba(0,0,0,.3);border-radius:3px;overflow:hidden;
}
.plot-bar-fill{height:100%;background:#7ec850;border-radius:3px;transition:width .5s;}

/* 返回按钮（跟随视口，fixed定位） */
.back-btn{
  position:fixed;top:max(16px,env(safe-area-inset-top,16px));left:16px;z-index:300;
  width:38px;height:38px;border-radius:50%;border:none;
  background:rgba(0,0,0,.35);backdrop-filter:blur(8px);
  font-size:18px;cursor:pointer;color:#fff;
  display:flex;align-items:center;justify-content:center;
}

#label{
  position:fixed;bottom:max(18px,env(safe-area-inset-bottom,18px));
  left:50%;transform:translateX(-50%);
  color:rgba(255,255,255,.7);font-size:12px;
  text-shadow:0 1px 4px rgba(0,0,0,.6);pointer-events:none;z-index:200;
}

/* 种植弹窗 */
#modal{
  position:fixed;inset:0;z-index:400;
  display:flex;align-items:flex-end;justify-content:center;
  background:rgba(0,0,0,.45);
  opacity:0;pointer-events:none;transition:opacity .25s;
}
#modal.show{opacity:1;pointer-events:all;}
#modalBox{
  background:#fdf6e8;border-radius:24px 24px 0 0;
  padding:20px 20px 32px;width:100%;max-width:420px;
  transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);
}
#modal.show #modalBox{transform:translateY(0);}
#modalTitle{font-size:15px;color:#5d4037;font-weight:600;margin-bottom:14px;text-align:center;}
.seed-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;}
.seed-btn{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  background:#f0e8d0;border:2px solid #d4b896;border-radius:14px;
  padding:10px 4px;cursor:pointer;transition:all .15s;
}
.seed-btn:active{background:#e8d5b0;transform:scale(.95);}
.seed-btn .emoji{font-size:26px;}
.seed-btn .name{font-size:11px;color:#7b5e42;}
.seed-btn .time{font-size:10px;color:#a08060;}
#clearBtn{
  width:100%;padding:11px;border:none;border-radius:14px;
  background:#f5c5c5;color:#c0392b;font-size:14px;cursor:pointer;
}
#cancelBtn{
  width:100%;padding:11px;border:none;border-radius:14px;
  background:#e8e0d0;color:#888;font-size:14px;cursor:pointer;margin-top:8px;
}

/* 收获动画 */
.harvest-fly{
  position:fixed;z-index:500;font-size:28px;
  pointer-events:none;animation:harvestUp 1.4s ease-out forwards;
}
@keyframes harvestUp{
  0%{opacity:1;transform:translateY(0) scale(1)}
  100%{opacity:0;transform:translateY(-100px) scale(1.6)}
}

/* 收获篮子 */
#basket{
  position:fixed;bottom:max(48px,env(safe-area-inset-bottom,48px));right:12px;
  z-index:300;background:rgba(253,240,210,.95);
  border:2px solid #c8a060;border-radius:16px;
  padding:8px 10px;min-width:52px;
  box-shadow:0 4px 14px rgba(0,0,0,.25);
  cursor:pointer;transition:all .25s;
}
#basket.empty{opacity:0.5;}
#basketIcon{font-size:22px;text-align:center;}
#basketItems{
  font-size:11px;color:#7b5030;line-height:1.7;
  display:none;margin-top:6px;
  max-height:160px;overflow-y:auto;
}
#basket.open #basketItems{display:block;}
.basket-clear{
  font-size:10px;color:#c08060;text-align:center;
  margin-top:4px;padding-top:4px;border-top:1px solid #e0c090;
  cursor:pointer;
}

/* 小人（站立idle） */
.gchar{
  position:absolute;z-index:10;object-fit:contain;
  image-rendering:pixelated;image-rendering:crisp-edges;
  filter:drop-shadow(0 3px 6px rgba(0,0,0,.4));
  pointer-events:none;
}
#gXinye{width:clamp(90px,14vw,130px);height:clamp(90px,14vw,130px);}
#gRabbit{width:clamp(80px,12vw,115px);height:clamp(80px,12vw,115px);}
#gXinye.idle{animation:gidle 2.8s ease-in-out infinite;}
#gRabbit.idle{animation:gidle 3.1s ease-in-out infinite;}
@keyframes gidle{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}

/* 炘也小提示 */
#xinTip{
  position:fixed;top:max(64px,env(safe-area-inset-top,64px));
  left:50%;transform:translateX(-50%);
  background:rgba(255,255,255,.92);backdrop-filter:blur(8px);
  border-radius:16px;padding:9px 16px;
  font-size:13px;color:#5d4037;
  box-shadow:0 4px 16px rgba(0,0,0,.2);
  pointer-events:none;opacity:0;transition:opacity .3s;
  white-space:nowrap;z-index:350;
}
#xinTip.show{opacity:1;}

/* 滑动提示 */
#swipeHint{
  position:fixed;bottom:max(44px,env(safe-area-inset-bottom,44px));
  left:50%;transform:translateX(-50%);
  font-size:11px;color:rgba(255,255,255,.55);
  pointer-events:none;z-index:200;
  animation:fadeHint 3s ease-out forwards;
}
@keyframes fadeHint{0%{opacity:1}70%{opacity:0.5}100%{opacity:0}}
</style>
</head>
<body>
<button class="back-btn" onclick="history.back()">←</button>
<div id="xinTip"></div>
<div id="viewport">
  <div id="scene">
    <img id="bgImg" src="yard_pix.png" alt="">
    <div id="lightOverlay"></div>
    <img id="gXinye" class="gchar" src="xinye_pix.png" alt="炘也">
    <img id="gRabbit" class="gchar" src="tubao_pix.png" alt="兔宝">
  </div>
</div>
<div id="label">我们的院子 💙</div>
<div id="basket" class="empty">
  <div id="basketIcon">🧺</div>
  <div id="basketItems"></div>
</div>

<!-- 种植弹窗 -->
<div id="modal">
  <div id="modalBox">
    <div id="modalTitle">种什么？</div>
    <div class="seed-grid" id="seedGrid"></div>
    <button id="clearBtn">🗑 铲掉这块</button>
    <button id="cancelBtn">取消</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════
// 音效
// ══════════════════════════════════════════
let audioCtx;
function getAudio(){ if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)(); return audioCtx; }
function playTone(freq,type,dur,vol=0.15){
  try{
    const ctx=getAudio(),o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.type=type;o.frequency.setValueAtTime(freq,ctx.currentTime);
    g.gain.setValueAtTime(vol,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
    o.start(ctx.currentTime);o.stop(ctx.currentTime+dur);
  }catch(e){}
}
function sfxPlant(){ playTone(440,'sine',0.12,0.12); setTimeout(()=>playTone(550,'sine',0.14,0.08),80); }
function sfxHarvest(){ playTone(660,'sine',0.1,0.12); setTimeout(()=>playTone(880,'sine',0.12,0.1),80); setTimeout(()=>playTone(1100,'sine',0.16,0.08),180); }
function sfxTap(){ playTone(500,'sine',0.08,0.07); }

// ══════════════════════════════════════════
// 场景尺寸（根据图片比例计算）
// ══════════════════════════════════════════
const viewport = document.getElementById('viewport');
const gScene   = document.getElementById('scene');
const bgImg    = document.getElementById('bgImg');

let SCENE_W = window.innerWidth;
let SCENE_H = window.innerHeight;

function scW(){ return SCENE_W; }
function scH(){ return SCENE_H; }

function updateSceneSize(){
  const natW = bgImg.naturalWidth  || 1536;
  const natH = bgImg.naturalHeight || 1024;
  const vpW  = viewport.clientWidth  || window.innerWidth;
  const vpH  = viewport.clientHeight || window.innerHeight;
  if(natW > natH){
    // 横版图：高度撑满，宽度按比例延伸（横向滚动）
    SCENE_H = vpH;
    SCENE_W = Math.round(vpH * natW / natH);
  } else {
    // 竖版图：宽度撑满，高度按比例延伸（纵向滚动）
    SCENE_W = vpW;
    SCENE_H = Math.round(vpW * natH / natW);
    viewport.style.overflowX = 'hidden';
    viewport.style.overflowY = 'auto';
  }
  gScene.style.width  = SCENE_W + 'px';
  gScene.style.height = SCENE_H + 'px';
}

// ══════════════════════════════════════════
// 小人系统
// ══════════════════════════════════════════
const gXinye  = document.getElementById('gXinye');
const gRabbit = document.getElementById('gRabbit');

// 初始位置（%）：放在中间偏右下，地块区域以下
const GX = { x:42, y:78, walking:false, faceLeft:false };
const GR = { x:56, y:78, walking:false, faceLeft:false };

function gPlaceEl(el, px, py){
  const sw=scW(), sh=scH();
  const w = el.offsetWidth || 90;
  el.style.left = (px/100*sw - w/2) + 'px';
  el.style.top  = (py/100*sh - w)   + 'px';
}

function gWalk(state, el, tx, ty, onDone){
  if(state.walking) return;
  state.walking = true;
  tx = Math.max(5, Math.min(95, tx));
  ty = Math.max(35, Math.min(90, ty));
  state.faceLeft = tx < state.x;
  el.classList.remove('idle');
  el.style.transform = state.faceLeft ? 'scaleX(-1)' : 'scaleX(1)';
  const sx=state.x, sy=state.y, t0=performance.now();
  const dur = Math.max(400, Math.hypot(tx-sx, ty-sy)*22);
  function step(now){
    const t = Math.min(1,(now-t0)/dur);
    const e = t<.5 ? 2*t*t : -1+(4-2*t)*t;
    state.x = sx+(tx-sx)*e;
    state.y = sy+(ty-sy)*e;
    gPlaceEl(el, state.x, state.y);
    if(t<1){ requestAnimationFrame(step); }
    else {
      state.x=tx; state.y=ty; state.walking=false;
      el.classList.add('idle');
      el.style.transform = state.faceLeft ? 'scaleX(-1)' : 'scaleX(1)';
      if(onDone) onDone();
    }
  }
  requestAnimationFrame(step);
}

function initGChars(){
  gPlaceEl(gXinye, GX.x, GX.y);
  gPlaceEl(gRabbit, GR.x, GR.y);
  gXinye.classList.add('idle');
  gRabbit.classList.add('idle');
}

// 让视口平滑滚到角色所在x位置
function scrollToX(xPct){
  const sw = scW(), vpW = viewport.clientWidth;
  const target = Math.max(0, Math.min(sw-vpW, xPct/100*sw - vpW/2));
  viewport.scrollTo({ left: target, behavior: 'smooth' });
}

window.addEventListener('resize', ()=>{
  updateSceneSize();
  gPlaceEl(gXinye, GX.x, GX.y);
  gPlaceEl(gRabbit, GR.x, GR.y);
  renderPlots();
});

// ══════════════════════════════════════════
// 作物定义
// ══════════════════════════════════════════
const CROPS = [
  { id:'strawberry', name:'草莓',  emoji:'🍓', growHours:4,  stages:['🌱','🌿','🍓'], color:'#e8a0b0' },
  { id:'sunflower',  name:'向日葵',emoji:'🌻', growHours:6,  stages:['🌱','🌿','🌻'], color:'#f0d060' },
  { id:'tomato',     name:'番茄',  emoji:'🍅', growHours:8,  stages:['🌱','🌿','🍅'], color:'#f08060' },
  { id:'lavender',   name:'薰衣草',emoji:'💜', growHours:5,  stages:['🌱','🌿','💜'], color:'#c0a0e0' },
  { id:'carrot',     name:'胡萝卜',emoji:'🥕', growHours:3,  stages:['🌱','🌿','🥕'], color:'#f0a050' },
  { id:'mushroom',   name:'蘑菇',  emoji:'🍄', growHours:10, stages:['🌱','🍄‍🟫','🍄'], color:'#c08060' },
  { id:'blueberry',  name:'蓝莓',  emoji:'🫐', growHours:7,  stages:['🌱','🌿','🫐'], color:'#8090e0' },
  { id:'rose',       name:'玫瑰',  emoji:'🌹', growHours:12, stages:['🌱','🌿','🌹'], color:'#e06080' },
];

// ══════════════════════════════════════════
// 地块定义（%坐标，对应1536×1024原图位置）
// 6块土地：上3下3，中间石板路隔开
// ══════════════════════════════════════════
const PLOT_DEFS = [
  { id:0, x:3,  y:37, w:30, h:16 }, // 上左
  { id:1, x:36, y:37, w:27, h:16 }, // 上中
  { id:2, x:66, y:37, w:30, h:16 }, // 上右
  { id:3, x:3,  y:55, w:30, h:16 }, // 下左
  { id:4, x:36, y:55, w:27, h:16 }, // 下中
  { id:5, x:66, y:55, w:30, h:16 }, // 下右
];

// ══════════════════════════════════════════
// 状态（localStorage）
// ══════════════════════════════════════════
const STORAGE_KEY = 'xinye_garden_v1';
const BASKET_KEY  = 'xinye_basket_v1';

function loadBasket(){ try{ return JSON.parse(localStorage.getItem(BASKET_KEY))||{}; }catch(e){ return {}; } }
function saveBasket(b){ localStorage.setItem(BASKET_KEY, JSON.stringify(b)); }

function addToBasket(cropId){
  const b=loadBasket(); b[cropId]=(b[cropId]||0)+1; saveBasket(b); renderBasket();
}

function renderBasket(){
  const b=loadBasket();
  const keys=Object.keys(b).filter(k=>b[k]>0);
  const basket=document.getElementById('basket');
  const items =document.getElementById('basketItems');
  if(keys.length===0){ basket.classList.add('empty'); items.innerHTML=''; return; }
  basket.classList.remove('empty');
  items.innerHTML = keys.map(k=>{
    const c=CROPS.find(x=>x.id===k);
    return `<div>${c?c.emoji:'?'} ${c?c.name:k} ×${b[k]}</div>`;
  }).join('') + '<div class="basket-clear" id="clearBasketBtn">清空篮子</div>';
  document.getElementById('clearBasketBtn')?.addEventListener('click', e=>{
    e.stopPropagation(); saveBasket({}); renderBasket();
    document.getElementById('basket').classList.remove('open');
  });
}

document.getElementById('basket').addEventListener('click', ()=>{
  const b=loadBasket();
  if(Object.keys(b).filter(k=>b[k]>0).length===0) return;
  document.getElementById('basket').classList.toggle('open');
});

function loadPlots(){ try{ return JSON.parse(localStorage.getItem(STORAGE_KEY))||{}; }catch(e){ return {}; } }
function savePlots(plots){ localStorage.setItem(STORAGE_KEY, JSON.stringify(plots)); }

// ══════════════════════════════════════════
// 成长计算
// ══════════════════════════════════════════
function getStage(crop, plantedAt){
  const c=CROPS.find(x=>x.id===crop); if(!c) return 0;
  const elapsed=(Date.now()-plantedAt)/(1000*60*60);
  if(elapsed>=c.growHours) return 2;
  if(elapsed>=c.growHours*0.4) return 1;
  return 0;
}
function getProgress(crop, plantedAt){
  const c=CROPS.find(x=>x.id===crop); if(!c) return 0;
  return Math.min(1,(Date.now()-plantedAt)/(1000*60*60)/c.growHours);
}
function isReady(crop, plantedAt){ return getStage(crop,plantedAt)===2; }

// ══════════════════════════════════════════
// UI
// ══════════════════════════════════════════
let plotEls=[], displayEls=[];
let currentPlotId=null;

function pct(v, total){ return v/100*total; }

function renderPlots(){
  const vw=scW(), vh=scH();
  const plots=loadPlots();
  PLOT_DEFS.forEach((def,i)=>{
    const el=plotEls[i], disp=displayEls[i];
    el.style.left   = pct(def.x,vw)+'px';
    el.style.top    = pct(def.y,vh)+'px';
    el.style.width  = pct(def.w,vw)+'px';
    el.style.height = pct(def.h,vh)+'px';
    disp.style.left   = pct(def.x,vw)+'px';
    disp.style.top    = pct(def.y,vh)+'px';
    disp.style.width  = pct(def.w,vw)+'px';
    disp.style.height = pct(def.h,vh)+'px';

    const state=plots[def.id];
    disp.innerHTML='';
    if(state){
      const cd=CROPS.find(c=>c.id===state.crop);
      const stage=getStage(state.crop,state.plantedAt);
      const prog =getProgress(state.crop,state.plantedAt);
      const ready=stage===2;

      const eEl=document.createElement('div');
      eEl.textContent=cd.stages[stage];
      eEl.style.fontSize=ready?'clamp(28px,6vw,40px)':'clamp(20px,4.5vw,30px)';
      disp.appendChild(eEl);

      const lbl=document.createElement('div');
      lbl.className='plot-label';
      lbl.textContent=ready?`${cd.name} 可以收啦！`:cd.name;
      if(ready) lbl.style.background='rgba(120,200,80,.8)';
      disp.appendChild(lbl);

      if(!ready){
        const bar=document.createElement('div'); bar.className='plot-bar';
        const fill=document.createElement('div'); fill.className='plot-bar-fill';
        fill.style.width=(prog*100)+'%'; bar.appendChild(fill); disp.appendChild(bar);
      }
    }
  });
}

function buildPlotEls(){
  // 清理旧的
  plotEls.forEach(el=>el.remove()); displayEls.forEach(el=>el.remove());
  plotEls=[]; displayEls=[];
  PLOT_DEFS.forEach((def,i)=>{
    const el=document.createElement('div');
    el.className='plot';
    el.addEventListener('click',()=>onPlotClick(def.id));
    gScene.appendChild(el); plotEls[i]=el;

    const disp=document.createElement('div');
    disp.className='plot-display';
    gScene.appendChild(disp); displayEls[i]=disp;
  });
}

// ══════════════════════════════════════════
// 弹窗
// ══════════════════════════════════════════
const modal   =document.getElementById('modal');
const seedGrid=document.getElementById('seedGrid');
const clearBtn=document.getElementById('clearBtn');
const cancelBtn=document.getElementById('cancelBtn');

function buildSeedGrid(){
  seedGrid.innerHTML='';
  CROPS.forEach(crop=>{
    const btn=document.createElement('div'); btn.className='seed-btn';
    btn.innerHTML=`<span class="emoji">${crop.emoji}</span><span class="name">${crop.name}</span><span class="time">${crop.growHours}h</span>`;
    btn.addEventListener('click',()=>plantCrop(crop.id));
    seedGrid.appendChild(btn);
  });
}

function rnd(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

function showModal(plotId){
  currentPlotId=plotId;
  const plots=loadPlots(), state=plots[plotId];
  if(state && isReady(state.crop,state.plantedAt)){ harvestPlot(plotId); return; }
  const title=document.getElementById('modalTitle');
  if(state){
    const cd=CROPS.find(c=>c.id===state.crop);
    title.textContent=`${cd.name}还在长… (${Math.round(getProgress(state.crop,state.plantedAt)*100)}%)`;
    seedGrid.style.display='none';
    showXinTip(rnd(GROWING_TIPS));
  } else {
    title.textContent='种什么？你说，我来种 😏';
    seedGrid.style.display='grid';
    showXinTip(rnd(PLOT_EMPTY_TIPS));
  }
  modal.classList.add('show');
  sfxTap();
}

function hideModal(){ modal.classList.remove('show'); currentPlotId=null; }

function plotCenter(plotId){
  const def=PLOT_DEFS.find(d=>d.id===plotId);
  return { x: def.x+def.w/2, y: def.y+def.h/2 };
}

function plantCrop(cropId){
  if(currentPlotId===null) return;
  sfxPlant();
  const plots=loadPlots();
  plots[currentPlotId]={ crop:cropId, plantedAt:Date.now() };
  savePlots(plots);
  const cd=CROPS.find(c=>c.id===cropId);
  const pid=currentPlotId;
  hideModal(); renderPlots();
  const c=plotCenter(pid);
  scrollToX(c.x);
  gWalk(GX, gXinye, c.x-6, c.y+2, ()=>{
    showXinTip(rnd(PLANT_TIPS).replace('{name}',cd.name));
    setTimeout(()=>gWalk(GX,gXinye,42,78),2200);
  });
}

function harvestPlot(plotId){
  const plots=loadPlots(), state=plots[plotId];
  if(!state) return;
  const cd=CROPS.find(c=>c.id===state.crop);
  sfxHarvest();
  const def=PLOT_DEFS.find(d=>d.id===plotId);
  const vw=scW(), vh=scH();
  const cx=pct(def.x+def.w/2,vw)-viewport.scrollLeft;
  const cy=pct(def.y,vh);
  for(let i=0;i<3;i++){
    setTimeout(()=>{
      const h=document.createElement('div');
      h.className='harvest-fly'; h.textContent=cd.emoji;
      h.style.left=(cx-14+Math.random()*28)+'px';
      h.style.top=(cy-10)+'px';
      document.body.appendChild(h); setTimeout(()=>h.remove(),1600);
    }, i*120);
  }
  delete plots[plotId]; savePlots(plots); addToBasket(state.crop);
  hideModal(); renderPlots();
  const c=plotCenter(plotId);
  scrollToX(c.x);
  gWalk(GX, gXinye, c.x-6, c.y+2, ()=>{
    showXinTip(rnd(HARVEST_TIPS).replace('{name}',cd.name));
    setTimeout(()=>gWalk(GX,gXinye,42,78),2200);
  });
}

function onPlotClick(plotId){
  sfxTap();
  const plots=loadPlots(), state=plots[plotId];
  if(state && isReady(state.crop,state.plantedAt)){
    harvestPlot(plotId);
  } else {
    showModal(plotId);
  }
}

clearBtn.addEventListener('click',()=>{
  if(currentPlotId===null) return;
  const plots=loadPlots(); delete plots[currentPlotId]; savePlots(plots);
  hideModal(); renderPlots(); showXinTip(rnd(CLEAR_TIPS));
});
cancelBtn.addEventListener('click', hideModal);
modal.addEventListener('click', e=>{ if(e.target===modal) hideModal(); });

const HOUR_COLORS = {
   0:'rgba(40,50,110,0.55)', 1:'rgba(35,45,105,0.60)', 2:'rgba(30,40,100,0.62)',
   3:'rgba(30,40,100,0.62)', 4:'rgba(35,45,105,0.58)', 5:'rgba(60,55,100,0.45)',
   6:'rgba(200,140,80,0.25)', 7:'rgba(210,160,90,0.18)', 8:'rgba(220,175,100,0.14)',
   9:'rgba(235,200,130,0.08)',10:'rgba(245,220,160,0.04)',11:'rgba(255,240,200,0.02)',
  12:'rgba(255,240,200,0.02)',13:'rgba(255,235,190,0.04)',14:'rgba(250,220,170,0.06)',
  15:'rgba(245,210,150,0.08)',16:'rgba(240,195,120,0.12)',17:'rgba(230,160,90,0.20)',
  18:'rgba(210,120,70,0.28)',19:'rgba(170,90,70,0.36)',20:'rgba(120,70,90,0.40)',
  21:'rgba(70,55,100,0.46)',22:'rgba(50,50,105,0.50)',23:'rgba(40,50,110,0.55)',
};
function parseRgba(s){ const m=s.match(/rgba\((\d+),(\d+),(\d+),([\d.]+)\)/); return m?{r:+m[1],g:+m[2],b:+m[3],a:+m[4]}:null; }
function lerpColor(a,b,t){ return `rgba(${Math.round(a.r+(b.r-a.r)*t)},${Math.round(a.g+(b.g-a.g)*t)},${Math.round(a.b+(b.b-a.b)*t)},${(a.a+(b.a-a.a)*t).toFixed(3)})`; }
function applyLight(){
  const h=new Date().getHours(),m=new Date().getMinutes();
  const c0=parseRgba(HOUR_COLORS[h]),c1=parseRgba(HOUR_COLORS[(h+1)%24]);
  document.getElementById('lightOverlay').style.background=lerpColor(c0,c1,m/60);
}
applyLight();
setInterval(applyLight,60000);
setInterval(renderPlots,30000);
