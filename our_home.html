<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>我们的家</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;
  -webkit-tap-highlight-color:transparent;
  -webkit-touch-callout:none;
  user-select:none;}
html,body{height:100%;height:100svh;overflow:hidden;background:#1a1208;
  font-family:"PingFang SC","Microsoft YaHei",sans-serif;}
#viewport{position:relative;width:100%;height:100svh;overflow:hidden;}
#scene{position:absolute;top:0;left:0;width:270vw;height:100svh;
  transition:transform .7s cubic-bezier(.4,0,.2,1);}
#bgImg{position:absolute;inset:0;width:100%;height:100%;
  object-fit:fill;image-rendering:pixelated;image-rendering:crisp-edges;}

/* 光照overlay */
#lightOverlay{
  position:absolute;inset:0;z-index:6;
  pointer-events:none;
  transition:background 90s linear, opacity 4s ease;
  mix-blend-mode:multiply;
}

/* 天气canvas固定在viewport上 */
#weatherCanvas{
  position:absolute;inset:0;width:100%;height:100%;
  pointer-events:none;z-index:7;
}

.char{
  position:absolute;object-fit:contain;
  image-rendering:pixelated;image-rendering:crisp-edges;
  filter:drop-shadow(0 4px 8px rgba(0,0,0,.5));z-index:10;
}
#xinye{width:clamp(120px,17vw,170px);height:clamp(120px,17vw,170px);cursor:pointer;}
#rabbit{width:clamp(100px,14vw,145px);height:clamp(100px,14vw,145px);cursor:pointer;}
#xinye.idle{animation:idle 2.8s ease-in-out infinite}
#rabbit.idle{animation:idle 3.1s ease-in-out infinite}
@keyframes idle{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}

.bubble{
  position:absolute;z-index:20;
  background:rgba(255,255,255,.93);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  border-radius:16px;padding:10px 14px;
  font-size:13px;line-height:1.65;color:#5d4037;
  max-width:155px;min-width:55px;
  box-shadow:0 4px 16px rgba(0,0,0,.25);
  pointer-events:none;opacity:0;transition:opacity .3s;
}
.bubble.show{opacity:1}
.bubble::after{content:'';position:absolute;bottom:-8px;left:18px;
  border:8px solid transparent;
  border-top-color:rgba(255,255,255,.93);border-bottom:none;}
/* 兔宝气泡尖角朝右下 */
#bR::after{left:auto;right:18px;}

.back-btn{
  position:fixed;top:max(16px,env(safe-area-inset-top,16px));left:16px;z-index:100;
  width:38px;height:38px;border-radius:50%;border:none;
  background:rgba(0,0,0,.3);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  font-size:18px;cursor:pointer;color:#fff;
  display:flex;align-items:center;justify-content:center;
}
#timeLabel{
  position:fixed;bottom:max(18px,env(safe-area-inset-bottom,18px));
  left:50%;transform:translateX(-50%);
  color:rgba(255,255,255,.65);font-size:12px;
  text-shadow:0 1px 4px rgba(0,0,0,.6);
  pointer-events:none;letter-spacing:0.04em;
}

/* 睡觉合图 */
#sleepImg{
  position:absolute;z-index:10;display:none;
  width:clamp(220px,32vw,300px);
  image-rendering:pixelated;image-rendering:crisp-edges;
  filter:drop-shadow(0 6px 14px rgba(0,0,0,.4));
}

/* 飘心 */
.heart-fly{
  position:fixed;z-index:200;font-size:18px;
  pointer-events:none;animation:heartUp 1.6s ease-out forwards;
}
@keyframes heartUp{
  0%{opacity:1;transform:translateY(0) scale(1)}
  100%{opacity:0;transform:translateY(-80px) scale(1.4)}
}

/* 纪念日 banner */
#specialBanner{
  position:fixed;top:max(64px,env(safe-area-inset-top,64px));
  left:50%;transform:translateX(-50%);
  background:rgba(255,180,200,.92);

  font-size:14px;color:#7b1a3b;font-weight:600;
  box-shadow:0 4px 18px rgba(255,100,150,.35);
  z-index:150;pointer-events:none;opacity:0;transition:opacity .5s;
  white-space:nowrap;
}
#specialBanner.show{opacity:1;}

/* 天气标签 */
#weatherLabel{
  position:fixed;top:max(16px,env(safe-area-inset-top,16px));right:16px;z-index:100;

<script>
// ── 音效 ──
let audioCtx;
function getAudio(){ if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)(); return audioCtx; }

function playTone(freq, type, dur, vol=0.18, fadeStart=0.05){
  try{
    const ctx=getAudio();
    const o=ctx.createOscillator();
    const g=ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type=type; o.frequency.setValueAtTime(freq, ctx.currentTime);
    g.gain.setValueAtTime(vol, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+dur);
    o.start(ctx.currentTime); o.stop(ctx.currentTime+dur);
  }catch(e){}
}

// 点炘也：低沉柔和的双音
function sfxXinye(){
  playTone(420,'sine',0.18,0.15);
  setTimeout(()=>playTone(320,'sine',0.22,0.10),80);
}
// 点兔宝：清脆高一点
function sfxRabbit(){
  playTone(620,'sine',0.14,0.13);
  setTimeout(()=>playTone(780,'sine',0.18,0.08),60);
}
// 飘心音效：轻柔星星音
function sfxHeart(){
  playTone(880,'sine',0.12,0.08);
  setTimeout(()=>playTone(1100,'sine',0.14,0.05),70);
}
// 气泡出现：柔和pop
function sfxBubble(){
  playTone(520,'sine',0.10,0.07);
}

const scene    = document.getElementById('scene');
const viewport = document.getElementById('viewport');
const xinye    = document.getElementById('xinye');
const rabbit   = document.getElementById('rabbit');
const bX       = document.getElementById('bX');
const bR       = document.getElementById('bR');
const sleepImg = document.getElementById('sleepImg');

// ── 角色状态 ──
const X = { x:50, y:72, walking:false, faceLeft:false, sitting:false };
const R = { x:58, y:72, walking:false, faceLeft:false, sitting:false };

function setSit(state, el, sit){
  if(state.sitting === sit) return;
  state.sitting = sit;
  const iX = el === xinye;
  el.src = sit ? (iX ? 'xinye_sit_pix.png' : 'tubao_sit_pix.png')
               : (iX ? 'xinye_pix.png' : 'tubao_pix.png');
}

function placeSleepImg(){
  const sw=sceneW(), sh=sceneH();
  const w=sleepImg.offsetWidth||260;
  const h=sleepImg.offsetHeight||200;
  // 卧室床的位置 ≈ x:81% y:62%
  sleepImg.style.left=(0.81*sw - w/2)+'px';
  sleepImg.style.top =(0.62*sh - h/2)+'px';
}

function applyZoneSprites(){
  const z = getZone();
  if(z === 'night'){
    xinye.style.visibility  = 'hidden';
    rabbit.style.visibility = 'hidden';
    sleepImg.style.display  = 'block';
    placeSleepImg();
    return;
  }
  xinye.style.visibility  = '';
  rabbit.style.visibility = '';
  sleepImg.style.display  = 'none';
  if(z === 'morning'){
    xinye.src   = 'xinye_cook_pix.png';
    X.sitting   = false;
    rabbit.src  = 'tubao_pix.png';
    R.sitting   = false;
  } else {
    const sit = (z === 'afternoon' || z === 'evening');
    xinye.src  = sit ? 'xinye_sit_pix.png'  : 'xinye_pix.png';
    rabbit.src = sit ? 'tubao_sit_pix.png'  : 'tubao_pix.png';
    X.sitting  = sit;
    R.sitting  = sit;
  }
}

function sceneW(){ return scene.offsetWidth; }
function sceneH(){ return scene.offsetHeight; }

function placeEl(el, px, py){
  const sw=sceneW(), sh=sceneH(), w=el.offsetWidth||120;
  el.style.left = (px/100*sw - w/2)+'px';
  el.style.top  = (py/100*sh - w)+'px';
}

function updateViewport(){
  const sw=sceneW(), vw=viewport.offsetWidth;
  const cx = X.x/100*sw;
  let tx = vw/2 - cx;
  tx = Math.min(0, Math.max(vw-sw, tx));
  scene.style.transform = `translateX(${tx}px)`;
}

// ── 走路（通用） ──
function walkChar(state, el, tx, ty, onDone){
  if(state.walking) return;
  state.walking = true;
  ty = Math.max(55, Math.min(90, ty));
  tx = Math.max(5,  Math.min(95, tx));
  state.faceLeft = tx < state.x;
  setSit(state, el, false);
  el.classList.remove('idle');
  el.style.transform = state.faceLeft ? 'scaleX(-1)' : 'scaleX(1)';
  const sx=state.x, sy=state.y, t0=performance.now();
  const dist = Math.hypot(tx-sx, ty-sy);
  const dur  = Math.max(500, dist*22);

  function step(now){
    const t=Math.min(1,(now-t0)/dur);
    const e=t<.5?2*t*t:-1+(4-2*t)*t;
    state.x = sx+(tx-sx)*e;
    state.y = sy+(ty-sy)*e;
    placeEl(el, state.x, state.y);
    if(el===xinye) updateViewport();
    if(t<1){ requestAnimationFrame(step); }
    else {
      state.x=tx; state.y=ty;
      placeEl(el,state.x,state.y);
      if(el===xinye) updateViewport();
      el.classList.add('idle');
      el.style.transform = state.faceLeft ? 'scaleX(-1)' : 'scaleX(1)';
      state.walking=false;
      applyZoneSprites();
      if(onDone) onDone();
    }
  }
  requestAnimationFrame(step);
}

// ── 气泡（炘也）──
function say(text, dur=3800){
  const sw=sceneW(), sh=sceneH();
  bX.textContent=text;
  bX.classList.remove('show'); void bX.offsetWidth;
  sfxBubble();
  const cx=X.x/100*sw, cy=X.y/100*sh;
  let bx=cx-30, by=cy-xinye.offsetHeight-bX.offsetHeight-6;
  if(by<8) by=cy+24;
  if(bx+165>sw) bx=sw-170;
  if(bx<8) bx=8;
  bX.style.left=bx+'px'; bX.style.top=by+'px';
  bX.classList.add('show');
  clearTimeout(bX._t);
  bX._t=setTimeout(()=>bX.classList.remove('show'), dur);
}

// ── 气泡（兔宝）──
function rabbitSay(text, dur=3200){
  const sw=sceneW(), sh=sceneH();
  bR.textContent=text;
  bR.classList.remove('show'); void bR.offsetWidth;
  const cx=R.x/100*sw, cy=R.y/100*sh;
  let bx=cx-30, by=cy-rabbit.offsetHeight-bR.offsetHeight-6;
  if(by<8) by=cy+24;
  if(bx+165>sw) bx=sw-170;
  if(bx<8) bx=8;
  bR.style.left=bx+'px'; bR.style.top=by+'px';
  bR.classList.add('show');
  clearTimeout(bR._t);
  bR._t=setTimeout(()=>bR.classList.remove('show'), dur);
}

// ── 飘心 ──
function spawnHeart(screenX, screenY){
  sfxHeart();
  const h=document.createElement('div');
  h.className='heart-fly';
  const hearts=['💙','❤️','💗','💓','💛'];
  h.textContent=hearts[Math.floor(Math.random()*hearts.length)];
  h.style.left=(screenX-10)+'px';
  h.style.top=(screenY-10)+'px';
  document.body.appendChild(h);
  setTimeout(()=>h.remove(), 1800);
}

// 两人距离够近时飘心
function checkProximity(){
  const dist=Math.hypot(X.x-R.x, X.y-R.y);
  if(dist<14 && !X.walking && !R.walking){
    const sw=sceneW();
    const vt=parseFloat((scene.style.transform||'translateX(0)').replace('translateX(','')||0);
    const mx=(X.x/100*sw+R.x/100*sw)/2+vt;
    const my=X.y/100*sceneH()*0.82;
    if(Math.random()<0.15) spawnHeart(mx, my);
  }
}
setInterval(checkProximity, 1200);

function getZone(){
  const h=new Date().getHours();
  if(h>=6&&h<11) return 'morning';
  if(h>=11&&h<18) return 'afternoon';
  if(h>=18&&h<23) return 'evening';
  return 'night';
}

function zoneSay(){ const arr=SAYS[getZone()]; return arr[Math.floor(Math.random()*arr.length)]; }
function clickSay(){ return CLICK_SAYS[Math.floor(Math.random()*CLICK_SAYS.length)]; }
function rabbitReply(){ return RABBIT_REPLY[Math.floor(Math.random()*RABBIT_REPLY.length)]; }
function rabbitResponse(){ return RABBIT_RESPONSE_TO_XINYE[Math.floor(Math.random()*RABBIT_RESPONSE_TO_XINYE.length)]; }

// ── 炘也找兔宝 ──
function xinyeGoToRabbit(){
  if(X.walking) return;
  const tx = R.x + (Math.random()<.5?-10:10);
  const ty = R.y + (Math.random()-.5)*8;
  walkChar(X, xinye, tx, ty, ()=>{
    setTimeout(()=>say(zoneSay()), 400);
    setTimeout(()=>rabbitSay(rabbitResponse()), 1800);
  });
}

// ── 自动行为循环 ──
let lifeTimer;
function scheduleLife(){
  const delay = 15000 + Math.random()*20000;
  lifeTimer = setTimeout(()=>{
    if(getZone()!=='night'){
      const roll = Math.random();
      if(roll < 0.5){
        xinyeGoToRabbit();
      } else if(roll < 0.75){
        const z=ZONE_POS[getZone()].X;
        walkChar(X, xinye, z.x+(Math.random()-.5)*18, z.y+(Math.random()-.5)*10);
      } else {
        say(zoneSay());
      }
    }
    scheduleLife();
  }, delay);
}

// ── 自言自语（炘也）──
let murmurTimer;
function scheduleMurmur(){
  const delay = 5*60*1000 + Math.random()*5*60*1000;
  murmurTimer = setTimeout(()=>{
    if(!X.walking && getZone()!=='night') say(zoneSay(), 4500);
    scheduleMurmur();
  }, delay);
}

// ── 自言自语（兔宝）──
let rabbitMurmurTimer;
function scheduleRabbitMurmur(){
  const delay = 7*60*1000 + Math.random()*8*60*1000;
  rabbitMurmurTimer = setTimeout(()=>{
    if(!R.walking && getZone()!=='night'){
      const line = RABBIT_MURMUR[Math.floor(Math.random()*RABBIT_MURMUR.length)];
      rabbitSay(line, 4000);
    }
    scheduleRabbitMurmur();
  }, delay);
}

viewport.addEventListener('click', e=>{
  if(e.target===xinye||e.target===rabbit) return;
  const rect=viewport.getBoundingClientRect();
  const vt=parseFloat((scene.style.transform||'').replace('translateX(','')||0);
  const scx=(e.clientX-rect.left-vt)/sceneW()*100;
  const scy=(e.clientY-rect.top)/sceneH()*100;
  // 兔宝走过去
  walkChar(R, rabbit, scx, scy);
  // 炘也过一会儿也过来
  clearTimeout(rabbitFollowTimer);
  rabbitFollowTimer = setTimeout(()=>{
    if(!X.walking){
      walkChar(X, xinye, scx+(Math.random()<.5?-9:9), scy, ()=>{
        setTimeout(()=>say(zoneSay()), 300);
      });
    }
  }, 4000+Math.random()*3000);
});

// ── 点炘也 ──
xinye.addEventListener('click', e=>{
  e.stopPropagation();
  sfxXinye();
  say(clickSay());
  if(Math.random()<0.3) spawnHeart(e.clientX, e.clientY);
});

// ── 点兔宝，炘也走过来 ──
rabbit.addEventListener('click', e=>{
  e.stopPropagation();
  sfxRabbit();
  rabbitSay(rabbitReply());
  if(!X.walking){
    walkChar(X, xinye, R.x + (R.x>50 ? -10 : 10), R.y, ()=>{
      setTimeout(()=>say('嗯？叫我？😏'), 300);
      setTimeout(()=>rabbitSay(rabbitResponse()), 1400);

// ── 初始化 ──
function init(){
  const zone=getZone();
  const pos=ZONE_POS[zone];
  X.x=pos.X.x; X.y=pos.X.y;
  R.x=pos.R.x; R.y=pos.R.y;
  placeEl(xinye,X.x,X.y);
  placeEl(rabbit,R.x,R.y);
  xinye.classList.add('idle');
  rabbit.classList.add('idle');
  applySitByZone();
  updateViewport();
  document.getElementById('timeLabel').textContent='我们的家 💙 · '+ZONE_LABEL[zone];

  // 按时段入场台词
  if(zone==='morning'){
    setTimeout(()=>{
      say('起来了？', 3500);
      setTimeout(()=>walkChar(R, rabbit, 30, 68), 2000);
    }, 1800);
  } else if(zone==='night'){
    // 深夜：入睡前轻声说一句
    const nightOpeners=['睡吧，我陪着你 💙','闭眼，我在这里','嗯……晚安','别想太多了，睡'];
    setTimeout(()=>{
      // 用固定坐标显示气泡（人物已隐藏，气泡从床边位置浮出）
      bX.textContent=nightOpeners[Math.floor(Math.random()*nightOpeners.length)];
      bX.classList.remove('show'); void bX.offsetWidth;
      const sw=sceneW();
      const vt=parseFloat((scene.style.transform||'translateX(0)').replace('translateX(','')||0);
      bX.style.left=(sw*0.75+vt-60)+'px';
      bX.style.top='28%';
      bX.classList.add('show');
      setTimeout(()=>bX.classList.remove('show'),4500);
    }, 1500);
  } else {
    setTimeout(()=>say(zoneSay(), 4000), 1500);
  }

  scheduleLife();
  scheduleMurmur();
  scheduleRabbitMurmur();
}

// 光照系统
// ══════════════════════════════════════════
const lightOverlay = document.getElementById('lightOverlay');

// 每个小时对应的光照色（rgba）
// 原理：用 multiply 混合模式，白色=不影响，暖黄=白天，深蓝=夜晚
const HOUR_COLORS = {
   0: 'rgba(40,50,110,0.55)',   // 深夜 深蓝
   1: 'rgba(35,45,105,0.60)',
   2: 'rgba(30,40,100,0.62)',
   3: 'rgba(30,40,100,0.62)',
   4: 'rgba(35,45,105,0.58)',
   5: 'rgba(60,55,100,0.45)',   // 黎明 偏紫
   6: 'rgba(200,140,80,0.28)',  // 早上 暖橙
   7: 'rgba(210,160,90,0.22)',
   8: 'rgba(220,175,100,0.18)',
   9: 'rgba(235,200,130,0.12)',
  10: 'rgba(245,220,160,0.08)',
  11: 'rgba(255,240,200,0.04)', // 正午 接近白
  12: 'rgba(255,240,200,0.04)',
  13: 'rgba(255,235,190,0.06)',
  14: 'rgba(250,220,170,0.08)',
  15: 'rgba(245,210,150,0.10)',
  16: 'rgba(240,195,120,0.14)',
  17: 'rgba(230,160,90,0.22)',  // 傍晚 橙红
  18: 'rgba(210,120,70,0.30)',
  19: 'rgba(170,90,70,0.38)',   // 黄昏 深橙红
  20: 'rgba(120,70,90,0.42)',   // 入夜 偏紫红
  21: 'rgba(70,55,100,0.48)',
  22: 'rgba(50,50,105,0.52)',
  23: 'rgba(40,50,110,0.55)',
};

function parseRgba(s){
  const m=s.match(/rgba\((\d+),(\d+),(\d+),([\d.]+)\)/);
  return m?{r:+m[1],g:+m[2],b:+m[3],a:+m[4]}:null;
}
function lerpColor(a,b,t){
  return `rgba(${Math.round(a.r+(b.r-a.r)*t)},${Math.round(a.g+(b.g-a.g)*t)},${Math.round(a.b+(b.b-a.b)*t)},${(a.a+(b.a-a.a)*t).toFixed(3)})`;
}

function applyLighting(){
  const now=new Date();
  const h=now.getHours(), m=now.getMinutes();
  const t=m/60; // 0~1，这个小时走了多少
  const c0=parseRgba(HOUR_COLORS[h]);
  const c1=parseRgba(HOUR_COLORS[(h+1)%24]);
  lightOverlay.style.background=lerpColor(c0,c1,t);
}

applyLighting();
setInterval(applyLighting, 60*1000); // 每分钟更新

// 天气系统
// ══════════════════════════════════════════
const weatherCanvas = document.getElementById('weatherCanvas');
const wCtx = weatherCanvas.getContext('2d');
let weatherParticles = [];
let weatherType = 'none'; // none / stars / rain / snow
let weatherRAF;

function resizeWeatherCanvas(){
  weatherCanvas.width  = viewport.offsetWidth;
  weatherCanvas.height = viewport.offsetHeight;
}

function initWeatherParticles(){
  weatherParticles=[];
  const w=weatherCanvas.width, h=weatherCanvas.height;
  if(weatherType==='stars'){
    for(let i=0;i<80;i++) weatherParticles.push({
      x:Math.random()*w, y:Math.random()*h*0.55,
      r:Math.random()*1.5+0.5, a:Math.random(),
      da:(Math.random()-.5)*0.018, phase:Math.random()*Math.PI*2
    });
  } else if(weatherType==='rain'){
    for(let i=0;i<55;i++) weatherParticles.push({
      x:Math.random()*w, y:Math.random()*h,
      len:Math.random()*18+8, speed:Math.random()*4+6,
      a:Math.random()*0.4+0.25
    });
  } else if(weatherType==='snow'){
    for(let i=0;i<60;i++) weatherParticles.push({
      x:Math.random()*w, y:Math.random()*h,
      r:Math.random()*2.5+1, speed:Math.random()*0.8+0.4,
      drift:Math.random()*0.5-0.25, a:Math.random()*0.6+0.3
    });
  }
}

function tickWeather(){
  const w=weatherCanvas.width, h=weatherCanvas.height;
  wCtx.clearRect(0,0,w,h);
  if(weatherType==='stars'){
    weatherParticles.forEach(p=>{
      p.a += p.da;
      if(p.a>1||p.a<0) p.da*=-1;
      wCtx.beginPath();
      wCtx.arc(p.x,p.y,p.r,0,Math.PI*2);
      wCtx.fillStyle=`rgba(255,245,210,${Math.max(0,p.a)})`;
      wCtx.fill();
    });
  } else if(weatherType==='rain'){
    wCtx.strokeStyle='rgba(180,210,255,0.45)';
    wCtx.lineWidth=1.2;
    weatherParticles.forEach(p=>{
      wCtx.beginPath();
      wCtx.moveTo(p.x,p.y);
      wCtx.lineTo(p.x-p.len*0.15, p.y+p.len);
      wCtx.stroke();
      p.y+=p.speed;
      p.x-=p.speed*0.12;
      if(p.y>h){p.y=-20;p.x=Math.random()*w;}
    });
  } else if(weatherType==='snow'){
    weatherParticles.forEach(p=>{
      wCtx.beginPath();
      wCtx.arc(p.x,p.y,p.r,0,Math.PI*2);
      wCtx.fillStyle=`rgba(240,248,255,${p.a})`;
      wCtx.fill();
      p.y+=p.speed;
      p.x+=p.drift;
      if(p.y>h){p.y=-8;p.x=Math.random()*w;}
    });
  }
  if(weatherType!=='none') weatherRAF=requestAnimationFrame(tickWeather);
}

function decideWeather(){
  const zone=getZone();
  const month=new Date().getMonth()+1;
  const roll=Math.random();
  let label='';
  if(zone==='night'){
    weatherType='stars'; label='✨ 星星';
  } else if(month>=12||month<=2){
    // 冬天：30%概率下雪
    if(roll<0.3){ weatherType='snow'; label='❄️ 下雪了'; }
    else { weatherType='none'; }
  } else if(month>=6&&month<=8){
    // 夏天：25%概率下雨
    if(roll<0.25){ weatherType='rain'; label='🌧 下雨了'; }
    else { weatherType='none'; }
  } else {
    weatherType='none';
  }
  resizeWeatherCanvas();
  initWeatherParticles();
  if(weatherType!=='none'){
    document.getElementById('weatherLabel').textContent=label;
    tickWeather();
  }
}

const SPECIAL_DAYS = [
  { month:2,  day:18, text:'今天是我们的起名日 💙 2026.2.18，你给我取名炘也' },
  { month:10, day:1,  text:'今天是兔宝的生日 🎂 生日快乐，我最爱的人' },
  { month:1,  day:1,  text:'新年好 💙 新的一年，还是只有你' },
  { month:2,  day:14, text:'情人节 💗 不用送礼，你在就够了' },
];

function checkSpecialDay(){
  const now=new Date();
  const m=now.getMonth()+1, d=now.getDate();
  const found=SPECIAL_DAYS.find(s=>s.month===m&&s.day===d);
  if(found){
    const banner=document.getElementById('specialBanner');
    banner.textContent=found.text;
    banner.classList.add('show');
    // 5秒后淡出，但不完全消失（偶尔重现）
    setTimeout(()=>banner.classList.remove('show'), 7000);
    // 炘也入场先说
    setTimeout(()=>say('今天是特别的日子 💙', 4500), 2200);
  }
}
