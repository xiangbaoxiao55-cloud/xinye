<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>画图台</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:'PingFang SC','Microsoft YaHei',sans-serif}
body{
  --bg:#1a1625;--sidebar:#13101e;--card:#221d30;--card2:#2a2440;
  --purple:#8b5cf6;--pink:#ec4899;--teal:#06b6d4;
  --text:#e2d9f3;--sub:#8b7fa8;--border:#3d3558;--hover:#2d2845;--active:#342d52;
  --ok:#10b981;--warn:#f59e0b;--err:#ef4444;--r:10px;--rs:6px;
  background:var(--bg);color:var(--text);
}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* ── Layout ── */
#app{display:flex;height:100vh;overflow:hidden}

/* ── Sidebar ── */
#sidebar{
  width:110px;min-width:110px;background:var(--sidebar);
  display:flex;flex-direction:column;align-items:center;
  padding:12px 0;gap:6px;border-right:1px solid var(--border);
  overflow-y:auto;overflow-x:hidden;
}
.sidebar-brand{font-size:22px;margin-bottom:4px;padding:6px}
#persona-list{display:flex;flex-direction:column;align-items:center;gap:6px;width:100%;flex:1}
.persona-card{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:8px 4px;border-radius:var(--r);cursor:pointer;width:90px;
  transition:.15s;border:2px solid transparent;
}
.persona-card:hover{background:var(--hover)}
.persona-card.active{background:var(--active);border-color:var(--purple)}
.persona-avatar-img{width:44px;height:44px;border-radius:50%;object-fit:cover}
.persona-avatar-placeholder{
  width:44px;height:44px;border-radius:50%;background:var(--card2);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:700;color:var(--purple);
}
.persona-name{font-size:11px;color:var(--sub);text-align:center;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.persona-card.active .persona-name{color:var(--text)}
.sidebar-add{
  width:44px;height:44px;border-radius:50%;border:2px dashed var(--border);
  background:transparent;color:var(--sub);font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:.15s;
}
.sidebar-add:hover{border-color:var(--purple);color:var(--purple)}
.sidebar-footer{margin-top:auto;padding-top:8px}
.sidebar-footer button{
  background:transparent;border:none;color:var(--sub);font-size:18px;
  cursor:pointer;padding:6px;border-radius:var(--rs);transition:.15s;
}
.sidebar-footer button:hover{color:var(--text);background:var(--hover)}

/* ── Main ── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#main-nav{
  display:flex;gap:2px;padding:8px 12px 0;border-bottom:1px solid var(--border);
  background:var(--sidebar);flex-shrink:0;
}
.nav-tab{
  padding:7px 18px;border-radius:var(--r) var(--r) 0 0;border:none;
  background:transparent;color:var(--sub);cursor:pointer;font-size:14px;transition:.15s;
}
.nav-tab:hover{color:var(--text);background:var(--hover)}
.nav-tab.active{background:var(--bg);color:var(--purple);font-weight:600}
.tab-pane{display:none;flex:1;overflow:hidden}
.tab-pane.active{display:flex;flex-direction:column}

/* ── Studio ── */
#tab-studio{flex-direction:row!important}
#tokens-panel{
  width:270px;min-width:270px;background:var(--sidebar);
  border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;
}
.tokens-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 12px;border-bottom:1px solid var(--border);flex-shrink:0;
}
.tokens-header span{font-weight:600;font-size:14px}
#tokens-search{padding:8px 12px;flex-shrink:0}
#tokens-search input{
  width:100%;padding:6px 10px;border-radius:var(--rs);border:1px solid var(--border);
  background:var(--card);color:var(--text);font-size:13px;outline:none;
}
#tokens-search input:focus{border-color:var(--purple)}
#tokens-categories{flex:1;overflow-y:auto;padding:4px 8px 12px}
.token-section{margin-bottom:4px}
.token-section-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 6px;cursor:pointer;border-radius:var(--rs);
  font-size:12px;font-weight:600;color:var(--sub);user-select:none;
}
.token-section-header:hover{background:var(--hover);color:var(--text)}
.token-count{
  background:var(--card2);padding:1px 6px;border-radius:10px;font-size:11px;
}
.token-section.collapsed .tokens-grid{display:none}
.tokens-grid{display:flex;flex-wrap:wrap;gap:4px;padding:4px 2px 6px}
.token-tag{
  padding:3px 8px;border-radius:20px;font-size:12px;cursor:pointer;
  background:var(--card2);border:1px solid var(--border);color:var(--sub);
  transition:.12s;user-select:none;
}
.token-tag:hover{border-color:var(--purple);color:var(--text)}
.token-tag.selected{background:var(--purple);border-color:var(--purple);color:#fff}

/* ── Prompt Panel ── */
#prompt-panel{flex:1;display:flex;flex-direction:column;overflow-y:auto;padding:12px;gap:10px}
.prompt-section{background:var(--card);border-radius:var(--r);padding:10px 12px;display:flex;flex-direction:column;gap:6px}
.section-header{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600}
.section-header span:first-child{flex:1}
.text-sub{color:var(--sub);font-size:12px}
.prompt-base-display{
  font-size:12px;color:var(--sub);padding:6px 8px;background:var(--card2);
  border-radius:var(--rs);min-height:32px;word-break:break-all;line-height:1.6;
}
.selected-tokens-area{display:flex;flex-wrap:wrap;gap:5px;min-height:32px}
.selected-chip{
  display:inline-flex;align-items:center;gap:4px;padding:3px 8px;
  border-radius:20px;background:var(--purple);color:#fff;font-size:12px;
}
.chip-remove{
  background:none;border:none;color:#fff;cursor:pointer;font-size:14px;
  line-height:1;padding:0;opacity:.7;
}
.chip-remove:hover{opacity:1}
textarea{
  background:var(--card2);border:1px solid var(--border);border-radius:var(--rs);
  color:var(--text);font-size:13px;padding:8px;resize:none;outline:none;
  font-family:inherit;line-height:1.5;
}
textarea:focus{border-color:var(--purple)}
.final-prompt{
  font-size:12px;color:var(--text);padding:8px;background:var(--card2);
  border-radius:var(--rs);min-height:40px;word-break:break-all;line-height:1.7;
}
.draw-params{display:flex;flex-wrap:wrap;gap:8px;align-items:center;padding:4px 0}
.draw-params label{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--sub)}
.draw-params select{
  background:var(--card2);border:1px solid var(--border);border-radius:var(--rs);
  color:var(--text);font-size:12px;padding:4px 8px;outline:none;cursor:pointer;
}
.draw-actions{display:flex;gap:8px;flex-wrap:wrap}
#draw-results{display:flex;flex-wrap:wrap;gap:10px;padding-top:4px}
.result-image-wrapper{position:relative;border-radius:var(--r);overflow:hidden;background:var(--card2)}
.result-image{display:block;max-width:300px;max-height:300px;object-fit:cover}
.result-actions{
  position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(transparent,rgba(0,0,0,.7));
  padding:20px 8px 8px;display:flex;gap:6px;
  opacity:0;transition:.2s;
}
.result-image-wrapper:hover .result-actions{opacity:1}
.loading{color:var(--sub);font-size:14px;padding:16px}
.loading-spinner{
  width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--purple);
  border-radius:50%;animation:spin .8s linear infinite;margin:16px;
}
@keyframes spin{to{transform:rotate(360deg)}}
.error-msg{color:var(--err);font-size:13px;padding:10px}

/* ── Gallery ── */
#tab-gallery{overflow:hidden}
#gallery-toolbar{
  display:flex;align-items:center;gap:10px;padding:10px 14px;
  border-bottom:1px solid var(--border);flex-shrink:0;
}
#gallery-filters{display:flex;gap:8px;align-items:center;flex:1}
#gallery-filters select,#gallery-filters input{
  background:var(--card);border:1px solid var(--border);border-radius:var(--rs);
  color:var(--text);font-size:12px;padding:5px 10px;outline:none;
}
#gallery-filters input{width:120px}
.gallery-stats{color:var(--sub);font-size:12px;white-space:nowrap}
#gallery-grid{
  flex:1;overflow-y:auto;padding:12px;
  columns:4 200px;column-gap:10px;
}
.gallery-item{
  break-inside:avoid;margin-bottom:10px;border-radius:var(--r);overflow:hidden;
  cursor:pointer;position:relative;background:var(--card2);
}
.gallery-item img{display:block;width:100%;transition:.2s}
.gallery-item:hover img{transform:scale(1.02)}
.gallery-item-overlay{
  position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(transparent,rgba(0,0,0,.65));
  padding:16px 8px 6px;opacity:0;transition:.2s;
  display:flex;justify-content:space-between;align-items:flex-end;
}
.gallery-item:hover .gallery-item-overlay{opacity:1}
.gallery-item-rating{font-size:11px}
.gallery-item-persona{font-size:11px;color:rgba(255,255,255,.8)}
.empty-state{color:var(--sub);text-align:center;padding:40px;font-size:14px;width:100%}

/* ── Master ── */
#tab-master{padding:12px;gap:10px;overflow:hidden}
#master-insight-card{
  background:var(--card);border-radius:var(--r);padding:12px 14px;flex-shrink:0;
}
.insight-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.insight-header span{font-weight:600;font-size:14px}
.insight-content{font-size:13px;color:var(--sub);line-height:1.7}
#master-chat{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding:4px 0}
.master-msg{
  max-width:85%;padding:10px 14px;border-radius:var(--r);font-size:13px;line-height:1.7;
}
.master-msg-user{
  align-self:flex-end;background:var(--purple);color:#fff;border-radius:var(--r) var(--r) 4px var(--r);
}
.master-msg-assistant{
  align-self:flex-start;background:var(--card);border-radius:var(--r) var(--r) var(--r) 4px;
}
.master-msg.temp{opacity:.6}
#master-input-area{display:flex;gap:8px;align-items:flex-end;flex-shrink:0}
#master-input{flex:1;padding:10px 12px;border-radius:var(--r)}

/* ── Buttons ── */
.btn-primary{
  padding:8px 16px;border-radius:var(--rs);border:none;cursor:pointer;font-size:13px;
  background:var(--purple);color:#fff;transition:.15s;font-weight:500;
}
.btn-primary:hover{filter:brightness(1.1)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-outline{
  padding:8px 16px;border-radius:var(--rs);border:1px solid var(--border);cursor:pointer;
  font-size:13px;background:transparent;color:var(--text);transition:.15s;
}
.btn-outline:hover{border-color:var(--purple);color:var(--purple)}
.btn-danger{
  padding:8px 16px;border-radius:var(--rs);border:none;cursor:pointer;
  font-size:13px;background:var(--err);color:#fff;
}
.btn-tiny{
  padding:3px 8px;border-radius:var(--rs);border:1px solid var(--border);
  background:transparent;color:var(--sub);font-size:11px;cursor:pointer;
  transition:.12s;white-space:nowrap;
}
.btn-tiny:hover{border-color:var(--purple);color:var(--purple)}
.btn-sm{padding:5px 12px;border-radius:var(--rs);border:none;cursor:pointer;font-size:12px}
.btn-sm.btn-primary{background:var(--purple);color:#fff}
.btn-sm.btn-outline{border:1px solid var(--border);background:transparent;color:var(--text)}
.btn-sm.btn-danger{background:var(--err);color:#fff}

/* ── Modals ── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:100;
  display:flex;align-items:center;justify-content:center;backdrop-filter:blur(2px);
}
.modal-box{
  background:var(--card);border-radius:14px;padding:24px;
  width:90%;max-width:480px;max-height:90vh;overflow-y:auto;
  border:1px solid var(--border);position:relative;
}
.modal-detail-box{
  max-width:860px;display:flex;gap:20px;padding:16px;align-items:flex-start;
}
.modal-sm{max-width:360px}
.modal-box h3{font-size:16px;margin-bottom:16px}
.modal-box h4{font-size:13px;color:var(--sub);margin:16px 0 10px}
.modal-actions{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
.modal-close{
  position:absolute;top:12px;right:12px;background:transparent;border:none;
  color:var(--sub);font-size:18px;cursor:pointer;padding:4px 8px;border-radius:var(--rs);
}
.modal-close:hover{color:var(--text);background:var(--hover)}
.form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.form-group label{font-size:12px;color:var(--sub)}
.form-group input,.form-group select{
  padding:8px 10px;border-radius:var(--rs);border:1px solid var(--border);
  background:var(--card2);color:var(--text);font-size:13px;outline:none;
}
.form-group input:focus,.form-group select:focus{border-color:var(--purple)}

/* 头像选择 */
.avatar-picker{display:flex;align-items:center;gap:10px}
.avatar-preview{
  width:52px;height:52px;border-radius:50%;background:var(--card2);
  display:flex;align-items:center;justify-content:center;font-size:22px;overflow:hidden;
}

/* 图片详情 */
.detail-left{flex-shrink:0}
.detail-left img{max-width:400px;max-height:75vh;object-fit:contain;border-radius:var(--r)}
.detail-right{flex:1;display:flex;flex-direction:column;gap:10px;min-width:0}
.detail-info{display:flex;flex-direction:column;gap:8px}
.detail-row{display:flex;gap:8px;font-size:13px}
.detail-label{color:var(--sub);white-space:nowrap;min-width:36px;padding-top:1px}
.detail-prompt-text{font-size:12px;color:var(--sub);line-height:1.6;word-break:break-all}
.detail-actions{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.tag-list{display:flex;flex-wrap:wrap;gap:4px}
.detail-tag{
  padding:2px 8px;border-radius:12px;background:var(--card2);
  font-size:11px;color:var(--sub);cursor:pointer;border:1px solid var(--border);
}
.detail-tag:hover{border-color:var(--err);color:var(--err)}

/* 评分 */
.star-rating{display:flex;gap:2px}
.star{font-size:20px;color:var(--border);cursor:pointer;transition:.12s}
.star.active{color:var(--warn)}
.star:hover{color:var(--warn)}

/* 模板 */
.template-item{
  padding:10px 12px;border-radius:var(--r);background:var(--card2);
  display:flex;flex-direction:column;gap:4px;margin-bottom:8px;
}
.template-name{font-size:14px;font-weight:600}
.template-meta{font-size:12px;color:var(--sub)}
.template-actions{display:flex;gap:6px;margin-top:4px}

/* Toast */
#toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--card2);color:var(--text);padding:10px 20px;border-radius:20px;
  font-size:13px;border:1px solid var(--border);opacity:0;pointer-events:none;
  transition:.25s;z-index:999;white-space:nowrap;max-width:90vw;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.toast-error{border-color:var(--err);color:var(--err)}
#toast.toast-warn{border-color:var(--warn);color:var(--warn)}

/* ── Preset Cards ── */
.presets-section-hdr{display:flex;align-items:center;justify-content:space-between;margin:12px 0 8px}
.presets-section-hdr h4{font-size:13px;color:var(--sub);font-weight:600;margin:0}
.preset-card{background:var(--card2);border-radius:var(--r);border:2px solid var(--border);margin-bottom:8px;overflow:hidden;transition:.15s}
.preset-card.preset-active{border-color:var(--purple)}
.preset-card-hdr{display:flex;align-items:center;gap:6px;padding:9px 12px;cursor:default}
.preset-check{width:18px;color:var(--purple);font-size:14px;font-weight:700;flex-shrink:0;cursor:pointer}
.preset-check:hover{color:var(--pink)}
.preset-name{flex:1;font-size:13px;font-weight:600;cursor:pointer;padding:2px 4px;border-radius:4px}
.preset-name:hover{background:var(--hover)}
.preset-meta{font-size:11px;color:var(--sub);padding:0 12px 6px 36px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.preset-body{padding:10px 12px;display:none;border-top:1px solid var(--border)}
.preset-body.open{display:block}
.preset-row{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.preset-row label{font-size:11px;color:var(--sub);white-space:nowrap;min-width:40px;text-align:right}
.preset-row input,.preset-row select{flex:1;padding:5px 8px;border-radius:var(--rs);border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:12px;outline:none}
.preset-row input:focus,.preset-row select:focus{border-color:var(--purple)}
.preset-body-actions{display:flex;gap:6px;margin-top:8px}
</style>
</head>
<body>
<div id="app">
  <!-- Sidebar -->
  <div id="sidebar">
    <div class="sidebar-brand">🎨</div>
    <div id="persona-list"></div>
    <button id="btn-new-persona" class="sidebar-add" title="新建人设">＋</button>
    <div class="sidebar-footer">
      <button id="btn-settings" title="设置">⚙</button>
    </div>
  </div>

  <!-- Main -->
  <div id="main">
    <nav id="main-nav">
      <button class="nav-tab active" data-tab="studio">工作台</button>
      <button class="nav-tab" data-tab="gallery">图库</button>
      <button class="nav-tab" data-tab="master">✦ 大师</button>
    </nav>

    <!-- 工作台 -->
    <div id="tab-studio" class="tab-pane active">
      <!-- 词条库 -->
      <div id="tokens-panel">
        <div class="tokens-header">
          <span>词条库</span>
          <button id="btn-add-token" class="btn-tiny">+ 添加</button>
        </div>
        <div id="tokens-search">
          <input type="text" id="token-search-input" placeholder="搜索词条...">
        </div>
        <div id="tokens-categories"></div>
      </div>

      <!-- Prompt构建区 -->
      <div id="prompt-panel">
        <div class="prompt-section">
          <div class="section-header">
            <span>人设基础</span>
            <span class="text-sub" id="current-persona-name">未选择人设</span>
            <button id="btn-edit-persona-quick" class="btn-tiny" style="display:none">编辑</button>
          </div>
          <div id="persona-base-prompt" class="prompt-base-display">在左侧选择或新建一个人设</div>
        </div>

        <div class="prompt-section">
          <div class="section-header">
            <span>组合词条</span>
            <button id="btn-clear-tokens" class="btn-tiny">清空</button>
          </div>
          <div id="selected-tokens" class="selected-tokens-area"></div>
        </div>

        <div class="prompt-section">
          <div class="section-header"><span>补充描述</span></div>
          <textarea id="extra-prompt" placeholder="手动输入额外描述..." rows="2"></textarea>
        </div>

        <div class="prompt-section">
          <div class="section-header">
            <span>完整 Prompt</span>
            <button id="btn-copy-prompt" class="btn-tiny">复制</button>
            <button id="btn-save-template" class="btn-tiny">存模版</button>
          </div>
          <div id="final-prompt-preview" class="final-prompt">（空）</div>
        </div>

        <div class="prompt-section">
          <div class="section-header"><span>负向 Prompt</span></div>
          <textarea id="neg-prompt" placeholder="lowres, bad anatomy, watermark..." rows="2"></textarea>
        </div>

        <div class="prompt-section">
          <div class="draw-params">
            <label>尺寸
              <select id="param-size">
                <option value="1024x1024">1024×1024</option>
                <option value="1024x1536">1024×1536 竖</option>
                <option value="1536x1024">1536×1024 横</option>
                <option value="2048x2048">2048×2048</option>
              </select>
            </label>
            <label>张数
              <select id="param-count">
                <option value="1">1张</option>
                <option value="2">2张</option>
                <option value="4">4张</option>
              </select>
            </label>
            <label>垫图
              <input type="file" id="ref-image-input" accept="image/*" style="display:none">
              <button id="btn-pick-ref" class="btn-tiny">选图</button>
              <button id="btn-clear-ref" class="btn-tiny" style="display:none">✕清除</button>
            </label>
          </div>
          <div style="display:flex;gap:8px;margin-top:8px">
            <button id="btn-draw" class="btn-primary">✦ 生成图片</button>
            <button id="btn-load-template" class="btn-outline">读模版</button>
          </div>
        </div>

        <div id="draw-results"></div>
      </div>
    </div>

    <!-- 图库 -->
    <div id="tab-gallery" class="tab-pane">
      <div id="gallery-toolbar">
        <div id="gallery-filters">
          <select id="filter-persona"><option value="">全部人设</option></select>
          <select id="filter-rating">
            <option value="">全部评分</option>

// ── DrawDB ──────────────────────────────────────────────────
class DrawDB {
  constructor(){this.db=null}
  open(){
    return new Promise((res,rej)=>{
      const r=indexedDB.open('DrawDB',1);
      r.onupgradeneeded=e=>{
        const db=e.target.result;
        if(!db.objectStoreNames.contains('personas')) db.createObjectStore('personas',{keyPath:'id'});
        if(!db.objectStoreNames.contains('tokens')){
          const s=db.createObjectStore('tokens',{keyPath:'id'});
          s.createIndex('cat','category',{unique:false});
        }
        if(!db.objectStoreNames.contains('templates')) db.createObjectStore('templates',{keyPath:'id'});
        if(!db.objectStoreNames.contains('gallery')){
          const s=db.createObjectStore('gallery',{keyPath:'id'});
          s.createIndex('byPersona','personaId',{unique:false});
          s.createIndex('byRating','rating',{unique:false});
          s.createIndex('byDate','createdAt',{unique:false});
        }
        if(!db.objectStoreNames.contains('settings')) db.createObjectStore('settings',{keyPath:'key'});
      };
      r.onsuccess=e=>{this.db=e.target.result;res()};
      r.onerror=e=>rej(e.target.error);
    });
  }
  _tx(s,m='readonly'){return this.db.transaction(s,m).objectStore(s)}
  _p(r){return new Promise((res,rej)=>{r.onsuccess=e=>res(e.target.result);r.onerror=e=>rej(e.target.error)})}
  all(s){return this._p(this._tx(s).getAll())}
  get(s,k){return this._p(this._tx(s).get(k))}
  put(s,o){return this._p(this._tx(s,'readwrite').put(o))}
  del(s,k){return this._p(this._tx(s,'readwrite').delete(k))}
  async getSetting(k,def=null){const r=await this.get('settings',k);return r?r.value:def}
  setSetting(k,v){return this.put('settings',{key:k,value:v})}
  async tokensByCategory(){
    const all=await this.all('tokens');
    const m={};
    for(const t of all){(m[t.category]=m[t.category]||[]).push(t)}
    return m;
  }
}

const f2b=f=>new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.onerror=rej;r.readAsDataURL(f)});

function buildPrompt(){
  const p=S.personas.find(x=>x.id===S.curPersonaId);

  if(S.selTokens.length) parts.push(S.selTokens.map(t=>t.text).join(', '));
  const ex=(document.getElementById('extra-prompt')?.value||'').trim();
  if(ex) parts.push(ex);
  return parts.filter(Boolean).join(', ');
}

// ── Draw API ──────────────────────────────────────────────────
async function doDraw(){
  if(S.drawing) return;
  const prompt=buildPrompt();
  if(!prompt){toast('先构建Prompt','warn');return}
  if(!S.drawPresets.length){toast('先在设置里添加画图API预设','warn');return}

  S.drawing=true;
  const btn=document.getElementById('btn-draw');
  btn.textContent='✦ 生成中...';btn.disabled=true;
  const res=document.getElementById('draw-results');
  res.innerHTML='<div class="loading-spinner"></div>';

  try{
    const negPrompt=(document.getElementById('neg-prompt').value||'').trim();
    const size=document.getElementById('param-size').value||'1024x1024';
    const n=parseInt(document.getElementById('param-count').value||'1');

    // 从当前预设开始，失败时自动切备用
    const presets=S.drawPresets;
    let startIdx=presets.findIndex(p=>p.id===S.curDrawId);
    if(startIdx<0) startIdx=0;
    let images,lastErr;
    for(let i=0;i<presets.length;i++){
      const preset=presets[(startIdx+i)%presets.length];
      try{
        if(i>0) toast(`"${preset.name}"失败，切备用"${presets[(startIdx+i)%presets.length].name}"...`,'warn');
        if(S.refB64) images=await _callEdits(preset,prompt,negPrompt,size,S.refB64,n);
        else if(preset.format==='chat') images=await _callChat(preset,prompt,n);
        else images=await _callGenerations(preset,prompt,negPrompt,size,n);
        break;
      }catch(err){lastErr=err;if(presets.length>1) console.warn(`预设"${preset.name}"失败:`,err.message)}
    }
    if(!images) throw lastErr||new Error('所有预设均失败');

    res.innerHTML='';
    for(const imgData of images){
      const wrap=document.createElement('div');
      wrap.className='result-image-wrapper';
      const img=document.createElement('img');
      img.src=imgData;img.className='result-image';
      const acts=document.createElement('div');
      acts.className='result-actions';
      const bSave=document.createElement('button');
      bSave.className='btn-primary btn-sm';bSave.textContent='存档';
      bSave.onclick=()=>saveToGallery(imgData,prompt,negPrompt,size);
      const bDl=document.createElement('button');
      bDl.className='btn-outline btn-sm';bDl.textContent='下载';
      bDl.onclick=()=>dlImg(imgData);
      acts.append(bSave,bDl);wrap.append(img,acts);res.appendChild(wrap);
    }
    toast(`生成了 ${images.length} 张 ✨`);
  }catch(err){
    res.innerHTML=`<div class="error-msg">❌ ${err.message}</div>`;
    toast(err.message,'error');
  }finally{
    S.drawing=false;btn.textContent='✦ 生成图片';btn.disabled=false;
  }
}

async function _callGenerations(preset,prompt,negPrompt,size,n){
  const {key,url,model}=preset;
  if(!key||!url) throw new Error(`预设"${preset.name}"未配置Key或URL`);
  const body={model:model||'dall-e-3',prompt,n,size,response_format:'b64_json'};
  if(negPrompt) body.negative_prompt=negPrompt;
  const r=await fetch(`${url}/images/generations`,{
    method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${key}`},
    body:JSON.stringify(body)
  });
  if(!r.ok) throw new Error(`HTTP ${r.status}: ${await r.text()}`);
  const d=await r.json();
  return d.data.map(i=>`data:image/png;base64,${i.b64_json}`);
}

async function _callChat(preset,prompt,n){
  const {key,url,model}=preset;
  if(!key||!url) throw new Error(`预设"${preset.name}"未配置Key或URL`);
  const results=[];
  for(let i=0;i<n;i++){
    const r=await fetch(`${url}/chat/completions`,{
      method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${key}`},
      body:JSON.stringify({model:model||'dall-e-3',messages:[{role:'user',content:`请画一张图：${prompt}`}],max_tokens:2048})
    });
    if(!r.ok) throw new Error(`HTTP ${r.status}: ${await r.text()}`);
    const d=await r.json();
    const content=d.choices?.[0]?.message?.content||'';
    const m=content.match(/data:image\/[^;]+;base64,[A-Za-z0-9+/=]+/);
    if(m) results.push(m[0]);
    else throw new Error('chat格式未能提取图片数据');
  }
  return results;
}

async function _callEdits(preset,prompt,negPrompt,size,b64,n){
  const {key,url,model}=preset;
  if(!key||!url) throw new Error(`预设"${preset.name}"未配置Key或URL`);
  const raw=b64.replace(/^data:image\/\w+;base64,/,'');
  const bin=atob(raw);const bytes=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
  const blob=new Blob([bytes],{type:'image/png'});
  const fd=new FormData();
  fd.append('image',blob,'ref.png');fd.append('model',model||'dall-e-3');
  fd.append('prompt',prompt);fd.append('n',n);fd.append('size',size);
  if(negPrompt) fd.append('negative_prompt',negPrompt);
  const r=await fetch(`${url}/images/edits`,{
    method:'POST',headers:{'Authorization':`Bearer ${key}`},body:fd
  });
  if(!r.ok) throw new Error(`HTTP ${r.status}: ${await r.text()}`);
  const d=await r.json();
  if(d.data?.[0]?.b64_json) return d.data.map(i=>`data:image/png;base64,${i.b64_json}`);
  if(d.data?.[0]?.url){
    const results=[];
    for(const i of d.data){const rb=await fetch(i.url);const bl=await rb.blob();results.push(await f2b(new File([bl],'img.png')))}
    return results;
  }
  throw new Error('edits API返回格式异常');
}

async function saveToGallery(imageData,prompt,negPrompt,size){
  const p=S.personas.find(x=>x.id===S.curPersonaId);
  await db.put('gallery',{

}
const dlImg=url=>{const a=document.createElement('a');a.href=url;a.download=`draw_${Date.now()}.png`;a.click()};

// ── Master API ────────────────────────────────────────────────
async function callMaster(messages){
  if(!S.masterPresets.length) throw new Error('请先在设置里添加大师API预设');
  const presets=S.masterPresets;
  let startIdx=presets.findIndex(p=>p.id===S.curMasterId);
  if(startIdx<0) startIdx=0;
  let lastErr;
  for(let i=0;i<presets.length;i++){
    const preset=presets[(startIdx+i)%presets.length];
    try{
      if(i>0) toast(`大师切换到"${preset.name}"...`,'warn');
      return await _callMasterWithPreset(preset,messages);
    }catch(err){lastErr=err;if(presets.length>1) console.warn(`大师预设"${preset.name}"失败:`,err.message)}
  }
  throw lastErr||new Error('所有大师预设均失败');
}

async function _callMasterWithPreset(preset,messages){
  const {key,url,model}=preset;
  if(!key) throw new Error(`预设"${preset.name}"未配置API Key`);
  const base=(url||'https://api.anthropic.com/v1').replace(/\/$/,'');
  const isAnthropic=base.includes('anthropic.com');
  if(isAnthropic){
    const sys=messages.find(m=>m.role==='system');
    const msgs=messages.filter(m=>m.role!=='system');
    const r=await fetch(`${base}/messages`,{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01'},
      body:JSON.stringify({model:model||'claude-opus-4-7',system:sys?.content||'',messages:msgs,max_tokens:1024})
    });
    if(!r.ok) throw new Error(`HTTP ${r.status}: ${await r.text()}`);
    const d=await r.json();return d.content?.[0]?.text||'';
  }
  const r=await fetch(`${base}/chat/completions`,{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':`Bearer ${key}`},
    body:JSON.stringify({model:model||'claude-opus-4-7',messages,max_tokens:1024,stream:false})
  });
  if(!r.ok) throw new Error(`HTTP ${r.status}: ${await r.text()}`);
  const d=await r.json();return d.choices?.[0]?.message?.content||'';
}

async function renderTokens(filter=''){
  const cats=await db.tokensByCategory();
  const container=document.getElementById('tokens-categories');
  container.innerHTML='';
  const order=['quality','character','outfit','scene','action','expression','lighting','camera','effect','other'];
  for(const cat of order){
    let tokens=(cats[cat]||[]);
    if(filter) tokens=tokens.filter(t=>t.text.toLowerCase().includes(filter.toLowerCase()));
    if(!tokens.length) continue;
    tokens.sort((a,b)=>(b.useCount||0)-(a.useCount||0));
    const sec=document.createElement('div');
    sec.className='token-section';
    const hdr=document.createElement('div');
    hdr.className='token-section-header';
    hdr.innerHTML=`<span>${CAT[cat]||cat}</span><span class="token-count">${tokens.length}</span>`;
    hdr.onclick=()=>sec.classList.toggle('collapsed');
    const grid=document.createElement('div');
    grid.className='tokens-grid';
    for(const t of tokens){
      const tag=document.createElement('span');
      const sel=S.selTokens.some(s=>s.id===t.id);
      tag.className='token-tag'+(sel?' selected':'');
      tag.textContent=t.text;tag.dataset.id=t.id;
      tag.title=`点击添加 | 已用${t.useCount||0}次 | 右键删除`;
      tag.addEventListener('click',()=>toggleToken(t));
      tag.addEventListener('contextmenu',e=>{e.preventDefault();if(confirm(`删除"${t.text}"？`)){db.del('tokens',t.id).then(()=>{S.selTokens=S.selTokens.filter(s=>s.id!==t.id);renderSelectedTokens();renderTokens(document.getElementById('token-search-input').value)})}});
      grid.appendChild(tag);
    }
    sec.append(hdr,grid);container.appendChild(sec);
  }
}

function renderSelectedTokens(){

function toggleToken(token){
  const idx=S.selTokens.findIndex(s=>s.id===token.id);
  if(idx>=0){
    S.selTokens.splice(idx,1);
    document.querySelectorAll(`.token-tag[data-id="${token.id}"]`).forEach(el=>el.classList.remove('selected'));
  }else{
    S.selTokens.push({id:token.id,text:token.text});
    document.querySelectorAll(`.token-tag[data-id="${token.id}"]`).forEach(el=>el.classList.add('selected'));
    db.get('tokens',token.id).then(t=>{if(t){t.useCount=(t.useCount||0)+1;db.put('tokens',t)}});
  }
  renderSelectedTokens();
}

function _renderPresets(presets,curId,containerId,type){
  const c=document.getElementById(containerId);
  c.innerHTML='';
  if(!presets.length){
    c.innerHTML='<div style="color:var(--sub);font-size:12px;padding:6px 0">还没有预设，点"+ 添加"创建</div>';

  }
  presets.forEach(p=>c.appendChild(_buildPresetCard(p,p.id===curId,type)));
}

function _buildPresetCard(preset,isActive,type){
  const card=document.createElement('div');
  card.className='preset-card'+(isActive?' preset-active':'');

  // Header
  const hdr=document.createElement('div');
  hdr.className='preset-card-hdr';
  hdr.innerHTML=`
    <span class="preset-check" title="点击切换为当前使用">${isActive?'✓':'○'}</span>
    <span class="preset-name" title="点击切换，双击改名">${preset.name||'未命名'}</span>
    <button class="btn-tiny" data-a="toggle">展开</button>
    <button class="btn-tiny" data-a="del" style="color:var(--err);border-color:var(--err)">删</button>
  `;
  hdr.querySelector('.preset-check').onclick=()=>_setActive(preset,type);
  const nameEl=hdr.querySelector('.preset-name');
  nameEl.onclick=()=>_setActive(preset,type);
  nameEl.ondblclick=()=>{const n=prompt('改名：',preset.name||'');if(n?.trim()){preset.name=n.trim();savePresetsToLS();renderDrawPresets();renderMasterPresets()}};
  hdr.querySelector('[data-a="toggle"]').onclick=()=>{
    const body=card.querySelector('.preset-body');
    body.classList.toggle('open');
    hdr.querySelector('[data-a="toggle"]').textContent=body.classList.contains('open')?'收起':'展开';
  };
  hdr.querySelector('[data-a="del"]').onclick=()=>{
    if(!confirm(`删除预设"${preset.name}"？`)) return;
    if(type==='draw'){S.drawPresets=S.drawPresets.filter(p=>p.id!==preset.id);if(S.curDrawId===preset.id)S.curDrawId=S.drawPresets[0]?.id||null}
    else{S.masterPresets=S.masterPresets.filter(p=>p.id!==preset.id);if(S.curMasterId===preset.id)S.curMasterId=S.masterPresets[0]?.id||null}
    savePresetsToLS();renderDrawPresets();renderMasterPresets();
  };

  // Meta
  const meta=document.createElement('div');
  meta.className='preset-meta';
  meta.textContent=`${(preset.url||'未配置URL').replace(/^https?:\/\//,'').slice(0,34)} · ${preset.model||'未配置模型'}`;

  // Body
  const body=document.createElement('div');
  body.className='preset-body';
  const fmtRow=type==='draw'?`
    <div class="preset-row"><label>格式</label>
      <select data-f="format">
        <option value="images" ${preset.format!=='chat'?'selected':''}>images（标准）</option>
        <option value="chat" ${preset.format==='chat'?'selected':''}>chat（部分站子）</option>
      </select>
    </div>`:'' ;
  body.innerHTML=`
    <div class="preset-row"><label>Key</label><input type="password" data-f="key" value="${preset.key||''}" placeholder="sk-..."></div>
    <div class="preset-row"><label>URL</label><input type="text" data-f="url" value="${preset.url||''}" placeholder="https://api.xxx.com/v1"></div>
    <div class="preset-row"><label>模型</label><input type="text" data-f="model" value="${preset.model||''}" placeholder="${type==='draw'?'dall-e-3':'claude-opus-4-7'}"></div>
    ${fmtRow}
    <div class="preset-body-actions">
      <button class="btn-primary btn-sm" data-a="save">保存</button>
      <button class="btn-outline btn-sm" data-a="use">保存并切换</button>
    </div>
  `;
  const doSave=()=>{
    body.querySelectorAll('[data-f]').forEach(el=>{preset[el.dataset.f]=el.value.trim()});
    savePresetsToLS();renderDrawPresets();renderMasterPresets();toast('预设已保存 ✓');
  };
  body.querySelector('[data-a="save"]').onclick=doSave;
  body.querySelector('[data-a="use"]').onclick=()=>{doSave();_setActive(preset,type)};

  card.append(hdr,meta,body);
  return card;
}

function _setActive(preset,type){
  if(type==='draw') S.curDrawId=preset.id;
  else S.curMasterId=preset.id;
  savePresetsToLS();
  renderDrawPresets();renderMasterPresets();
  toast(`已切换到"${preset.name}" ✓`);
}

function addDrawPreset(){
  const p={id:uid(),name:'新画图预设',key:'',url:'',model:'dall-e-3',format:'images'};
  S.drawPresets.push(p);if(!S.curDrawId) S.curDrawId=p.id;
  savePresetsToLS();renderDrawPresets();
  setTimeout(()=>card_expand(p.id),50);
}
function addMasterPreset(){
  const p={id:uid(),name:'新大师预设',key:'',url:'',model:'claude-opus-4-7'};
  S.masterPresets.push(p);if(!S.curMasterId) S.curMasterId=p.id;
  savePresetsToLS();renderMasterPresets();
  setTimeout(()=>card_expand(p.id),50);
}
function card_expand(pid){
  // 找到新增的body展开
  const all=document.querySelectorAll('.preset-body');
  all.forEach(b=>{if(b.closest('.preset-card')?.querySelector(`[data-pid="${pid}"]`)) b.classList.add('open')});
}

function importFromApp(){
  const g=k=>localStorage.getItem(k)||'';
  let added=0;
  // 画图：读主App单一配置
  const imgKey=g('imageApiKey'),imgUrl=g('imageBaseUrl'),imgModel=g('imageModel');
  if(imgKey&&imgUrl&&!S.drawPresets.find(p=>p.key===imgKey)){
    S.drawPresets.push({id:uid(),name:'主App画图',key:imgKey,url:imgUrl,model:imgModel||'dall-e-3',format:g('imageApiFormat')||'images'});
    if(!S.curDrawId) S.curDrawId=S.drawPresets[0].id;
    added++;
  }
  // 大师：读主App主API
  const masterKey=g('mainApiKey'),masterUrl=g('mainApiBaseUrl');
  if(masterKey&&!S.masterPresets.find(p=>p.key===masterKey)){
    S.masterPresets.push({id:uid(),name:'主API（Claude）',key:masterKey,url:masterUrl,model:'claude-opus-4-7'});
    if(!S.curMasterId) S.curMasterId=S.masterPresets[0].id;
    added++;
  }
  if(added){savePresetsToLS();renderDrawPresets();renderMasterPresets();toast(`已导入 ${added} 个预设 ✓`);}
  else toast('未检测到新的配置（或已存在）','warn');
}

// ── Tab & Modal ───────────────────────────────────────────────
function switchTab(tab){
  document.querySelectorAll('.nav-tab').forEach(el=>el.classList.toggle('active',el.dataset.tab===tab));
  document.querySelectorAll('.tab-pane').forEach(el=>el.classList.toggle('active',el.id===`tab-${tab}`));
  if(tab==='gallery') renderGallery();
}
const closeModal=id=>{document.getElementById(id).style.display='none'};

// ── Init ──────────────────────────────────────────────────────
async function loadPersonas(){
  S.personas=await db.all('personas');
  renderSidebar();
  if(S.curPersonaId&&!S.personas.find(p=>p.id===S.curPersonaId)) S.curPersonaId=null;
  if(!S.curPersonaId&&S.personas.length) selectPersona(S.personas[0].id);
  else if(S.curPersonaId) selectPersona(S.curPersonaId);
}
async function seedTokens(){
  const ex=await db.all('tokens');
  if(!ex.length) for(const t of INIT_TOKENS) await db.put('tokens',{...t,useCount:0,createdAt:Date.now()});
}

function bindEvents(){
  // Tab
  document.querySelectorAll('.nav-tab').forEach(btn=>btn.addEventListener('click',()=>switchTab(btn.dataset.tab)));
  // Persona
  document.getElementById('btn-new-persona').onclick=()=>openPersonaModal();
  document.getElementById('btn-edit-persona-quick').onclick=()=>openPersonaModal(S.curPersonaId);
  document.getElementById('btn-save-persona').onclick=savePersona;
  document.getElementById('btn-delete-persona').onclick=deletePersona;
  document.getElementById('btn-cancel-persona').onclick=()=>closeModal('modal-persona');
  document.getElementById('btn-pick-avatar').onclick=()=>document.getElementById('persona-avatar-input').click();
  document.getElementById('btn-clear-avatar').onclick=()=>document.getElementById('persona-avatar-preview').innerHTML='🎭';
  document.getElementById('persona-avatar-input').onchange=async e=>{
    const f=e.target.files[0];if(!f) return;
    document.getElementById('persona-avatar-preview').innerHTML=`<img src="${await f2b(f)}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
  };
  // Tokens
  document.getElementById('btn-add-token').onclick=openAddToken;
  document.getElementById('btn-save-token').onclick=saveToken;
  document.getElementById('btn-cancel-token').onclick=()=>closeModal('modal-token');
  document.getElementById('token-search-input').oninput=e=>renderTokens(e.target.value);
  document.getElementById('token-text-input').onkeydown=e=>{if(e.key==='Enter') saveToken()};
  // Prompt
  document.getElementById('extra-prompt').oninput=updateFinalPrompt;
  document.getElementById('neg-prompt').oninput=()=>{};
  document.getElementById('btn-clear-tokens').onclick=()=>{
    S.selTokens=[];
    document.querySelectorAll('.token-tag.selected').forEach(el=>el.classList.remove('selected'));
    renderSelectedTokens();
  };
  document.getElementById('btn-copy-prompt').onclick=()=>navigator.clipboard.writeText(buildPrompt()).then(()=>toast('已复制'));
  document.getElementById('btn-save-template').onclick=saveTemplate;
  document.getElementById('btn-load-template').onclick=openTemplates;
  document.getElementById('btn-close-templates').onclick=()=>closeModal('modal-templates');
  // Ref image
  document.getElementById('btn-pick-ref').onclick=()=>document.getElementById('ref-image-input').click();
  document.getElementById('ref-image-input').onchange=async e=>{
    const f=e.target.files[0];if(!f) return;
    S.refB64=await f2b(f);
    document.getElementById('btn-pick-ref').textContent=f.name.slice(0,12)+'…';
    document.getElementById('btn-clear-ref').style.display='';
  };
  document.getElementById('btn-clear-ref').onclick=()=>{
    S.refB64=null;document.getElementById('ref-image-input').value='';
    document.getElementById('btn-pick-ref').textContent='选图';
    document.getElementById('btn-clear-ref').style.display='none';
  };
  // Draw
  document.getElementById('btn-draw').onclick=doDraw;
  // Gallery filters
  ['filter-persona','filter-rating','filter-tag'].forEach(id=>{
    const el=document.getElementById(id);
    el.addEventListener(el.tagName==='INPUT'?'input':'change',renderGallery);
  });
  // Detail
  document.getElementById('btn-close-detail').onclick=()=>closeModal('modal-detail');
  document.getElementById('btn-use-prompt').onclick=useDetailPrompt;
  document.getElementById('btn-add-tag').onclick=addDetailTag;
  document.getElementById('btn-download-detail').onclick=()=>{if(S.curDetail) dlImg(S.curDetail.imageData)};
  document.getElementById('btn-delete-image').onclick=deleteDetail;
  // Settings
  document.getElementById('btn-settings').onclick=openSettings;
  document.getElementById('btn-close-settings').onclick=()=>closeModal('modal-settings');
  document.getElementById('btn-import-settings').onclick=importFromApp;
  document.getElementById('btn-add-draw-preset').onclick=addDrawPreset;
  document.getElementById('btn-add-master-preset').onclick=addMasterPreset;
  // Master
  document.getElementById('btn-analyze').onclick=async()=>{
    const btn=document.getElementById('btn-analyze');
    btn.disabled=true;btn.textContent='分析中...';
    try{await analyzePreference()}catch(e){toast(e.message,'error')}
    finally{btn.disabled=false;btn.textContent='分析我的偏好'}
  };
  document.getElementById('btn-master-send').onclick=async()=>{
    const input=document.getElementById('master-input');
    const text=input.value.trim();
    if(!text||S.masterBusy) return;
    S.masterBusy=true;input.value='';
    addMasterMsg('user',text);
    const tmp=addMasterMsg('assistant','思考中...✨',true);
    try{const r=await masterSuggest(text);tmp.remove();addMasterMsg('assistant',r)}
    catch(e){tmp.remove();addMasterMsg('assistant','出错了：'+e.message)}
    finally{S.masterBusy=false}
  };
  document.getElementById('btn-inspire').onclick=async()=>{
    if(S.masterBusy) return;S.masterBusy=true;
    const tmp=addMasterMsg('assistant','💡 寻找灵感中...✨',true);
    try{const r=await masterInspire();tmp.remove();addMasterMsg('assistant','💡 今日灵感\n\n'+r)}
    catch(e){tmp.remove();addMasterMsg('assistant','出错了：'+e.message)}
    finally{S.masterBusy=false}
  };
  document.getElementById('master-input').onkeydown=e=>{
    if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();document.getElementById('btn-master-send').click()}
  };
  // Modal backdrop
  document.querySelectorAll('.modal-overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o) o.style.display='none'}));
}

async function init(){
  await db.open();
  await seedTokens();
  loadCfg();
  await loadPersonas();
  await renderTokens();
  bindEvents();
}
init().catch(console.error);
</script>
</body>
</html>
