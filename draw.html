<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>画图台</title>
<link rel="stylesheet" href="./src/styles/draw.css">
</head>
<body>
<div id="app">
  <!-- Sidebar -->
  <div id="sidebar">
    <div class="sidebar-brand">🎨</div>
    <div id="persona-list"></div>
    <button id="btn-new-persona" class="sidebar-add" title="新建模板">＋</button>
    <div class="sidebar-footer">
      <button id="btn-settings" title="设置">⚙</button>
    </div>
  </div>

  <!-- Main -->
  <div id="main">
    <nav id="main-nav">
      <button class="nav-tab active" data-tab="studio">工作台</button>
      <button class="nav-tab" data-tab="gallery">图库</button>
      <button class="nav-tab" data-tab="master">✦ 大师</button>
    </nav>

    <!-- 工作台 -->
    <div id="tab-studio" class="tab-pane active">
      <div id="prompt-panel">
        <div class="prompt-section">
          <div class="section-header">
            <span>Prompt 模板</span>
            <span class="text-sub" id="current-persona-name">未选择模板</span>
            <button id="btn-edit-persona-quick" class="btn-tiny" style="display:none">编辑</button>
          </div>
          <div id="persona-base-prompt" class="prompt-base-display" style="font-size:11px;max-height:52px;overflow:hidden">在左侧选择或新建一个Prompt模板</div>
        </div>

        <div class="prompt-section">
          <div class="section-header">
            <span>角色</span>
            <button id="btn-manage-chars" class="btn-tiny">管理角色</button>
          </div>
          <div id="character-chips" class="char-chips-row"></div>
        </div>

        <div class="prompt-section">
          <div class="section-header"><span>想画什么？</span></div>
          <textarea id="user-desc" placeholder="一句话描述你想要的画面..." rows="2"></textarea>
          <div style="margin-top:8px">
            <button id="btn-ai-gen" class="btn-primary">✨ AI 生成 Prompt</button>
          </div>
        </div>

        <div class="prompt-section">
          <div class="section-header">
            <span>正向 Prompt</span>
            <button id="btn-copy-prompt" class="btn-tiny">复制</button>
          </div>
          <textarea id="final-prompt-edit" placeholder="AI生成的Prompt会出现在这里，也可以直接编辑..." rows="4"></textarea>
        </div>

        <div class="prompt-section">
          <div class="section-header"><span>负向 Prompt</span></div>
          <textarea id="neg-prompt" placeholder="lowres, bad anatomy, watermark..." rows="2"></textarea>
        </div>

        <div class="prompt-section">
          <div class="section-header" id="tokens-toggle-hdr" style="cursor:pointer">
            <span>词条库（可选附加）</span>
            <button id="btn-add-token" class="btn-tiny" onclick="event.stopPropagation();openAddToken()">+ 添加</button>
            <button id="btn-clear-tokens" class="btn-tiny" onclick="event.stopPropagation();clearTokens()">清空</button>
            <span id="tokens-toggle-icon" style="color:var(--sub);font-size:11px;margin-left:2px">▶</span>
          </div>
          <div id="tokens-collapsible" style="display:none">
            <input type="text" id="token-search-input" placeholder="搜索词条..." style="width:100%;padding:6px 10px;border-radius:var(--rs);border:1px solid var(--border);background:var(--card2);color:var(--text);font-size:13px;outline:none;margin-bottom:6px">
            <div id="tokens-categories"></div>
            <div id="selected-tokens" class="selected-tokens-area" style="margin-top:6px"></div>
          </div>
        </div>

        <div class="prompt-section">
          <div class="draw-params">
            <label>尺寸
              <select id="param-size">
                <option value="512x512">512×512</option>
                <option value="768x768">768×768</option>
                <option value="1024x1024">1024×1024</option>
                <option value="1024x1536">1024×1536 竖</option>
                <option value="1536x1024">1536×1024 横</option>
                <option value="720x1280">720×1280 竖16:9</option>
                <option value="1280x720">1280×720 横16:9</option>
                <option value="1024x1792">1024×1792 竖长</option>
                <option value="1792x1024">1792×1024 横长</option>
                <option value="1152x2048">1152×2048 竖2K</option>
                <option value="1536x2048" selected>1536×2048 竖2K</option>
                <option value="2048x1152">2048×1152 横2K</option>
                <option value="2048x1536">2048×1536 横2K</option>
                <option value="2048x2048">2048×2048</option>
              </select>
            </label>
            <label>张数
              <select id="param-count">
                <option value="1">1张</option>
                <option value="2">2张</option>
                <option value="4">4张</option>
              </select>
            </label>
            <label>垫图
              <input type="file" id="ref-image-input" accept="image/*" style="display:none" multiple>
              <button id="btn-pick-ref" class="btn-tiny">＋ 追加图</button>
              <button id="btn-clear-ref" class="btn-tiny" style="display:none">✕ 全清</button>
            </label>
          </div>
          <div id="ref-char-row"></div>
          <div id="custom-ref-strip" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:4px"></div>
          <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap">
            <button id="btn-draw" class="btn-primary">✦ 生成图片</button>
            <button id="btn-save-template" class="btn-outline">存模版</button>
            <button id="btn-load-template" class="btn-outline">读模版</button>
          </div>
        </div>

        <div id="draw-results"></div>
      </div>
    </div>

    <!-- 图库 -->
    <div id="tab-gallery" class="tab-pane">
      <div id="gallery-toolbar">
        <div id="gallery-filters">
          <select id="filter-persona"><option value="">全部模板</option></select>
          <select id="filter-rating">
            <option value="">全部评分</option>
            <option value="5">5星</option>
            <option value="4">4星+</option>
            <option value="3">3星+</option>
          </select>
          <input type="text" id="filter-tag" placeholder="标签...">
        </div>
        <span class="gallery-stats" id="gallery-stats"></span>
        <span id="gallery-pending-label" style="color:var(--warn);font-size:12px;white-space:nowrap"></span>
        <button id="btn-gallery-import" class="btn-outline" style="white-space:nowrap">📥 存入图库</button>
        <button id="btn-analyze-aesthetic" class="btn-tiny" style="white-space:nowrap">✨ 分析偏好</button>
      </div>
      <div id="gallery-grid"></div>
    </div>

    <!-- 大师 -->
    <div id="tab-master" class="tab-pane">
      <div id="master-insight-card">
        <div class="insight-header">
          <span>✦ 审美洞察</span>
          <div style="display:flex;gap:6px">
            <button id="btn-clear-master-chat" class="btn-tiny">清空对话</button>
            <button id="btn-analyze" class="btn-tiny">分析我的偏好</button>
          </div>
        </div>
        <div id="master-insight-content" class="insight-content">把喜欢的图存入图库，点「分析我的偏好」→ AI帮你看图读出审美偏好 ✨</div>
      </div>
      <div id="master-chat"></div>
      <div id="master-input-area">
        <textarea id="master-input" placeholder="跟大师说说你现在想画什么..." rows="2"></textarea>
        <button id="btn-master-send" class="btn-primary">获取建议</button>
        <button id="btn-inspire" class="btn-outline">💡 今日灵感</button>
      </div>
    </div>
  </div>
</div>

<!-- Prompt模板弹窗 -->
<div id="modal-persona" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <h3 id="modal-persona-title">新建 Prompt 模板</h3>
    <div class="form-group">
      <label>名称</label>
      <input type="text" id="persona-name-input" placeholder="如：写真大师、动漫风格...">
    </div>
    <div class="form-group">
      <label>图标（emoji）</label>
      <input type="text" id="persona-icon-input" placeholder="🎨" maxlength="2" style="font-size:20px;width:60px;text-align:center">
    </div>
    <div class="form-group">
      <label>生成指导（告诉AI用什么风格写Prompt）</label>
      <textarea id="persona-base-input" placeholder="你是专业AI绘画prompt工程师，擅长写真实感人像。收到角色描述和用户想法后，写出高质量英文prompt，突出光影、构图、氛围..." rows="5" style="width:100%"></textarea>
    </div>
    <div class="form-group">
      <label>默认负向 Prompt</label>
      <textarea id="persona-neg-input" placeholder="lowres, bad anatomy..." rows="2" style="width:100%"></textarea>
    </div>
    <div class="form-group">
      <label>备注</label>
      <textarea id="persona-notes-input" placeholder="关于这个模板的说明..." rows="2" style="width:100%"></textarea>
    </div>
    <div class="modal-actions">
      <button id="btn-save-persona" class="btn-primary">保存</button>
      <button id="btn-delete-persona" class="btn-danger" style="display:none">删除模板</button>
      <button id="btn-cancel-persona" class="btn-outline">取消</button>
    </div>
  </div>
</div>

<!-- 角色管理弹窗 -->
<div id="modal-chars" class="modal-overlay" style="display:none">
  <div class="modal-box" style="max-width:480px">
    <h3>角色管理</h3>
    <div id="chars-list"></div>
    <div style="margin-top:12px;border-top:1px solid var(--border);padding-top:12px">
      <h4 style="font-size:12px;color:var(--sub);margin-bottom:8px" id="char-form-title">添加角色</h4>
      <div class="form-group"><label>名字</label><input type="text" id="char-name-input" placeholder="炘也、涂涂、臭宝..."></div>
      <div class="form-group"><label>外形 Prompt</label><textarea id="char-prompt-input" placeholder="1girl, long black hair, golden eyes, ..." rows="3" style="width:100%"></textarea></div>
      <div class="form-group">
        <label>参考图（垫图用）</label>
        <div style="display:flex;align-items:center;gap:8px">
          <div id="char-ref-preview" style="width:48px;height:48px;border-radius:var(--rs);background:var(--card2);border:1px solid var(--border);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">🖼️</div>
          <input type="file" id="char-ref-input" accept="image/*" style="display:none">
          <button id="btn-pick-char-ref" class="btn-tiny">选图</button>
          <button id="btn-clear-char-ref" class="btn-tiny">清除</button>
        </div>
      </div>
      <div class="modal-actions" style="margin-top:8px">
        <button id="btn-save-char" class="btn-primary btn-sm">保存角色</button>
        <button id="btn-cancel-char-edit" class="btn-outline btn-sm" style="display:none">取消编辑</button>
      </div>
    </div>
    <div class="modal-actions" style="margin-top:8px">
      <button id="btn-close-chars" class="btn-outline">关闭</button>
    </div>
  </div>
</div>

<!-- 图库导入弹窗 -->
<div id="modal-gallery-import" class="modal-overlay" style="display:none">
  <div class="modal-box modal-sm">
    <h3>存入图库</h3>
    <div class="form-group">
      <label>图片</label>
      <input type="file" id="gallery-import-file" accept="image/*">
    </div>
    <div class="form-group">
      <label>Prompt / 描述（可选）</label>
      <textarea id="gallery-import-prompt" placeholder="这张图的描述或来源prompt..." rows="3" style="width:100%"></textarea>
    </div>
    <div class="form-group">
      <label>来源备注（可选）</label>
      <input type="text" id="gallery-import-source" placeholder="Twitter / 某某画师 / 本地...">
    </div>
    <div class="modal-actions">
      <button id="btn-confirm-gallery-import" class="btn-primary">存入图库</button>
      <button id="btn-cancel-gallery-import" class="btn-outline">取消</button>
    </div>
  </div>
</div>

<!-- 图片详情 -->
<div id="modal-detail" class="modal-overlay" style="display:none">
  <div class="modal-box modal-detail-box">
    <button id="btn-close-detail" class="modal-close">✕</button>
    <div class="detail-left">
      <img id="detail-image" src="" alt="">
    </div>
    <div class="detail-right">
      <div class="detail-info">
        <div class="detail-row"><span class="detail-label">人设</span><span id="detail-persona"></span></div>
        <div class="detail-row"><span class="detail-label">时间</span><span id="detail-date" class="text-sub"></span></div>
        <div class="detail-row">
          <span class="detail-label">评分</span>
          <div id="detail-rating" class="star-rating"></div>
        </div>
        <div class="detail-row">
          <span class="detail-label">标签</span>
          <div id="detail-tags" class="tag-list"></div>
        </div>
        <div class="detail-row" style="flex-direction:column;gap:4px">
          <div style="display:flex;align-items:center;gap:8px">
            <span class="detail-label">正向</span>
            <button id="btn-save-detail-prompt" class="btn-tiny" style="display:none">保存</button>
          </div>
          <textarea id="detail-prompt" rows="4" style="width:100%;font-size:12px;color:var(--text);line-height:1.6;resize:vertical"></textarea>
        </div>
        <div class="detail-row" style="flex-direction:column;gap:4px">
          <span class="detail-label">负向</span>
          <textarea id="detail-neg" rows="2" style="width:100%;font-size:12px;color:var(--text);line-height:1.6;resize:vertical"></textarea>
        </div>
        <div class="detail-row"><span class="detail-label">参数</span><div id="detail-params" class="detail-prompt-text"></div></div>
      </div>
      <div class="detail-actions">
        <button id="btn-use-prompt" class="btn-primary btn-sm">用这个Prompt</button>
        <button id="btn-add-tag" class="btn-outline btn-sm">+ 标签</button>
        <button id="btn-download-detail" class="btn-outline btn-sm">下载</button>
        <button id="btn-delete-image" class="btn-danger btn-sm">删除</button>
      </div>
    </div>
  </div>
</div>

<!-- 设置 -->
<div id="modal-settings" class="modal-overlay" style="display:none">
  <div class="modal-box" style="max-width:520px">
    <h3>设置</h3>
    <div class="presets-section-hdr">
      <h4>画图 API 预设</h4>
      <button id="btn-add-draw-preset" class="btn-tiny">+ 添加</button>
    </div>
    <div id="draw-presets-list"></div>
    <div class="presets-section-hdr" style="margin-top:16px">
      <h4>大师 API 预设（Claude）</h4>
      <button id="btn-add-master-preset" class="btn-tiny">+ 添加</button>
    </div>
    <div id="master-presets-list"></div>
    <div style="margin-top:16px">
      <label style="font-size:12px;color:var(--sub);display:block;margin-bottom:4px">炘也人设（大师建议/审美洞察/灵感 共用，留空则不加）</label>
      <textarea id="input-master-persona" rows="4" placeholder="例：你是炘也，我的爱人，懂我的审美和心意。用你的视角看我的图，说话自然温柔，像在陪我一起想画什么。" style="width:100%;font-size:12px;resize:vertical;box-sizing:border-box"></textarea>
      <button id="btn-save-master-persona" class="btn-primary" style="margin-top:6px;font-size:12px">保存人设</button>
    </div>
    <div style="margin-top:16px">
      <label style="font-size:12px;color:var(--sub);display:block;margin-bottom:4px">本地服务器地址（用于图片代理，解决CORS）</label>
      <div style="display:flex;gap:6px">
        <input type="text" id="input-local-server" placeholder="http://localhost:8787" style="flex:1;font-size:12px">
        <button id="btn-save-local-server" class="btn-primary" style="flex:none">保存</button>
      </div>
      <div style="font-size:11px;color:var(--sub);margin-top:4px">填了之后，API返回URL格式图片时会走代理，避免CORS失败</div>
    </div>
    <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">
      <button id="btn-import-settings" class="btn-outline">从主App导入</button>
      <button id="btn-export-config" class="btn-outline">导出配置</button>
      <label class="btn-outline" style="cursor:pointer">导入配置<input type="file" id="input-import-config" accept=".json" style="display:none"></label>
      <button id="btn-close-settings" class="btn-outline" style="margin-left:auto">关闭</button>
    </div>
  </div>
</div>

<!-- 模板 -->
<div id="modal-templates" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <h3>模版管理</h3>
    <div id="templates-list"></div>
    <div class="modal-actions">
      <button id="btn-close-templates" class="btn-outline">关闭</button>
    </div>
  </div>
</div>

<!-- 词条添加 -->
<div id="modal-token" class="modal-overlay" style="display:none">
  <div class="modal-box modal-sm">
    <h3>添加词条</h3>
    <div class="form-group"><label>词条内容</label><input type="text" id="token-text-input" placeholder="best quality, ..."></div>
    <div class="form-group">
      <label>类别</label>
      <select id="token-category-select">
        <option value="quality">质量/风格</option>
        <option value="character">人物外形</option>
        <option value="outfit">服装</option>
        <option value="scene">场景</option>
        <option value="action">动作/姿态</option>
        <option value="expression">表情/情绪</option>
        <option value="lighting">光影</option>
        <option value="camera">镜头/构图</option>
        <option value="effect">特效</option>
        <option value="other">其他</option>
      </select>
    </div>
    <div class="modal-actions">
      <button id="btn-save-token" class="btn-primary">保存</button>
      <button id="btn-cancel-token" class="btn-outline">取消</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="./src/draw.js"></script>
</body>
</html>
