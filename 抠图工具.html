<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>批量抠图工具</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:#1a1a2e;color:#eee;min-height:100vh;padding:24px}
h1{text-align:center;font-size:22px;margin-bottom:6px;color:#f8c8d4}
.sub{text-align:center;font-size:13px;color:#aaa;margin-bottom:4px}
.sub2{text-align:center;font-size:12px;color:#f87171;margin-bottom:20px}
#dropZone{
  border:2px dashed #c084a0;border-radius:16px;
  padding:40px 24px;text-align:center;cursor:pointer;
  background:rgba(255,255,255,.04);transition:.2s;margin-bottom:20px;
}
#dropZone:hover,#dropZone.over{border-color:#f48fb1;background:rgba(244,143,177,.08)}
#dropZone .icon{font-size:44px;margin-bottom:10px}
#dropZone p{color:#ccc;font-size:15px}
#dropZone span{color:#f48fb1}
#fileInput{display:none}
.toolbar{display:flex;gap:10px;justify-content:center;margin-bottom:20px;flex-wrap:wrap}
button{padding:9px 20px;border:none;border-radius:10px;cursor:pointer;font-size:14px;font-weight:600;transition:.15s}
#btnProcess{background:#c084a0;color:#fff}
#btnProcess:hover:not(:disabled){background:#a0638a}
#btnProcess:disabled{background:#555;cursor:default}
#btnDownloadAll{background:#6c8ebf;color:#fff}
#btnDownloadAll:hover:not(:disabled){background:#5070a0}
#btnDownloadAll:disabled{background:#555;cursor:default}
#btnClear{background:rgba(255,255,255,.1);color:#ccc}
#btnClear:hover{background:rgba(255,255,255,.18)}
#progressArea{margin-bottom:16px;display:none}
.progress-bar-wrap{background:rgba(255,255,255,.1);border-radius:8px;height:10px;overflow:hidden}
.progress-bar{height:100%;background:linear-gradient(90deg,#f48fb1,#c084a0);border-radius:8px;transition:width .3s;width:0%}
#progressTxt{font-size:12px;color:#aaa;margin-top:6px;text-align:center}
#errorBox{display:none;background:rgba(239,68,68,.15);border:1px solid #ef4444;border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:12px;color:#fca5a5;white-space:pre-wrap;word-break:break-all}
#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
.card{background:rgba(255,255,255,.06);border-radius:14px;overflow:hidden}
.card-imgs{display:grid;grid-template-columns:1fr 1fr}
.card-imgs img{width:100%;height:140px;object-fit:contain;padding:4px}
.orig-img{background:#2a2a3e}
.result-img{background:repeating-conic-gradient(#555 0% 25%,#444 0% 50%) 0 0/16px 16px;opacity:.25}
.result-img.done{opacity:1}
.card-label{font-size:10px;color:#888;padding:2px 6px;background:rgba(0,0,0,.3)}
.result-wrap{position:relative}
.result-wrap .dl-overlay{
  position:absolute;bottom:6px;right:6px;
  background:rgba(192,132,160,.9);color:#fff;border:none;border-radius:8px;
  padding:4px 10px;font-size:11px;font-weight:600;cursor:pointer;
  opacity:0;transition:opacity .2s;pointer-events:none;
}
.result-wrap.done-wrap .dl-overlay{pointer-events:auto}
.result-wrap.done-wrap:hover .dl-overlay{opacity:1}
.card-footer{padding:8px;display:flex;align-items:center;gap:6px}
.card-name{flex:1;font-size:11px;color:#bbb;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btn-dl{background:#c084a0;color:#fff;padding:4px 10px;font-size:11px;border-radius:6px;border:none;cursor:pointer}
.btn-dl:hover{background:#a0638a}
.btn-dl:disabled{background:#555;cursor:default}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid #888;border-top-color:#f48fb1;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<h1>✂️ 批量抠图</h1>
<p class="sub">AI 自动去除背景，生成透明底 PNG · 全部在本地浏览器处理，不上传服务器</p>
<p class="sub2">⚠️ 首次使用会下载 AI 模型（约 175MB），请耐心等待，之后会缓存</p>

<div id="dropZone">
  <div class="icon">🖼️</div>
  <p>把图片拖到这里，或者 <span>点击选择</span></p>
  <p style="font-size:12px;color:#888;margin-top:8px">支持 JPG / PNG / WEBP，可多选</p>
</div>
<input type="file" id="fileInput" accept="image/*" multiple>

<div class="toolbar">
  <button id="btnProcess" disabled>▶ 开始抠图</button>
  <button id="btnDownloadAll" disabled>⬇ 全部下载 ZIP</button>
  <button id="btnClear">🗑 清空</button>
</div>

<div id="progressArea">
  <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div>
  <div id="progressTxt"></div>
</div>
<div id="errorBox"></div>

<div id="grid"></div>

<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script type="module">
import { AutoModel, AutoProcessor, RawImage } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.3.3/+esm';

const MODEL_ID = 'briaai/RMBG-1.4';

const dropZone    = document.getElementById('dropZone');
const fileInput   = document.getElementById('fileInput');
const grid        = document.getElementById('grid');
const btnProcess  = document.getElementById('btnProcess');
const btnDlAll    = document.getElementById('btnDownloadAll');
const btnClear    = document.getElementById('btnClear');
const progressArea = document.getElementById('progressArea');
const progressBar  = document.getElementById('progressBar');
const progressTxt  = document.getElementById('progressTxt');
const errorBox     = document.getElementById('errorBox');

let files   = [];
let results = [];
let _model  = null;
let _processor = null;

// ---- 拖放 & 选图 ----
dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('over');
  addFiles([...e.dataTransfer.files].filter(f => f.type.startsWith('image/')));
});
fileInput.addEventListener('change', () => { addFiles([...fileInput.files]); fileInput.value = ''; });

function addFiles(newFiles) {
  newFiles.forEach(f => {
    if (files.find(x => x.name === f.name && x.size === f.size)) return;
    const idx = files.length;
    files.push(f); results.push(null);
    renderCard(f, idx);
  });
  btnProcess.disabled = files.length === 0;
}

function renderCard(file, idx) {
  const url  = URL.createObjectURL(file);
  const card = document.createElement('div');
  card.className = 'card'; card.id = 'card-' + idx;
  card.innerHTML =
    '<div class="card-imgs">' +
      '<div><div class="card-label">原图</div><img class="orig-img" src="' + url + '"></div>' +
      '<div><div class="card-label">抠图结果</div>' +
        '<div class="result-wrap" id="wrap-' + idx + '">' +
          '<img class="result-img" id="result-' + idx + '" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7">' +
          '<button class="dl-overlay" id="dlov-' + idx + '">⬇ 下载</button>' +
        '</div>' +
      '</div>' +
    '</div>' +
    '<div class="card-footer">' +
      '<span class="card-name" title="' + file.name + '">' + file.name + '</span>' +
      '<span id="status-' + idx + '">待处理</span>' +
      '<button class="btn-dl" id="dl-' + idx + '" disabled>下载</button>' +
    '</div>';
  grid.appendChild(card);
}

// ---- 加载模型 ----
async function getModelProcessor() {
  if (_model && _processor) return { model: _model, processor: _processor };

  progressArea.style.display = 'block';
  progressTxt.textContent = '正在下载 BiRefNet 模型（首次约 175MB，请等待）…';
  progressBar.style.width = '5%';

  const progressCb = (p) => {
    if (p.status === 'progress') {
      const pct = Math.round(p.progress || 0);
      progressBar.style.width = Math.min(5 + pct * 0.55, 60) + '%';
      progressTxt.textContent = '下载模型：' + pct + '%（' + (p.name || '') + '）';
    }
  };

  _model = await AutoModel.from_pretrained(MODEL_ID, {
    config: { model_type: 'custom' },
    progress_callback: progressCb,
  });

  progressBar.style.width = '65%';
  progressTxt.textContent = '加载处理器…';
  _processor = await AutoProcessor.from_pretrained(MODEL_ID, {
    config: {
      do_normalize: true, do_pad: false, do_rescale: true, do_resize: true,
      image_mean: [0.5, 0.5, 0.5], image_std: [1, 1, 1],
      feature_extractor_type: 'ImageFeatureExtractor',
      resample: 2, rescale_factor: 0.00392156862745098,
      size: { width: 1024, height: 1024 },
    },
  });

  progressBar.style.width = '70%';
  progressTxt.textContent = '模型加载完成！';
  return { model: _model, processor: _processor };
}

async function removeBackground(file) {
  const { model, processor } = await getModelProcessor();
  const url   = URL.createObjectURL(file);
  const image = await RawImage.fromURL(url);
  URL.revokeObjectURL(url);

  const { pixel_values } = await processor(image);
  const { output } = await model({ input: pixel_values });

  const mask = await RawImage.fromTensor(
    output[0].mul(255).to('uint8')
  ).resize(image.width, image.height);

  const canvas = document.createElement('canvas');
  canvas.width  = image.width;
  canvas.height = image.height;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(image.toCanvas(), 0, 0);
  const pixelData = ctx.getImageData(0, 0, image.width, image.height);
  for (let i = 0; i < mask.data.length; i++) {
    pixelData.data[4 * i + 3] = mask.data[i];
  }
  ctx.putImageData(pixelData, 0, 0);
  return new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
}

// ---- 开始处理 ----
btnProcess.addEventListener('click', async () => {
  btnProcess.disabled = true; btnClear.disabled = true;
  progressArea.style.display = 'block';
  errorBox.style.display = 'none'; errorBox.textContent = '';

  const total  = files.length;
  let done = 0, errCount = 0;
  const errLines = [];

  for (let i = 0; i < total; i++) {
    if (results[i]) { done++; continue; }
    const statusEl  = document.getElementById('status-' + i);
    const resultImg = document.getElementById('result-' + i);
    const dlBtn     = document.getElementById('dl-' + i);

    statusEl.innerHTML = '<span class="spinner"></span>';
    progressTxt.textContent = '处理第 ' + (i + 1) + ' / ' + total + ' 张：' + files[i].name;

    try {
      const blob = await removeBackground(files[i]);
      results[i] = blob;
      resultImg.src = URL.createObjectURL(blob);
      resultImg.classList.add('done');
      statusEl.textContent = '✅';
      const name = baseName(files[i].name) + '_抠图.png';
      dlBtn.disabled = false;
      dlBtn.onclick  = () => downloadBlob(blob, name);
      const wrap = document.getElementById('wrap-' + i);
      const dlov = document.getElementById('dlov-' + i);
      wrap.classList.add('done-wrap');
      dlov.onclick = () => downloadBlob(blob, name);
    } catch(e) {
      statusEl.textContent = '❌';
      errCount++;
      errLines.push('• ' + files[i].name + '\n  ' + e.message);
      console.error(e);
    }

    done++;
    progressBar.style.width = (70 + done / total * 30) + '%';
  }

  progressBar.style.width = '100%';
  if (errCount === 0) {
    progressTxt.textContent = '✅ 全部完成，共处理 ' + done + ' 张';
  } else {
    progressTxt.textContent = '完成，成功 ' + (done - errCount) + ' 张，失败 ' + errCount + ' 张';
    errorBox.style.display = 'block';
    errorBox.textContent = '处理失败的文件：\n' + errLines.join('\n');
  }

  btnProcess.disabled = false; btnClear.disabled = false;
  if (results.some(r => r)) btnDlAll.disabled = false;
});

// ---- 全部下载 ZIP ----
btnDlAll.addEventListener('click', async () => {
  btnDlAll.textContent = '打包中…'; btnDlAll.disabled = true;
  const zip = new JSZip();
  files.forEach((f, i) => { if (results[i]) zip.file(baseName(f.name) + '_抠图.png', results[i]); });
  const blob = await zip.generateAsync({ type: 'blob' });
  downloadBlob(blob, '抠图结果.zip');
  btnDlAll.textContent = '⬇ 全部下载 ZIP'; btnDlAll.disabled = false;
});

// ---- 清空 ----
btnClear.addEventListener('click', () => {
  files = []; results = []; _model = null; _processor = null;
  grid.innerHTML = '';
  errorBox.style.display = 'none';
  btnProcess.disabled = true; btnDlAll.disabled = true;
  progressArea.style.display = 'none'; progressBar.style.width = '0%';
});

function baseName(name) { return name.replace(/\.[^.]+$/, ''); }
function downloadBlob(blob, name) {
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = name; a.click();
}
</script>
</body>
</html>
