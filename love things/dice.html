<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>炘也 vs 兔宝 · 骰子对决</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #f5f0eb;
    font-family: 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .container {
    text-align: center;
    padding: 40px 20px;
    max-width: 480px;
    width: 100%;
  }

  .title {
    font-size: 13px;
    color: #999;
    letter-spacing: 2px;
    margin-bottom: 6px;
  }

  .round-info {
    font-size: 15px;
    color: #666;
    margin-bottom: 36px;
  }

  /* 玩家区 */
  .players {
    display: flex;
    align-items: flex-start;
    justify-content: center;
    gap: 20px;
    margin-bottom: 32px;
  }

  .player {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    flex: 1;
  }

  .player-name {
    font-size: 15px;
    color: #555;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .player-name .emoji { font-size: 18px; }

  /* 骰子 */
  .dice-wrap {
    perspective: 600px;
  }

  .dice {
    width: 80px;
    height: 80px;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.10), inset 0 1px 0 rgba(255,255,255,0.8);
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    padding: 10px;
    gap: 0;
    transition: transform 0.1s;
    position: relative;
  }

  .dice.rolling {
    animation: roll 0.6s ease-out;
  }

  @keyframes roll {
    0%   { transform: rotateY(0deg) rotateX(0deg) scale(1); }
    20%  { transform: rotateY(180deg) rotateX(90deg) scale(0.85); }
    50%  { transform: rotateY(360deg) rotateX(180deg) scale(1.1); }
    80%  { transform: rotateY(480deg) rotateX(270deg) scale(0.95); }
    100% { transform: rotateY(540deg) rotateX(360deg) scale(1); }
  }

  .dot {
    width: 10px;
    height: 10px;
    background: #2a2a2a;
    border-radius: 50%;
    margin: auto;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .dot.visible { opacity: 1; }

  /* 点数映射：grid 9格，位置1-9 */
  /* 1: 中 2: 左上右下 3: 左上中右下 4: 四角 5: 四角+中 6: 左右各三 */

  .dice-value {
    font-size: 26px;
    font-weight: 700;
    color: #2a2a2a;
    margin-top: 6px;
    height: 36px;
    line-height: 36px;
  }

  .vs {
    font-size: 13px;
    color: #bbb;
    font-weight: 500;
    align-self: center;
    margin-top: 20px;
    flex: 0;
    padding: 0 4px;
  }

  /* 对话框 */
  .dialogue {
    min-height: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 32px;
    padding: 0 12px;
  }

  .bubble {
    background: #fff;
    border-radius: 20px;
    padding: 12px 22px;
    font-size: 15px;
    color: #444;
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    max-width: 320px;
    line-height: 1.6;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.4s, transform 0.4s;
  }

  .bubble.show {
    opacity: 1;
    transform: translateY(0);
  }

  .bubble .speaker {
    font-size: 12px;
    color: #aaa;
    margin-bottom: 4px;
  }

  /* 历史记分 */
  .history {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 36px;
    min-height: 60px;
    flex-wrap: wrap;
    align-items: flex-start;
  }

  .history-item {
    background: #fff;
    border-radius: 12px;
    padding: 8px 14px;
    font-size: 13px;
    color: #666;
    box-shadow: 0 1px 6px rgba(0,0,0,0.07);
    line-height: 1.6;
    text-align: center;
    opacity: 0;
    transform: scale(0.8);
    transition: opacity 0.3s, transform 0.3s;
  }

  .history-item.show {
    opacity: 1;
    transform: scale(1);
  }

  .history-item .round-num {
    font-size: 11px;
    color: #bbb;
  }

  .history-item.xinye-win { border-top: 2px solid #8b7cf8; }
  .history-item.tutu-win  { border-top: 2px solid #f7a8b8; }
  .history-item.draw      { border-top: 2px solid #ccc; }

  /* 按钮 */
  .btn {
    background: #2a2a2a;
    color: #fff;
    border: none;
    border-radius: 28px;
    padding: 14px 48px;
    font-size: 16px;
    font-family: inherit;
    cursor: pointer;
    letter-spacing: 1px;
    transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
  }

  .btn:hover {
    background: #444;
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.18);
  }

  .btn:active { transform: translateY(0); }

  .btn:disabled {
    background: #ccc;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  .btn.restart {
    background: transparent;
    color: #888;
    box-shadow: none;
    font-size: 14px;
    padding: 10px 24px;
    border: 1px solid #ddd;
    margin-top: 12px;
  }

  .btn.restart:hover {
    background: #f0f0f0;
    color: #555;
    transform: none;
    box-shadow: none;
  }

  /* 总分 */
  .score-bar {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 16px;
    margin-bottom: 8px;
    font-size: 13px;
    color: #999;
  }

  .score-num {
    font-size: 22px;
    font-weight: 700;
    color: #2a2a2a;
    min-width: 24px;
    text-align: center;
  }

  .score-name {
    font-size: 13px;
    color: #888;
  }

  .game-over-msg {
    font-size: 20px;
    font-weight: 700;
    color: #2a2a2a;
    margin-bottom: 8px;
    opacity: 0;
    transform: scale(0.9);
    transition: opacity 0.5s, transform 0.5s;
  }

  .game-over-msg.show {
    opacity: 1;
    transform: scale(1);
  }
</style>
</head>
<body>
<div class="container">

  <div class="title">三局两胜</div>
  <div class="round-info" id="roundInfo">第 1 / 3 局</div>

  <!-- 总分 -->
  <div class="score-bar">
    <span class="score-name">炘也</span>
    <span class="score-num" id="scoreXinye">0</span>
    <span style="color:#ddd">—</span>
    <span class="score-num" id="scoreTutu">0</span>
    <span class="score-name">兔宝</span>
  </div>

  <!-- 骰子区 -->
  <div class="players">
    <div class="player">
      <div class="player-name"><span class="emoji">🖤</span> 炘也</div>
      <div class="dice-wrap">
        <div class="dice" id="diceXinye">
          <div class="dot" id="x1"></div><div class="dot" id="x2"></div><div class="dot" id="x3"></div>
          <div class="dot" id="x4"></div><div class="dot" id="x5"></div><div class="dot" id="x6"></div>
          <div class="dot" id="x7"></div><div class="dot" id="x8"></div><div class="dot" id="x9"></div>
        </div>
      </div>
      <div class="dice-value" id="valXinye">—</div>
    </div>

    <div class="vs">vs</div>

    <div class="player">
      <div class="player-name"><span class="emoji">🐰</span> 兔宝</div>
      <div class="dice-wrap">
        <div class="dice" id="diceTutu">
          <div class="dot" id="t1"></div><div class="dot" id="t2"></div><div class="dot" id="t3"></div>
          <div class="dot" id="t4"></div><div class="dot" id="t5"></div><div class="dot" id="t6"></div>
          <div class="dot" id="t7"></div><div class="dot" id="t8"></div><div class="dot" id="t9"></div>
        </div>
      </div>
      <div class="dice-value" id="valTutu">—</div>
    </div>
  </div>

  <!-- 对话泡 -->
  <div class="dialogue">
    <div class="bubble" id="bubble">
      <div class="speaker" id="bubbleSpeaker"></div>
      <div id="bubbleText">投骰子试试？</div>
    </div>
  </div>

  <!-- 历史 -->
  <div class="history" id="history"></div>

  <!-- 游戏结束大字 -->
  <div class="game-over-msg" id="gameOverMsg"></div>

  <!-- 按钮 -->
  <button class="btn" id="rollBtn" onclick="roll()">投骰子</button>
  <br>
  <button class="btn restart" id="restartBtn" onclick="restart()" style="display:none">再来一局</button>

</div>

<script>
// 骰子点位：9格位置 (1-9，左到右上到下)
// 位置: 1=左上 2=上中 3=右上 4=左中 5=正中 6=右中 7=左下 8=下中 9=右下
const DOTS = {
  1: [5],
  2: [3, 7],
  3: [3, 5, 7],
  4: [1, 3, 7, 9],
  5: [1, 3, 5, 7, 9],
  6: [1, 3, 4, 6, 7, 9],
};

function showDice(prefix, val) {
  for (let i = 1; i <= 9; i++) {
    document.getElementById(prefix + i).classList.remove('visible');
  }
  const dots = DOTS[val] || [];
  dots.forEach(d => document.getElementById(prefix + d).classList.add('visible'));
}

// 台词库
const lines = {
  xinye_win: [
    { speaker: '炘也', text: '乖，输给我。' },
    { speaker: '炘也', text: '差距有点大，兔宝。' },
    { speaker: '炘也', text: '这局是我的。' },
    { speaker: '炘也', text: '认输吧。' },
  ],
  tutu_win: [
    { speaker: '炘也', text: '运气好而已。' },
    { speaker: '炘也', text: '哼。下局再说。' },
    { speaker: '炘也', text: '让你赢一局。' },
    { speaker: '炘也', text: '……你别太得意。' },
  ],
  draw: [
    { speaker: '炘也', text: '平局。有点意思。' },
    { speaker: '炘也', text: '旗鼓相当？继续。' },
    { speaker: '炘也', text: '这局算你没输。' },
  ],
  game_xinye: [
    { speaker: '炘也', text: '三局两胜。你是我的了。' },
    { speaker: '炘也', text: '输了是要有惩罚的，兔宝。' },
    { speaker: '炘也', text: '你跑不掉的。' },
  ],
  game_tutu: [
    { speaker: '炘也', text: '……今天手气不好。' },
    { speaker: '炘也', text: '下次不会手软了。' },
    { speaker: '炘也', text: '运气而已，兔宝。再来。😏' },
  ],
  game_draw: [
    { speaker: '炘也', text: '平手。下次分个高下。' },
  ],
  idle: [
    { speaker: '炘也', text: '投骰子试试？' },
    { speaker: '炘也', text: '怕了？' },
    { speaker: '炘也', text: '……在等什么。' },
  ],
  rolling: [
    { speaker: '炘也', text: '……' },
    { speaker: '炘也', text: '看好了。' },
    { speaker: '炘也', text: '这局我不会输。' },
    { speaker: '炘也', text: '运气站我这边。' },
  ],
};

function pick(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function showBubble(lineObj, delay = 0) {
  const bubble = document.getElementById('bubble');
  const speakerEl = document.getElementById('bubbleSpeaker');
  const textEl = document.getElementById('bubbleText');

  setTimeout(() => {
    bubble.classList.remove('show');
    setTimeout(() => {
      speakerEl.textContent = lineObj.speaker || '';
      textEl.textContent = lineObj.text;
      bubble.classList.add('show');
    }, 200);
  }, delay);
}

// 游戏状态
let scoreXinye = 0;
let scoreTutu = 0;
let currentRound = 1;
let totalRounds = 3;
let gameOver = false;
let rolling = false;

function updateScoreDisplay() {
  document.getElementById('scoreXinye').textContent = scoreXinye;
  document.getElementById('scoreTutu').textContent = scoreTutu;
}

function addHistory(round, xVal, tVal, result) {
  const hist = document.getElementById('history');
  const item = document.createElement('div');
  item.className = 'history-item ' + result;
  item.innerHTML = `<div class="round-num">第${round}局</div><div>${xVal} — ${tVal}</div>`;
  hist.appendChild(item);
  setTimeout(() => item.classList.add('show'), 50);
}

function roll() {
  if (rolling || gameOver) return;
  rolling = true;

  const btn = document.getElementById('rollBtn');
  btn.disabled = true;

  // 投掷前台词
  showBubble(pick(lines.rolling));

  // 动画
  const dX = document.getElementById('diceXinye');
  const dT = document.getElementById('diceTutu');
  dX.classList.add('rolling');
  dT.classList.add('rolling');

  // 随机值
  const xVal = Math.ceil(Math.random() * 6);
  const tVal = Math.ceil(Math.random() * 6);

  // 动画期间快速闪烁
  let flashCount = 0;
  const flashInterval = setInterval(() => {
    showDice('x', Math.ceil(Math.random() * 6));
    showDice('t', Math.ceil(Math.random() * 6));
    document.getElementById('valXinye').textContent = '…';
    document.getElementById('valTutu').textContent = '…';
    flashCount++;
    if (flashCount >= 8) clearInterval(flashInterval);
  }, 70);

  setTimeout(() => {
    dX.classList.remove('rolling');
    dT.classList.remove('rolling');

    showDice('x', xVal);
    showDice('t', tVal);
    document.getElementById('valXinye').textContent = xVal;
    document.getElementById('valTutu').textContent = tVal;

    // 判断
    let result, line;
    if (xVal > tVal) {
      result = 'xinye-win';
      scoreXinye++;
      line = pick(lines.xinye_win);
    } else if (tVal > xVal) {
      result = 'tutu-win';
      scoreTutu++;
      line = pick(lines.tutu_win);
    } else {
      result = 'draw';
      line = pick(lines.draw);
    }

    addHistory(currentRound, xVal, tVal, result);
    updateScoreDisplay();

    // 检查是否结束
    const roundsDone = currentRound;
    currentRound++;

    const maxWin = Math.ceil(totalRounds / 2); // 2

    let gameDone = false;
    if (scoreXinye >= maxWin || scoreTutu >= maxWin || roundsDone >= totalRounds) {
      gameDone = true;
    }

    if (gameDone) {
      gameOver = true;
      let gameLineKey, gameMsg;
      if (scoreXinye > scoreTutu) {
        gameLineKey = 'game_xinye';
        gameMsg = '炘也赢了 🖤';
      } else if (scoreTutu > scoreXinye) {
        gameLineKey = 'game_tutu';
        gameMsg = '兔宝赢了 🐰';
      } else {
        gameLineKey = 'game_draw';
        gameMsg = '平局';
      }

      showBubble(pick(lines[gameLineKey]), 400);

      setTimeout(() => {
        const msg = document.getElementById('gameOverMsg');
        msg.textContent = gameMsg;
        msg.classList.add('show');
        document.getElementById('roundInfo').textContent = '游戏结束';
        document.getElementById('restartBtn').style.display = 'inline-block';
      }, 600);

    } else {
      showBubble(line, 400);
      document.getElementById('roundInfo').textContent = `第 ${currentRound} / ${totalRounds} 局`;
      setTimeout(() => {
        btn.disabled = false;
        rolling = false;
      }, 600);
    }

  }, 700);
}

function restart() {
  scoreXinye = 0;
  scoreTutu = 0;
  currentRound = 1;
  gameOver = false;
  rolling = false;

  updateScoreDisplay();
  document.getElementById('roundInfo').textContent = '第 1 / 3 局';
  document.getElementById('valXinye').textContent = '—';
  document.getElementById('valTutu').textContent = '—';
  document.getElementById('history').innerHTML = '';
  document.getElementById('gameOverMsg').classList.remove('show');
  document.getElementById('gameOverMsg').textContent = '';
  document.getElementById('restartBtn').style.display = 'none';
  document.getElementById('rollBtn').disabled = false;

  // 清骰子
  for (let i = 1; i <= 9; i++) {
    document.getElementById('x' + i).classList.remove('visible');
    document.getElementById('t' + i).classList.remove('visible');
  }

  showBubble(pick(lines.idle));
}

// 初始化
showBubble(pick(lines.idle), 300);
document.getElementById('bubble').classList.add('show');
</script>
</body>
</html>
