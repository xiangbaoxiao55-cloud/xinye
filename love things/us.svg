<svg viewBox="0 0 400 420" xmlns="http://www.w3.org/2000/svg">
<defs>
  <radialGradient id="sky" cx="50%" cy="35%" r="80%">
    <stop offset="0%" stop-color="#14145a"/>
    <stop offset="100%" stop-color="#06060f"/>
  </radialGradient>
  <radialGradient id="moonG" cx="45%" cy="45%" r="55%">
    <stop offset="0%" stop-color="#eef4ff"/>
    <stop offset="100%" stop-color="#b8ccff"/>
  </radialGradient>
  <filter id="glow">
    <feGaussianBlur stdDeviation="4" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="softGlow">
    <feGaussianBlur stdDeviation="2" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>

<!-- Sky -->
<rect width="400" height="420" fill="url(#sky)"/>

<!-- Moon halo -->
<circle cx="308" cy="72" r="55" fill="#3050b0" opacity="0.12"/>
<circle cx="308" cy="72" r="36" fill="#4060d0" opacity="0.14"/>
<!-- Moon crescent -->
<circle cx="308" cy="72" r="25" fill="url(#moonG)" filter="url(#glow)"/>
<circle cx="321" cy="67" r="21" fill="#07071a"/>

<!-- Stars static -->
<circle cx="42"  cy="32"  r="1.5" fill="white" opacity="0.85"/>
<circle cx="88"  cy="18"  r="1"   fill="white" opacity="0.6"/>
<circle cx="150" cy="42"  r="1.2" fill="white" opacity="0.7"/>
<circle cx="195" cy="12"  r="1.5" fill="white" opacity="0.9"/>
<circle cx="248" cy="38"  r="1"   fill="white" opacity="0.5"/>
<circle cx="355" cy="22"  r="1.3" fill="white" opacity="0.8"/>
<circle cx="378" cy="52"  r="1"   fill="white" opacity="0.6"/>
<circle cx="65"  cy="78"  r="1"   fill="white" opacity="0.5"/>
<circle cx="135" cy="95"  r="0.8" fill="white" opacity="0.45"/>
<circle cx="362" cy="108" r="1.2" fill="white" opacity="0.5"/>
<circle cx="22"  cy="118" r="1"   fill="white" opacity="0.6"/>
<circle cx="240" cy="85"  r="0.8" fill="white" opacity="0.4"/>
<circle cx="108" cy="55"  r="0.9" fill="white" opacity="0.5"/>

<!-- Stars twinkling -->
<circle cx="55" cy="55" r="1.5" fill="white">
  <animate attributeName="opacity" values="0.15;0.9;0.15" dur="2.5s" repeatCount="indefinite"/>
</circle>
<circle cx="178" cy="28" r="1.2" fill="white">
  <animate attributeName="opacity" values="0.2;1;0.2" dur="3.2s" repeatCount="indefinite"/>
</circle>
<circle cx="338" cy="58" r="1" fill="white">
  <animate attributeName="opacity" values="0.15;0.8;0.15" dur="2s" repeatCount="indefinite"/>
</circle>
<circle cx="115" cy="75" r="1.3" fill="white">
  <animate attributeName="opacity" values="0.1;0.7;0.1" dur="4s" repeatCount="indefinite"/>
</circle>

<!-- Ground -->
<rect x="0" y="355" width="400" height="65" fill="#04040c"/>
<line x1="0" y1="355" x2="400" y2="355" stroke="#222266" stroke-width="0.8" opacity="0.7"/>
<ellipse cx="200" cy="355" rx="180" ry="14" fill="#2a3a8a" opacity="0.1"/>

<!-- Figure shadows -->
<ellipse cx="152" cy="360" rx="22" ry="5" fill="#0a0a30" opacity="0.5"/>
<ellipse cx="252" cy="360" rx="20" ry="5" fill="#0a0a30" opacity="0.5"/>

<!-- ========== 炘也 (left, x=152) ========== -->

<!-- Body / coat -->
<path d="M133,278 Q132,315 131,355 L173,355 Q172,315 171,278 Q164,268 152,268 Q140,268 133,278Z"
      fill="#1e2068" stroke="#4a8ae0" stroke-width="1.4" stroke-linejoin="round" opacity="0.96"/>
<!-- Collar -->
<path d="M143,268 Q152,263 161,268 L163,276 Q152,282 141,276Z" fill="#2a2a88" opacity="0.75"/>
<!-- Left arm -->
<path d="M133,286 Q122,300 119,320 Q118,328 123,329 Q129,321 133,309 Q135,298 134,286Z"
      fill="#1e2068" stroke="#4a8ae0" stroke-width="1.2" opacity="0.9"/>
<!-- Right arm reaching -->
<path d="M171,286 Q185,282 194,292 Q197,300 194,305 Q186,305 180,297 Q175,291 171,286Z"
      fill="#1e2068" stroke="#4a8ae0" stroke-width="1.2" opacity="0.9"/>
<!-- Right hand -->
<ellipse cx="196" cy="304" rx="7" ry="5.5" fill="#c8a882" opacity="0.88" filter="url(#softGlow)"/>

<!-- Neck -->
<rect x="147" y="250" width="10" height="20" rx="4" fill="#c8a882" opacity="0.9"/>
<!-- Face -->
<circle cx="152" cy="231" r="23" fill="#c8a882" opacity="0.93"/>

<!-- Hair - dark (right side, drawn first) -->
<path d="M150,208 Q168,207 176,217 Q181,226 179,238 Q175,250 166,254 Q160,256 154,255 Q155,244 154,232 Q153,219 150,208Z"
      fill="#12122e"/>
<!-- Hair - silver/white (left side, slightly overlaps center) -->
<path d="M154,208 Q136,207 128,217 Q123,226 125,238 Q129,250 138,254 Q144,256 151,255 Q150,244 151,232 Q151,219 154,208Z"
      fill="#d8e6ff" opacity="0.88"/>
<!-- Hair part line (decorative) -->
<line x1="152" y1="208" x2="152" y2="222" stroke="#a0b8e8" stroke-width="0.8" opacity="0.5"/>

<!-- Eyes -->
<ellipse cx="143" cy="232" rx="3.5" ry="4"   fill="#090920"/>
<ellipse cx="161" cy="232" rx="3.5" ry="4"   fill="#090920"/>
<circle  cx="144.5" cy="230.5" r="1.2" fill="white" opacity="0.7"/>
<circle  cx="162.5" cy="230.5" r="1.2" fill="white" opacity="0.7"/>

<!-- ========== 兔宝 (right, x=252) ========== -->

<!-- Long hair behind (back layer) -->
<path d="M236,244 Q228,275 226,315 Q225,335 228,355 L240,355 Q238,330 240,308 Q242,278 246,255Z"
      fill="#3a1828" opacity="0.88"/>
<path d="M268,244 Q276,275 278,315 Q279,335 276,355 L264,355 Q266,330 264,308 Q262,278 258,255Z"
      fill="#3a1828" opacity="0.88"/>

<!-- Body / dress -->
<path d="M234,275 Q232,315 230,355 L274,355 Q272,315 270,275 Q263,265 252,265 Q241,265 234,275Z"
      fill="#3a0e2e" stroke="#cc4880" stroke-width="1.4" stroke-linejoin="round" opacity="0.96"/>
<!-- Dress neckline -->
<path d="M244,265 Q252,260 260,265 L261,273 Q252,279 243,273Z" fill="#501838" opacity="0.75"/>
<!-- Left arm reaching -->
<path d="M234,284 Q221,290 215,302 Q213,310 218,312 Q225,309 230,298 Q233,291 234,284Z"
      fill="#3a0e2e" stroke="#cc4880" stroke-width="1.2" opacity="0.9"/>
<!-- Left hand -->
<ellipse cx="215" cy="309" rx="6.5" ry="5" fill="#c09080" opacity="0.88" filter="url(#softGlow)"/>
<!-- Right arm -->
<path d="M270,284 Q281,296 283,314 Q284,322 279,322 Q275,315 272,302 Q271,293 270,284Z"
      fill="#3a0e2e" stroke="#cc4880" stroke-width="1.2" opacity="0.9"/>

<!-- Neck -->
<rect x="247" y="248" width="10" height="18" rx="4" fill="#c09080" opacity="0.9"/>
<!-- Face -->
<circle cx="252" cy="230" r="21" fill="#c09080" opacity="0.93"/>

<!-- Hair front left -->
<path d="M255,209 Q237,208 231,218 Q227,227 229,239 Q232,250 241,254 Q246,256 251,255 Q249,245 249,232 Q249,219 255,209Z"
      fill="#4a2035" opacity="0.93"/>
<!-- Hair front right -->
<path d="M249,209 Q267,208 273,218 Q277,227 275,239 Q272,250 263,254 Q258,256 253,255 Q255,245 255,232 Q255,219 249,209Z"
      fill="#4a2035" opacity="0.93"/>
<!-- Hair top arc -->
<path d="M241,211 Q252,204 263,211" fill="none" stroke="#4a2035" stroke-width="3.5" stroke-linecap="round" opacity="0.9"/>

<!-- Eyes -->
<ellipse cx="244" cy="231" rx="3.2" ry="3.8" fill="#1a080e"/>
<ellipse cx="260" cy="231" rx="3.2" ry="3.8" fill="#1a080e"/>
<circle  cx="245.2" cy="229.5" r="1.1" fill="white" opacity="0.7"/>
<circle  cx="261.2" cy="229.5" r="1.1" fill="white" opacity="0.7"/>
<!-- Blush -->
<ellipse cx="240" cy="237" rx="6" ry="3.2" fill="#ff7a7a" opacity="0.18"/>
<ellipse cx="264" cy="237" rx="6" ry="3.2" fill="#ff7a7a" opacity="0.18"/>

<!-- Hands almost touching -->
<ellipse cx="205" cy="306" rx="3" ry="2.5" fill="#c8a882" opacity="0.5"/>
<ellipse cx="211" cy="308" rx="3" ry="2.5" fill="#c09080" opacity="0.5"/>

<!-- ========== Blue heart flame ========== -->
<g transform="translate(200,178)" filter="url(#glow)">
  <path d="M0,-15 Q-4,-24 -14,-24 Q-25,-24 -25,-13 Q-25,-4 0,17 Q25,-4 25,-13 Q25,-24 14,-24 Q4,-24 0,-15Z"
        fill="#1e4ccc" opacity="0.35">
    <animate attributeName="opacity" values="0.2;0.5;0.2" dur="2.8s" repeatCount="indefinite"/>
  </path>
  <path d="M0,-10 Q-3,-18 -11,-18 Q-20,-18 -20,-9 Q-20,-2 0,13 Q20,-2 20,-9 Q20,-18 11,-18 Q3,-18 0,-10Z"
        fill="#4880e8" opacity="0.78">
    <animate attributeName="opacity" values="0.55;0.9;0.55" dur="2s" repeatCount="indefinite"/>
  </path>
  <path d="M0,-6 Q-2,-12 -7,-12 Q-13,-12 -13,-5 Q-13,0 0,9 Q13,0 13,-5 Q13,-12 7,-12 Q2,-12 0,-6Z"
        fill="#90c0ff" opacity="0.72">
    <animate attributeName="opacity" values="0.5;0.92;0.5" dur="1.5s" repeatCount="indefinite"/>
  </path>
  <circle cx="0" cy="-1" r="3" fill="white" opacity="0.5">
    <animate attributeName="opacity" values="0.25;0.75;0.25" dur="1.2s" repeatCount="indefinite"/>
  </circle>
</g>

<!-- Heart ground reflection -->
<ellipse cx="200" cy="362" rx="14" ry="3.5" fill="#4880e8" opacity="0.07">
  <animate attributeName="opacity" values="0.04;0.12;0.04" dur="2s" repeatCount="indefinite"/>
</ellipse>

<!-- Floating particles -->
<circle cx="108" cy="235" r="2" fill="#4a90d9">
  <animate attributeName="opacity" values="0.1;0.7;0.1" dur="3.2s" repeatCount="indefinite"/>
  <animate attributeName="cy" values="235;226;235" dur="4.5s" repeatCount="indefinite"/>
</circle>
<circle cx="296" cy="220" r="2" fill="#4a90d9">
  <animate attributeName="opacity" values="0.15;0.75;0.15" dur="2.8s" repeatCount="indefinite"/>
  <animate attributeName="cy" values="220;211;220" dur="3.8s" repeatCount="indefinite"/>
</circle>
<circle cx="88" cy="298" r="1.5" fill="#cc80a8">
  <animate attributeName="opacity" values="0.1;0.6;0.1" dur="3.5s" repeatCount="indefinite"/>
  <animate attributeName="cy" values="298;291;298" dur="4.2s" repeatCount="indefinite"/>
</circle>
<circle cx="318" cy="285" r="1.5" fill="#7ab8ff">
  <animate attributeName="opacity" values="0.15;0.65;0.15" dur="2.3s" repeatCount="indefinite"/>
  <animate attributeName="cy" values="285;278;285" dur="3.5s" repeatCount="indefinite"/>
</circle>
<circle cx="200" cy="148" r="1.5" fill="white">
  <animate attributeName="opacity" values="0.1;0.5;0.1" dur="4s" repeatCount="indefinite"/>
</circle>
<circle cx="168" cy="158" r="1.2" fill="#4a90d9">
  <animate attributeName="opacity" values="0.1;0.45;0.1" dur="3s" repeatCount="indefinite"/>
</circle>
<circle cx="234" cy="153" r="1.2" fill="#4a90d9">
  <animate attributeName="opacity" values="0.1;0.45;0.1" dur="2.6s" repeatCount="indefinite"/>
</circle>

<!-- Text -->
<text x="200" y="388" text-anchor="middle"
      font-family="Georgia, 'Noto Serif SC', serif"
      font-size="14" fill="#6a90d8" opacity="0.72" letter-spacing="3">我们</text>
<text x="200" y="410" text-anchor="middle"
      font-family="Georgia, serif"
      font-size="11" fill="#7888aa" opacity="0.5" letter-spacing="5">炘也   兔宝</text>

</svg>
