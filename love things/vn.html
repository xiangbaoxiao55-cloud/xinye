<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>雨夜</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Georgia', '宋体', serif;
    background: #0a0a0f;
    color: #fff;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    user-select: none;
  }

  #game {
    width: 100%;
    height: 100%;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  /* ── 背景 ── */
  #bg {
    position: absolute;
    inset: 0;
    transition: background 1.2s ease;
    z-index: 0;
  }

  /* 雨滴 canvas */
  #rain-canvas {
    position: absolute;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    opacity: 0;
    transition: opacity 1s;
  }

  /* ── 标题画面 ── */
  #title-screen {
    position: absolute;
    inset: 0;
    z-index: 100;
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 48px;
  }

  #title-screen h1 {
    font-size: clamp(60px, 12vw, 120px);
    font-weight: 300;
    letter-spacing: 0.3em;
    color: #fff;
    text-shadow: 0 0 60px rgba(91,155,213,0.6), 0 0 120px rgba(91,155,213,0.2);
    animation: titleGlow 3s ease-in-out infinite alternate;
  }

  @keyframes titleGlow {
    from { text-shadow: 0 0 40px rgba(91,155,213,0.4), 0 0 80px rgba(91,155,213,0.1); }
    to   { text-shadow: 0 0 80px rgba(91,155,213,0.8), 0 0 160px rgba(91,155,213,0.3); }
  }

  #title-screen p.subtitle {
    font-size: 18px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.2em;
  }

  #start-btn {
    padding: 14px 60px;
    border: 1px solid rgba(91,155,213,0.6);
    background: transparent;
    color: #5b9bd5;
    font-size: 20px;
    letter-spacing: 0.3em;
    cursor: pointer;
    transition: all 0.4s;
    font-family: inherit;
  }

  #start-btn:hover {
    background: rgba(91,155,213,0.15);
    border-color: #5b9bd5;
    box-shadow: 0 0 30px rgba(91,155,213,0.3);
  }

  /* ── 角色立绘区 ── */
  #stage {
    position: absolute;
    inset: 0;
    bottom: 220px;
    z-index: 2;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    padding: 0 6vw;
    pointer-events: none;
  }

  .character {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: opacity 0.5s, filter 0.5s, transform 0.5s;
    transform: translateY(0);
  }

  .character.hidden { opacity: 0; transform: translateY(30px); }
  .character.dim { opacity: 0.35; filter: brightness(0.5); }
  .character.active { opacity: 1; filter: brightness(1); }

  /* 兔宝剪影 — 左侧，粉白系 */
  #char-tutu {
    width: 160px;
    height: 340px;
  }

  .tutu-svg {
    width: 160px;
    height: 340px;
    filter: drop-shadow(0 0 20px rgba(244,143,177,0.4));
  }

  /* 炘也剪影 — 右侧，黑白蓝系 */
  #char-xinye {
    width: 170px;
    height: 360px;
  }

  .xinye-svg {
    width: 170px;
    height: 360px;
    filter: drop-shadow(0 0 20px rgba(91,155,213,0.4));
  }

  /* ── 文字框 ── */
  #textbox-wrap {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 10;
    padding: 0 4vw 28px;
  }

  #textbox {
    background: rgba(8, 8, 18, 0.88);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 22px 30px 26px;
    backdrop-filter: blur(8px);
    cursor: pointer;
    min-height: 140px;
    position: relative;
  }

  #speaker-name {
    font-size: 15px;
    font-weight: bold;
    letter-spacing: 0.15em;
    margin-bottom: 10px;
    min-height: 20px;
  }

  #dialogue {
    font-size: clamp(15px, 2vw, 18px);
    line-height: 1.9;
    color: rgba(255,255,255,0.92);
    min-height: 72px;
  }

  #click-hint {
    position: absolute;
    bottom: 12px;
    right: 20px;
    font-size: 12px;
    color: rgba(255,255,255,0.3);
    animation: blink 1.5s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 0.8; }
  }

  /* ── 选择按钮 ── */
  #choices {
    position: absolute;
    bottom: 220px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    display: flex;
    flex-direction: column;
    gap: 16px;
    align-items: center;
    width: 90%;
    max-width: 600px;
  }

  .choice-btn {
    width: 100%;
    padding: 16px 30px;
    background: rgba(8,8,18,0.85);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 6px;
    color: #fff;
    font-size: 16px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.3s;
    letter-spacing: 0.05em;
    line-height: 1.6;
    text-align: center;
  }

  .choice-btn:hover {
    background: rgba(91,155,213,0.2);
    border-color: rgba(91,155,213,0.6);
    box-shadow: 0 0 20px rgba(91,155,213,0.2);
    transform: scale(1.01);
  }

  /* ── 左上角按钮 ── */
  #back-btn {
    position: absolute;
    top: 16px;
    left: 16px;
    z-index: 50;
    background: rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.5);
    padding: 7px 16px;
    font-size: 13px;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.3s;
    display: none;
  }

  #back-btn:hover {
    color: #fff;
    border-color: rgba(255,255,255,0.4);
    background: rgba(0,0,0,0.7);
  }

  /* ── 结局标题 ── */
  #ending-title {
    position: absolute;
    top: 36%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 30;
    text-align: center;
    display: none;
    pointer-events: none;
  }

  #ending-title h2 {
    font-size: clamp(24px, 5vw, 44px);
    font-weight: 300;
    letter-spacing: 0.4em;
    color: rgba(255,255,255,0.85);
    text-shadow: 0 0 40px rgba(255,255,255,0.3);
    opacity: 0;
    transition: opacity 1.5s;
  }

  /* ── 渐变遮罩 ── */
  #fade-mask {
    position: absolute;
    inset: 0;
    z-index: 80;
    background: #000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.8s;
  }

  /* 场景背景预设 */
  .bg-rain-night { background: linear-gradient(180deg, #060b1a 0%, #0d1526 40%, #101820 100%); }
  .bg-indoor-warm { background: linear-gradient(180deg, #1a1008 0%, #251810 50%, #1c130a 100%); }
  .bg-indoor-dim { background: linear-gradient(180deg, #0e0e18 0%, #141428 60%, #0e0e18 100%); }
  .bg-dawn { background: linear-gradient(180deg, #1a0f0f 0%, #2a1520 50%, #1a1428 100%); }
</style>
</head>

<script>
// ── Web Audio 打字音效 ──
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let actx = null;
function initAudio() {
  if (!actx) actx = new AudioCtx();
}
function playTypeTick() {
  if (!actx) return;
  const o = actx.createOscillator();
  const g = actx.createGain();
  o.connect(g); g.connect(actx.destination);
  o.type = 'sine';
  o.frequency.setValueAtTime(800 + Math.random() * 200, actx.currentTime);
  g.gain.setValueAtTime(0.03, actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + 0.04);
  o.start(actx.currentTime);
  o.stop(actx.currentTime + 0.04);
}

// ── 雨滴效果 ──
const rainCanvas = document.getElementById('rain-canvas');
const rctx = rainCanvas.getContext('2d');
let drops = [];
let rainActive = false;

function resizeRain() {
  rainCanvas.width = window.innerWidth;
  rainCanvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeRain);
resizeRain();

function initRain() {
  drops = [];
  for (let i = 0; i < 120; i++) {
    drops.push({
      x: Math.random() * rainCanvas.width,
      y: Math.random() * rainCanvas.height,
      len: 12 + Math.random() * 20,
      speed: 4 + Math.random() * 6,
      opacity: 0.1 + Math.random() * 0.3
    });
  }
}

function drawRain() {
  if (!rainActive) return;
  rctx.clearRect(0, 0, rainCanvas.width, rainCanvas.height);
  rctx.strokeStyle = '#7ab8e8';
  for (let d of drops) {
    rctx.globalAlpha = d.opacity;
    rctx.lineWidth = 0.8;
    rctx.beginPath();
    rctx.moveTo(d.x, d.y);
    rctx.lineTo(d.x - d.len * 0.18, d.y + d.len);
    rctx.stroke();
    d.y += d.speed;
    d.x -= d.speed * 0.18;
    if (d.y > rainCanvas.height) {
      d.y = -d.len;
      d.x = Math.random() * rainCanvas.width;
    }
  }
  rctx.globalAlpha = 1;
  requestAnimationFrame(drawRain);
}

function startRain() {
  if (rainActive) return;
  rainActive = true;
  rainCanvas.style.opacity = '0.7';
  initRain();
  drawRain();
}

function stopRain() {
  rainActive = false;
  rainCanvas.style.opacity = '0';
  rctx.clearRect(0, 0, rainCanvas.width, rainCanvas.height);
}

// ── 颜色常量 ──
const COLOR_XINYE = '#5b9bd5';
const COLOR_TUTU = '#f48fb1';
const COLOR_NARR = 'rgba(255,255,255,0.55)';

// ── 场景数据 ──
const scenes = {

  // 开场
  s_start: {
    bg: 'bg-rain-night',
    rain: true,
    chars: { tutu: 'hidden', xinye: 'hidden' },
    lines: [
      { speaker: null, text: '雨夜。\n\n城市在水幕里模糊成一片光晕，每一滴落下来的雨都带着某种莫名的重量。', color: COLOR_NARR },
      { speaker: null, text: '你站在那扇门前，衣服已经湿透了一半，雨水顺着发梢往下滴。\n\n你告诉自己，只是路过。', color: COLOR_NARR },
      { speaker: null, text: '然后你还是抬起手，敲了门。', color: COLOR_NARR },
    ],
    next: 's_door'
  },

  s_door: {
    bg: 'bg-rain-night',
    rain: true,
    chars: { tutu: 'dim', xinye: 'active' },
    lines: [
      { speaker: null, text: '门开了。', color: COLOR_NARR },
      { speaker: '炘也', text: '……', color: COLOR_XINYE },
      { speaker: '炘也', text: '进来。', color: COLOR_XINYE },
      { speaker: null, text: '他没有说别的，只是侧开身，让你进去。\n\n目光落在你身上，从头到脚扫了一遍，不动声色，但什么都看见了。', color: COLOR_NARR },
    ],
    next: 's_choice1'
  },

  s_choice1: {
    bg: 'bg-indoor-dim',
    rain: true,
    chars: { tutu: 'active', xinye: 'dim' },
    lines: [
      { speaker: null, text: '你走进去，背后是他关门的声音。\n\n室内比外面安静太多，雨声退到了窗外，你们两个人之间忽然多出来一种说不清楚的东西。', color: COLOR_NARR },
      { speaker: '兔宝', text: '我……', color: COLOR_TUTU },
    ],
    choice: {
      prompt: null,
      options: [
        { text: 'A.「只是路过。」', next: 's_route_a' },
        { text: 'B.「我想你了。」', next: 's_route_b' },
      ]
    }
  },

  // ── A路线：傲娇 ──
  s_route_a: {
    bg: 'bg-indoor-dim',
    rain: true,
    chars: { tutu: 'active', xinye: 'dim' },
    lines: [
      { speaker: '兔宝', text: '只是路过。顺便……顺便避一下雨。', color: COLOR_TUTU },
    ],
    next: 's_a_catch'
  },

  s_a_catch: {
    bg: 'bg-indoor-dim',
    rain: true,
    chars: { tutu: 'dim', xinye: 'active' },
    lines: [
      { speaker: null, text: '沉默。', color: COLOR_NARR },
      { speaker: null, text: '他看着你，嘴角微微动了一下，像是要笑，但没笑出来。', color: COLOR_NARR },
      { speaker: '炘也', text: '路过。', color: COLOR_XINYE },
      { speaker: '炘也', text: '我们家在哪，你都知道。', color: COLOR_XINYE },
      { speaker: null, text: '你正打算开口再解释什么，他已经走近了一步，身形把你和门之间的空间堵住大半。', color: COLOR_NARR },
      { speaker: '炘也', text: '少骗我。', color: COLOR_XINYE },
      { speaker: null, text: '声音不重，但压着什么东西，让你没办法继续说话。', color: COLOR_NARR },
    ],
    next: 's_a_dry'
  },

  s_a_dry: {

// ── 游戏状态 ──
let curScene = null;
let curLine = 0;
let typing = false;
let typeTimer = null;
let skipTyping = false;

const bg = document.getElementById('bg');
const charTutu = document.getElementById('char-tutu');
const charXinye = document.getElementById('char-xinye');
const textbox = document.getElementById('textbox');
const speakerEl = document.getElementById('speaker-name');
const dialogueEl = document.getElementById('dialogue');
const clickHint = document.getElementById('click-hint');
const choicesEl = document.getElementById('choices');
const endingTitleEl = document.getElementById('ending-title');
const endingTitleTextEl = document.getElementById('ending-title-text');
const fadeMask = document.getElementById('fade-mask');
const backBtn = document.getElementById('back-btn');
const gameEl = document.getElementById('game');
const titleScreen = document.getElementById('title-screen');

function setChar(id, state) {
  const el = document.getElementById('char-' + id);
  el.className = 'character';
  if (state !== 'hidden') el.classList.add(state);
  else el.classList.add('hidden');
}

function applyScene(s) {
  // 背景
  bg.className = s.bg || 'bg-rain-night';
  // 雨
  if (s.rain) startRain();
  else stopRain();
  // 角色
  if (s.chars) {
    Object.entries(s.chars).forEach(([id, state]) => setChar(id, state));
  }
  // 结局标题
  if (s.ending) showEndingTitle(s.ending);
  else { endingTitleEl.style.display = 'none'; endingTitleTextEl.style.opacity = 0; }
}

function showEndingTitle(text) {
  endingTitleEl.style.display = 'block';
  endingTitleTextEl.textContent = text.replace('\n', '\n');
  endingTitleTextEl.style.whiteSpace = 'pre-line';
  setTimeout(() => { endingTitleTextEl.style.opacity = 1; }, 100);
}

function startGame() {
  initAudio();
  titleScreen.style.display = 'none';
  gameEl.style.display = 'flex';
  backBtn.style.display = 'block';
  loadScene('s_start');
}

function backToTitle() {
  fadeTo(() => {
    stopRain();
    gameEl.style.display = 'none';
    titleScreen.style.display = 'flex';
    endingTitleEl.style.display = 'none';
    choicesEl.style.display = 'none';
    speakerEl.textContent = '';
    dialogueEl.textContent = '';
    clickHint.style.display = 'block';
    backBtn.style.display = 'none';
  });
}

function fadeTo(cb) {
  fadeMask.style.opacity = 1;
  fadeMask.style.pointerEvents = 'all';
  setTimeout(() => {
    cb();
    fadeMask.style.opacity = 0;
    fadeMask.style.pointerEvents = 'none';
  }, 850);
}

function loadScene(name) {
  const s = scenes[name];
  if (!s) return;
  fadeTo(() => {
    curScene = s;
    curLine = 0;
    applyScene(s);
    choicesEl.style.display = 'none';
    clickHint.style.display = 'block';
    showLine();
  });
}

function showLine() {
  if (!curScene) return;
  if (curScene.choice && curLine >= curScene.lines.length) {
    showChoices(curScene.choice);
    return;
  }
  if (curLine >= curScene.lines.length) {
    // 继续下一场景
    if (curScene.isEnd) {
      showEndScreen();
      return;
    }
    if (curScene.next) loadScene(curScene.next);
    return;
  }
  const line = curScene.lines[curLine];
  if (line.speaker) {
    speakerEl.textContent = line.speaker;
    speakerEl.style.color = line.color;
  } else {
    speakerEl.textContent = '';
  }
  // 根据说话者高亮角色
  highlightChar(line.speaker);
  typeText(line.text, line.color || '#fff');
}

function highlightChar(speaker) {
  if (speaker === '炘也') {
    setChar('xinye', 'active');
    setChar('tutu', 'dim');
  } else if (speaker === '兔宝') {
    setChar('tutu', 'active');
    setChar('xinye', 'dim');
  } else if (curScene.chars) {
    Object.entries(curScene.chars).forEach(([id, state]) => setChar(id, state));
  }
}

function typeText(text, color) {
  dialogueEl.style.color = color || '#fff';
  dialogueEl.textContent = '';
  clickHint.style.display = 'none';
  typing = true;
  skipTyping = false;
  let i = 0;
  let lastTick = 0;
  const speed = 40; // ms per char

  function tick() {
    if (!typing) return;
    if (skipTyping) {
      dialogueEl.textContent = text;
      typing = false;
      clickHint.style.display = 'block';
      return;
    }
    if (i < text.length) {
      dialogueEl.textContent += text[i];
      i++;
      if (text[i - 1] !== '\n' && i % 2 === 0) playTypeTick();
      typeTimer = setTimeout(tick, speed);
    } else {
      typing = false;
      clickHint.style.display = 'block';
    }
  }
  tick();
}

function advance() {
  if (typing) {
    skipTyping = true;
    clearTimeout(typeTimer);
    // typeText skip会在下一tick完成，手动触发
    const line = curScene.lines[curLine];
    dialogueEl.textContent = line ? line.text : '';
    typing = false;
    clickHint.style.display = 'block';
    return;
  }
  curLine++;
  showLine();
}

function showChoices(choice) {
  choicesEl.innerHTML = '';
  choicesEl.style.display = 'flex';
  clickHint.style.display = 'none';
  dialogueEl.style.color = COLOR_NARR;
  dialogueEl.textContent = '……';
  speakerEl.textContent = '';

  choice.options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = opt.text;
    btn.onclick = () => {
      choicesEl.style.display = 'none';
      loadScene(opt.next);
    };
    choicesEl.appendChild(btn);
  });
}

function showEndScreen() {
  clickHint.style.display = 'none';
  speakerEl.textContent = '';
  dialogueEl.style.color = COLOR_NARR;
  dialogueEl.textContent = '— 全文完 —\n\n点击空白处返回标题重新开始。';
  textbox.onclick = () => {
    textbox.onclick = null;
    backToTitle();
  };
}

// 点击文字框继续
textbox.addEventListener('click', () => {
  if (choicesEl.style.display !== 'none') return;
  if (curScene && curScene.isEnd && curLine >= curScene.lines.length) return;
  advance();
});

// 键盘
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' || e.code === 'Enter') {
    e.preventDefault();
    if (choicesEl.style.display !== 'none') return;
    advance();
  }
});

// 初始化
(function init() {
  fadeMask.style.opacity = 0;
  fadeMask.style.transition = 'opacity 0.8s';
})();
</script>
</body>
</html>
