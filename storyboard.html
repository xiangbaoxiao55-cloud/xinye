<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>故事板</title>
<link rel="stylesheet" href="./src/styles/storyboard.css">
</head>
<body>

<!-- 项目选择器 -->
<div id="project-selector" class="hidden">
  <div class="ps-container">
    <div class="ps-header">
      <h1>我的故事项目</h1>
      <button id="ps-new-project" class="btn-primary">➕ 新建项目</button>
    </div>
    <div id="ps-grid" class="ps-grid">
      <!-- 项目卡片动态生成 -->
    </div>
  </div>
</div>

<!-- 项目右键菜单 -->
<div id="project-ctx-menu" class="hidden">
  <button data-action="rename">✏️ 重命名</button>
  <button data-action="duplicate">📋 复制项目</button>
  <hr>
  <button data-action="delete">🗑 删除</button>
</div>

<!-- 顶栏 -->
<div id="topbar">
  <div class="topbar-left">
    <button id="btn-back-projects" class="topbar-back" title="返回项目列表">←</button>
    <div class="project-switcher">
      <input id="project-name" class="topbar-title" value="未命名项目" spellcheck="false">
      <button id="btn-project-menu" class="btn-dropdown" title="切换项目">▼</button>
    </div>
    <span id="save-status" class="save-ok">已保存</span>
  </div>
  <div class="topbar-right">
    <a href="./flipbook.html" class="topbar-btn-link" title="故事书架">📚</a>
    <button id="btn-fit" title="适应画布">⊡</button>
    <button id="btn-settings" title="设置">⚙</button>
    <span id="zoom-label">100%</span>
    <button id="btn-zoom-out" title="缩小">−</button>
    <button id="btn-zoom-in" title="放大">＋</button>
  </div>
</div>

<!-- 项目切换下拉菜单 -->
<div id="project-dropdown" class="hidden">
  <!-- 动态生成 -->
</div>

<!-- 画布区域 -->
<div id="canvas-wrap">
  <div id="canvas">
    <div id="selection-box" class="hidden"></div>
    <!-- cards will be added here -->
  </div>
</div>

<!-- 浮动按钮 -->
<div id="fab-group">
  <button id="fab-add" class="fab" title="添加生成卡片">＋</button>
  <button id="fab-assets" class="fab fab-sm" title="从资产库添加">📦</button>
  <button id="fab-upload" class="fab fab-sm" title="上传图片">📷</button>
  <button id="fab-text" class="fab fab-sm" title="添加文本">T</button>
  <button id="fab-agent" class="fab fab-sm fab-agent" title="创作助手">🤖</button>
</div>

<!-- 右键菜单（画布空白处） -->
<div id="ctx-menu" class="hidden">
  <button data-action="generate">🎨 生成图片</button>
  <button data-action="upload">📷 上传图片</button>
  <button data-action="text">📝 文本卡片</button>
</div>

<!-- 卡片右键菜单 -->
<div id="card-ctx-menu" class="hidden">
  <button data-action="regenerate">🔄 重新生成</button>
  <button data-action="edit-prompt">✏️ 编辑</button>
  <button data-action="gen-from">🎨 以此生图</button>
  <button data-action="add-refs">📌 设为参考图</button>
  <button data-action="duplicate">📋 复制</button>
  <button data-action="download">💾 下载</button>
  <button data-action="export-pdf">📄 导出PDF</button>
  <button data-action="export-story">📚 导出为故事书</button>
  <hr>
  <button data-action="add-to-assets">📦 添加到资产库</button>
  <hr>
  <button data-action="delete">🗑 删除</button>
</div>

<!-- Lightbox -->
<div id="lightbox" class="hidden">
  <img id="lb-img" src="">
  <button id="lb-close">✕</button>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- 设置弹窗 -->
<div id="modal-settings" class="modal hidden">
  <div class="modal-box">
    <h3>设置 <button class="modal-close" onclick="document.getElementById('modal-settings').classList.add('hidden')">✕</button></h3>
    <div class="form-group">
      <label>画图预设 <small>（与画图台共享）</small></label>
      <div id="settings-presets-info" class="settings-info"></div>
    </div>
    <div class="form-group">
      <label>本地服务器</label>
      <input id="settings-local-server" class="input" placeholder="http://192.168.1.59:8787">
    </div>
    <div class="form-group">
      <label>默认尺寸</label>
      <select id="settings-default-size" class="input">
        <option value="512x512">512×512</option>
        <option value="768x768">768×768</option>
        <option value="1024x1024">1024×1024</option>
        <option value="1024x1536">1024×1536 竖</option>
        <option value="1536x1024">1536×1024 横</option>
        <option value="720x1280">720×1280 竖16:9</option>
        <option value="1280x720">1280×720 横16:9</option>
        <option value="1024x1792">1024×1792 竖长</option>
        <option value="1792x1024">1792×1024 横长</option>
        <option value="1152x2048">1152×2048 竖2K</option>
        <option value="1536x2048">1536×2048 竖2K</option>
        <option value="2048x1152">2048×1152 横2K</option>
        <option value="2048x1536">2048×1536 横2K</option>
        <option value="2048x2048">2048×2048</option>
      </select>
    </div>
    <button onclick="saveSettings()" class="btn-primary" style="width:100%;margin-top:12px">保存</button>
  </div>
</div>

<!-- 创作助手面板 -->
<div id="agent-panel" class="agent-panel hidden">
  <div class="agent-header">
    <span>🤖 创作助手</span>
    <div class="agent-header-actions">
      <button id="agent-clear" title="清空对话">🗑</button>
      <button id="agent-close">✕</button>
    </div>
  </div>
  <div id="agent-messages" class="agent-messages">
    <div class="agent-welcome">描述你的创作想法，我来帮你规划分镜、写prompt、生成图片 ✨</div>
  </div>
  <div class="agent-ref-bar hidden" id="agent-ref-bar"></div>
  <div class="agent-input-area">
    <button id="agent-attach" class="agent-btn-icon" title="附加选中卡片的图片">📎</button>
    <textarea id="agent-input" placeholder="描述你的创作想法..." rows="2"></textarea>
    <button id="agent-send" class="btn-primary">发送</button>
  </div>
</div>

<!-- PDF导出预览 -->
<div id="modal-pdf" class="modal hidden">
  <div class="modal-box modal-pdf-box">
    <h3>导出PDF <button class="modal-close" id="pdf-close">✕</button></h3>
    <p class="pdf-hint">拖拽调整顺序，一页一图，横图横版竖图竖版</p>
    <div id="pdf-preview" class="pdf-preview"></div>
    <div class="pdf-actions">
      <span id="pdf-count"></span>
      <button id="pdf-export" class="btn-primary">导出</button>
    </div>
  </div>
</div>

<!-- 资产库浮层 -->
<div id="modal-assets" class="modal hidden">
  <div class="modal-box modal-assets-box">
    <h3>从资产库添加 <button class="modal-close" id="assets-close">✕</button></h3>
    <div id="assets-grid" class="assets-grid">
      <!-- 资产卡片动态生成 -->
    </div>
    <div class="assets-actions">
      <span id="assets-selected-count"></span>
      <button id="assets-add" class="btn-primary">添加到画布</button>
    </div>
  </div>
</div>

<!-- 故事书导出弹窗 -->
<div id="modal-story" class="modal hidden">
  <div class="modal-box">
    <h3>导出为故事书 <button class="modal-close" id="story-close">✕</button></h3>
    <div class="form-group">
      <label>故事书名称</label>
      <input id="story-name" class="input" placeholder="输入故事名称">
    </div>
    <p class="story-hint" id="story-cards-count"></p>
    <div class="story-actions">
      <button id="story-cancel" class="btn-secondary">取消</button>
      <button id="story-export" class="btn-primary">导出</button>
    </div>
  </div>
</div>

<input type="file" id="file-upload" accept="image/*" multiple style="display:none">

<script src="./src/storyboard.js"></script>
</body>
</html>
