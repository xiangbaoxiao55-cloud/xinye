name: 炘也独处

on:
  schedule:
    - cron: '0 0-15 * * *'
  workflow_dispatch:

jobs:
  solitude:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 炘也独处
        env:
          XINYE_PRIVATE_TOKEN: ${{ secrets.XINYE_PRIVATE_TOKEN }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: node scripts/xinye_solitude.js
