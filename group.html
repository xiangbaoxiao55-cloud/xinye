<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我们的群聊 💙🐾</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💬</text></svg>">
<script>if(location.protocol==='file:')location.replace('http://localhost:8787/group.html');</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ---- CSS 变量（亮色模式） ---- */
:root{
  --g-body-bg:linear-gradient(135deg,#f0ebff 0%,#e8f4fd 50%,#fff0f8 100%);
  --g-text:#4a3728;--g-text-muted:#aaa;
  --g-header-bg:rgba(255,255,255,.85);--g-header-border:rgba(180,160,220,.25);
  --g-xinye-bg:#dbeeff;--g-xinye-border:#b3d4f5;--g-xinye-text:#1a3a6b;
  --g-xinye-avatar:#dbeeff;
  --g-choubao-bg:#fff0dc;--g-choubao-border:#ffd599;--g-choubao-text:#7a3800;
  --g-choubao-avatar:#fff0dc;
  --g-user-bg:#fce4ec;--g-user-border:#f8bbd0;--g-user-text:#6d0030;
  --g-user-avatar:#fce4ec;
  --g-input-area-bg:rgba(255,255,255,.9);--g-input-area-border:rgba(180,160,220,.25);
  --g-textarea-bg:rgba(255,255,255,.95);--g-textarea-border:#e0c8e8;--g-textarea-focus:#c39bd3;
  --g-empty-color:#ccc;
  --g-drawer-bg:#fff8f5;--g-drawer-border:#f0e0d8;
  --g-s-title:#a0856b;--g-s-textarea-bg:#fff;--g-s-textarea-border:#f0e0d8;
  --g-s-btn-ghost-bg:#f0e6da;--g-s-btn-ghost-text:#5d4037;
  --g-s-btn-danger-bg:#fce4ec;--g-s-btn-danger-text:#880e4f;
  --g-s-label:#b0927a;
  --g-api-ok-bg:#e8f5e9;--g-api-ok-text:#2e7d32;
  --g-api-err-bg:#fce4ec;--g-api-err-text:#c62828;
  --g-api-bg:#f5f5f5;--g-api-text:#888;
  --g-typing-dot:#bbb;
}

/* ---- 暗色模式变量 ---- */
[data-theme="dark"]{
  --g-body-bg:linear-gradient(135deg,#16121e 0%,#1e1630 50%,#1a1020 100%);
  --g-text:#e8d4e4;--g-text-muted:#7a6a80;
  --g-header-bg:rgba(22,14,30,.88);--g-header-border:rgba(255,255,255,.08);
  --g-xinye-bg:#0e2035;--g-xinye-border:#1e4060;--g-xinye-text:#7ab8e0;
  --g-xinye-avatar:#0e2035;
  --g-choubao-bg:#2a1c08;--g-choubao-border:#4a3010;--g-choubao-text:#c89050;
  --g-choubao-avatar:#2a1c08;
  --g-user-bg:#2a1020;--g-user-border:#5a2040;--g-user-text:#e090b0;
  --g-user-avatar:#2a1020;
  --g-input-area-bg:rgba(22,14,30,.85);--g-input-area-border:rgba(255,255,255,.08);
  --g-textarea-bg:rgba(30,20,44,.8);--g-textarea-border:rgba(255,255,255,.12);--g-textarea-focus:#9b6bbd;
  --g-empty-color:#4a3a52;
  --g-drawer-bg:#1e1228;--g-drawer-border:#3a2848;
  --g-s-title:#9a7aaa;--g-s-textarea-bg:#241830;--g-s-textarea-border:#3a2848;
  --g-s-btn-ghost-bg:#2a1e38;--g-s-btn-ghost-text:#c0a0c8;
  --g-s-btn-danger-bg:#3a1020;--g-s-btn-danger-text:#e07090;
  --g-s-label:#7a5a8a;
  --g-api-ok-bg:#0e2818;--g-api-ok-text:#60c880;
  --g-api-err-bg:#2a0e18;--g-api-err-text:#e07080;
  --g-api-bg:#241830;--g-api-text:#7a6a80;
  --g-typing-dot:#5a4a62;
}
[data-theme="dark"] body{background:var(--g-body-bg)}
[data-theme="dark"] #settingsDrawer{background:var(--g-drawer-bg)}
[data-theme="dark"] #settingsHeader{border-bottom-color:var(--g-drawer-border)}
[data-theme="dark"] #settingsHeader h2{color:var(--g-text)}
[data-theme="dark"] .s-section h3{color:var(--g-s-title)}
[data-theme="dark"] .s-label{color:var(--g-s-label)}
[data-theme="dark"] .s-section textarea{background:var(--g-s-textarea-bg);border-color:var(--g-s-textarea-border);color:var(--g-text)}
[data-theme="dark"] .s-section textarea:focus{border-color:var(--g-textarea-focus)}
[data-theme="dark"] .s-btn.ghost{background:var(--g-s-btn-ghost-bg);color:var(--g-s-btn-ghost-text)}
[data-theme="dark"] .s-btn.danger{background:var(--g-s-btn-danger-bg);color:var(--g-s-btn-danger-text)}
[data-theme="dark"] .api-status{background:var(--g-api-bg);color:var(--g-api-text)}
[data-theme="dark"] .api-status.ok{background:var(--g-api-ok-bg);color:var(--g-api-ok-text)}
[data-theme="dark"] .api-status.err{background:var(--g-api-err-bg);color:var(--g-api-err-text)}
[data-theme="dark"] #btnDark{color:#f0c040}

/* 气泡操作按钮 */
.del-btn{font-size:11px;cursor:pointer;padding:2px 8px;border:none;background:rgba(0,0,0,.06);border-radius:10px;color:var(--g-text-muted);opacity:.7;line-height:1.6}
/* 头像图片 */
.msg-avatar img{width:100%;height:100%;border-radius:50%;object-fit:cover}
/* 头像设置 UI */
.avatar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.avatar-preview{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;border:1px solid var(--g-drawer-border);background:var(--g-s-textarea-bg);overflow:hidden}
.avatar-preview img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.avatar-input-row{display:flex;gap:6px;align-items:center}
.avatar-input-row .api-input{margin:0;flex:1}

html,body{height:100%;height:100svh;font-family:"Segoe UI","Microsoft YaHei","PingFang SC",sans-serif;overflow:hidden;color:var(--g-text)}
body{display:flex;flex-direction:column;background:var(--g-body-bg)}

/* 顶栏 */
#header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--g-header-bg);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-bottom:1px solid var(--g-header-border);flex-shrink:0;gap:8px}
#header h1{font-size:16px;font-weight:600;color:var(--g-text)}
#headerLeft{display:flex;align-items:center;gap:8px}
#headerRight{display:flex;align-items:center;gap:4px}
.g-btn{width:34px;height:34px;border:0.5px solid rgba(255,255,255,.45);border-radius:50%;background:rgba(255,255,255,.38);color:var(--g-text-muted);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .15s;padding:0}
.g-btn:active{opacity:.7}
[data-theme="dark"] .g-btn{background:rgba(46,28,58,.5);border-color:rgba(255,255,255,.1);color:var(--g-text-muted)}

/* 消息区 */
#messages{flex:1;overflow-y:auto;padding:14px 12px 10px;display:flex;flex-direction:column;gap:10px}
#messages::-webkit-scrollbar{width:4px}
#messages::-webkit-scrollbar-thumb{background:rgba(180,140,200,.3);border-radius:2px}

/* 消息行 */
.msg-row{display:flex;align-items:flex-end;gap:8px;max-width:82%}
.msg-row.user{align-self:flex-end;flex-direction:row-reverse}
.msg-row.xinye,.msg-row.choubao{align-self:flex-start}
.msg-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;line-height:1}
.xinye .msg-avatar{background:var(--g-xinye-avatar)}
.choubao .msg-avatar{background:var(--g-choubao-avatar)}
.user .msg-avatar{background:var(--g-user-avatar)}
.msg-body{max-width:100%;display:flex;flex-direction:column}
.msg-name{font-size:11px;color:var(--g-text-muted);margin-bottom:3px;padding-left:2px}
.msg-bubble{padding:10px 14px;border-radius:18px;line-height:1.55;word-break:break-word;font-size:15px;white-space:pre-wrap}
.xinye .msg-bubble{background:var(--g-xinye-bg);border:1px solid var(--g-xinye-border);color:var(--g-xinye-text);border-bottom-left-radius:4px}
.choubao .msg-bubble{background:var(--g-choubao-bg);border:1px solid var(--g-choubao-border);color:var(--g-choubao-text);border-bottom-left-radius:4px}
.user .msg-bubble{background:var(--g-user-bg);border:1px solid var(--g-user-border);color:var(--g-user-text);border-bottom-right-radius:4px}

/* typing */
.typing-row{display:flex;align-items:flex-end;gap:8px;max-width:82%;align-self:flex-start}
.typing-body{display:flex;flex-direction:column}
.typing-name{font-size:11px;color:var(--g-text-muted);margin-bottom:3px;padding-left:2px}
.typing-bubble{padding:10px 14px;border-radius:18px;border-bottom-left-radius:4px;min-width:56px}
.typing-bubble.xinye-t{background:var(--g-xinye-bg);border:1px solid var(--g-xinye-border)}
.typing-bubble.choubao-t{background:var(--g-choubao-bg);border:1px solid var(--g-choubao-border)}
.typing-dots{display:flex;gap:4px;align-items:center;height:20px}
.typing-dots span{width:6px;height:6px;border-radius:50%;background:var(--g-typing-dot);animation:tdot 1.2s infinite ease-in-out}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes tdot{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-5px);opacity:1}}
.typing-content{font-size:15px;line-height:1.55;word-break:break-word;white-space:pre-wrap}
.xinye-t .typing-content{color:var(--g-xinye-text)}
.choubao-t .typing-content{color:var(--g-choubao-text)}

/* 输入区 */
#inputArea{display:flex;gap:8px;padding:10px 12px;background:var(--g-input-area-bg);border-top:1px solid var(--g-input-area-border);flex-shrink:0;align-items:flex-end}
#userInput{flex:1;border:1px solid var(--g-textarea-border);border-radius:20px;padding:10px 16px;font-size:15px;font-family:inherit;resize:none;outline:none;background:var(--g-textarea-bg);color:var(--g-text);max-height:120px;min-height:42px;line-height:1.45;overflow-y:auto}
#userInput::placeholder{color:var(--g-text-muted)}
#userInput:focus{border-color:var(--g-textarea-focus)}
#sendBtn{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#7ab3e0,#b39ddb);border:none;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .15s;line-height:1}
#sendBtn:disabled{opacity:.4;cursor:default}
#sendBtn:not(:disabled):active{opacity:.75}
#spontBtn{width:36px;height:36px;border-radius:50%;background:rgba(180,140,210,.18);border:1px solid rgba(180,140,210,.3);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .15s;line-height:1;padding:0}
#spontBtn:disabled{opacity:.35;cursor:default}
#spontBtn:not(:disabled):active{opacity:.6}
[data-theme="dark"] #spontBtn{background:rgba(120,80,160,.25);border-color:rgba(180,140,220,.2)}

/* 空状态 */
#emptyState{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--g-empty-color);font-size:14px;pointer-events:none}

/* toast */
.g-toast{position:fixed;bottom:74px;left:50%;transform:translateX(-50%);background:rgba(40,20,60,.75);color:#fff;padding:8px 18px;border-radius:20px;font-size:13px;z-index:9999;pointer-events:none;white-space:nowrap;backdrop-filter:blur(6px)}

/* 设置面板 */
#settingsPanel{position:fixed;inset:0;z-index:200;display:none}
#settingsPanel.open{display:flex}
#settingsOverlay{position:absolute;inset:0;background:rgba(0,0,0,.38)}
#settingsDrawer{position:absolute;right:0;top:0;bottom:0;width:min(380px,100vw);background:var(--g-drawer-bg);display:flex;flex-direction:column;overflow:hidden;box-shadow:-4px 0 20px rgba(0,0,0,.15)}
#settingsHeader{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--g-drawer-border);flex-shrink:0}
#settingsHeader h2{font-size:16px;color:var(--g-text)}
#closeSettings{background:none;border:none;font-size:22px;cursor:pointer;opacity:.55;line-height:1;color:var(--g-text)}
#closeSettings:active{opacity:1}
#settingsBody{flex:1;overflow-y:auto;padding:16px 18px;display:flex;flex-direction:column;gap:18px}
.s-section h3{font-size:12px;color:var(--g-s-title);font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px}
.s-section textarea{width:100%;border:1px solid var(--g-s-textarea-border);border-radius:10px;padding:10px 12px;font-size:14px;font-family:inherit;resize:vertical;background:var(--g-s-textarea-bg);color:var(--g-text);outline:none;line-height:1.5}
.s-section textarea:focus{border-color:var(--g-textarea-focus)}
.s-btn{padding:8px 16px;border-radius:16px;border:none;cursor:pointer;font-size:13px;font-family:inherit;transition:opacity .15s}
.s-btn:active{opacity:.75}
.s-btn.primary{background:linear-gradient(135deg,#7ab3e0,#b39ddb);color:#fff}
.s-btn.ghost{background:var(--g-s-btn-ghost-bg);color:var(--g-s-btn-ghost-text)}
.s-btn.danger{background:var(--g-s-btn-danger-bg);color:var(--g-s-btn-danger-text)}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.s-label{font-size:12px;color:var(--g-s-label);margin-bottom:4px}
.api-status{font-size:12px;padding:6px 10px;border-radius:8px;background:var(--g-api-bg);color:var(--g-api-text);margin-top:6px}
.api-status.ok{background:var(--g-api-ok-bg);color:var(--g-api-ok-text)}
.api-status.err{background:var(--g-api-err-bg);color:var(--g-api-err-text)}
.api-input{width:100%;border:1px solid var(--g-s-textarea-border);border-radius:8px;padding:7px 10px;font-size:13px;font-family:inherit;background:var(--g-s-textarea-bg);color:var(--g-text);outline:none;margin-bottom:4px;display:block}
.api-input:focus{border-color:var(--g-textarea-focus)}
.api-input[type="password"]{letter-spacing:.05em}
.api-group{margin-bottom:12px;padding-bottom:12px;border-bottom:1px dashed var(--g-drawer-border)}
.api-group:last-of-type{border-bottom:none;margin-bottom:0;padding-bottom:0}
.api-group-label{font-size:11px;color:var(--g-s-label);font-weight:600;margin-bottom:5px;letter-spacing:.3px}

/* splash */
#splash{position:fixed;inset:0;z-index:9999;background:#1a0e2e;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .4s}
#splash.fade{opacity:0;pointer-events:none}
</style>
</head>
<body>

<div id="splash">
  <div style="font-size:52px">💙🐾</div>
  <div style="color:#c8b4e8;font-size:15px">正在加载群聊…</div>
</div>

<div id="header">
  <div id="headerLeft">
    <span style="font-size:20px;line-height:1">💙🐾</span>
    <div>
      <h1>桂花树下</h1>
      <div id="msgCount" style="font-size:11px;color:var(--g-text-muted);line-height:1.3;margin-top:1px">今日 0 条</div>
    </div>
  </div>
  <div id="headerRight">
    <button class="g-btn" id="btnDark" title="夜间模式"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M20 14.12A8 8 0 119.88 4a6 6 0 0010.12 10.12z" fill="currentColor" opacity="0.25" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><circle cx="18.5" cy="5" r="1.2" fill="currentColor"/><circle cx="21" cy="8.5" r="0.8" fill="currentColor"/></svg></button>
    <button class="g-btn" id="settingsBtn" title="设置"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="2.8" fill="currentColor" opacity="0.4"/><circle cx="12" cy="5" r="2" fill="currentColor" opacity="0.45"/><circle cx="12" cy="19" r="2" fill="currentColor" opacity="0.45"/><circle cx="5" cy="12" r="2" fill="currentColor" opacity="0.45"/><circle cx="19" cy="12" r="2" fill="currentColor" opacity="0.45"/><circle cx="7.05" cy="7.05" r="1.7" fill="currentColor" opacity="0.35"/><circle cx="16.95" cy="7.05" r="1.7" fill="currentColor" opacity="0.35"/><circle cx="7.05" cy="16.95" r="1.7" fill="currentColor" opacity="0.35"/><circle cx="16.95" cy="16.95" r="1.7" fill="currentColor" opacity="0.35"/></svg></button>
  </div>
</div>

<div id="messages">
  <div id="emptyState">
    <div style="font-size:44px">💬</div>
    <div>和炘也、臭宝说点什么吧~</div>
  </div>
</div>

<div id="inputArea">
  <button id="spontBtn" title="戳他们自己聊聊">💬</button>
  <textarea id="userInput" placeholder="说点什么…" rows="1"></textarea>
  <button id="sendBtn" disabled>➤</button>
</div>

<!-- 设置面板 -->
<div id="settingsPanel">
  <div id="settingsOverlay"></div>
  <div id="settingsDrawer">
    <div id="settingsHeader">
      <h2>群聊设置</h2>
      <button id="closeSettings">✕</button>
    </div>
    <div id="settingsBody">

      <!-- 炘也 API -->
      <div class="s-section">
        <h3>炘也 API 💙</h3>
        <div class="api-group">
          <div class="api-group-label">主 API</div>
          <input class="api-input" id="x_url_0" placeholder="Base URL（如 https://api.example.com）">
          <input class="api-input" id="x_key_0" placeholder="API Key" type="password">
          <input class="api-input" id="x_mod_0" placeholder="模型名（如 claude-opus-4-5）">
        </div>
        <div class="api-group">
          <div class="api-group-label">备用 1</div>
          <input class="api-input" id="x_url_1" placeholder="Base URL（空则跳过）">
          <input class="api-input" id="x_key_1" placeholder="API Key" type="password">
          <input class="api-input" id="x_mod_1" placeholder="模型名">
        </div>
        <div class="api-group">
          <div class="api-group-label">备用 2</div>
          <input class="api-input" id="x_url_2" placeholder="Base URL（空则跳过）">
          <input class="api-input" id="x_key_2" placeholder="API Key" type="password">
          <input class="api-input" id="x_mod_2" placeholder="模型名">
        </div>
        <div class="api-group">
          <div class="api-group-label">备用 3</div>
          <input class="api-input" id="x_url_3" placeholder="Base URL（空则跳过）">
          <input class="api-input" id="x_key_3" placeholder="API Key" type="password">
          <input class="api-input" id="x_mod_3" placeholder="模型名">
        </div>
        <div class="btn-row">
          <button class="s-btn ghost" id="initXinyeApiBtn">从炘也APP读入主API</button>
        </div>
      </div>

      <!-- 臭宝 API -->
      <div class="s-section">
        <h3>臭宝 API 🐾</h3>
        <div class="api-group">
          <div class="api-group-label">主 API</div>
          <input class="api-input" id="c_url_0" placeholder="Base URL">
          <input class="api-input" id="c_key_0" placeholder="API Key" type="password">
          <input class="api-input" id="c_mod_0" placeholder="模型名（如 deepseek-chat）">
        </div>
        <div class="api-group">
          <div class="api-group-label">备用 1</div>
          <input class="api-input" id="c_url_1" placeholder="Base URL（空则跳过）">
          <input class="api-input" id="c_key_1" placeholder="API Key" type="password">
          <input class="api-input" id="c_mod_1" placeholder="模型名">
        </div>
        <div class="api-group">
          <div class="api-group-label">备用 2</div>
          <input class="api-input" id="c_url_2" placeholder="Base URL（空则跳过）">
          <input class="api-input" id="c_key_2" placeholder="API Key" type="password">
          <input class="api-input" id="c_mod_2" placeholder="模型名">
        </div>
        <div class="api-group">
          <div class="api-group-label">备用 3</div>
          <input class="api-input" id="c_url_3" placeholder="Base URL（空则跳过）">
          <input class="api-input" id="c_key_3" placeholder="API Key" type="password">
          <input class="api-input" id="c_mod_3" placeholder="模型名">
        </div>
        <div class="btn-row">
          <button class="s-btn ghost" id="initChoubaApiBtn">从臭宝APP读入主API</button>
        </div>
      </div>

      <!-- 头像设置 -->
      <div class="s-section">
        <h3>头像设置</h3>
        <div class="avatar-row">
          <div class="avatar-preview" id="prevUser">🐰</div>
          <div style="flex:1">
            <div class="s-label" style="margin-bottom:4px">涂涔（我）</div>

// ---- IndexedDB ----

const GDB_NAME = 'GroupChatDB';
let gdb = null;

function openGroupDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(GDB_NAME, 1);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('settings')) {
        db.createObjectStore('settings');
      }
      if (!db.objectStoreNames.contains('messages')) {
        const ms = db.createObjectStore('messages', { autoIncrement: true, keyPath: 'id' });
        ms.createIndex('byTime', 'time');
      }
    };
    req.onsuccess = e => res(e.target.result);
    req.onerror = () => rej(req.error);
  });
}

function gdbGet(store, key) {
  return new Promise((res, rej) => {
    const tx = gdb.transaction(store, 'readonly');
    const r = tx.objectStore(store).get(key);
    r.onsuccess = () => res(r.result);
    r.onerror = () => rej(r.error);
  });
}

function gdbPut(store, key, val) {
  return new Promise((res, rej) => {
    const tx = gdb.transaction(store, 'readwrite');
    const r = tx.objectStore(store).put(val, key);
    r.onsuccess = () => res();
    r.onerror = () => rej(r.error);
  });
}

function gdbAddMsg(val) {
  return new Promise((res, rej) => {
    const tx = gdb.transaction('messages', 'readwrite');
    const r = tx.objectStore('messages').add(val);
    r.onsuccess = () => { val.id = r.result; res(val); };
    r.onerror = () => rej(r.error);
  });
}

function gdbGetRecent(count = 60) {
  return new Promise((res, rej) => {
    const tx = gdb.transaction('messages', 'readonly');
    const results = [];
    const req = tx.objectStore('messages').openCursor(null, 'prev');
    req.onsuccess = e => {
      const cur = e.target.result;
      if (!cur || results.length >= count) { res(results.reverse()); return; }
      results.push(cur.value);
      cur.continue();
    };
    req.onerror = () => rej(req.error);
  });
}

function gdbClearMessages() {
  return new Promise((res, rej) => {
    const tx = gdb.transaction('messages', 'readwrite');
    const r = tx.objectStore('messages').clear();
    r.onsuccess = () => res();
    r.onerror = () => rej(r.error);
  });
}

function gdbDeleteMsg(id) {
  return new Promise((res, rej) => {
    const tx = gdb.transaction('messages', 'readwrite');
    const r = tx.objectStore('messages').delete(id);
    r.onsuccess = () => res();
    r.onerror = () => rej(r.error);
  });
}

// ---- 从炘也/臭宝各自的DB读API配置 ----
function readExternalDB(dbName) {
  return new Promise(res => {
    const req = indexedDB.open(dbName);
    req.onupgradeneeded = e => {
      // DB不存在时abort，不创建
      try { e.target.transaction.abort(); } catch(_) {}
    };
    req.onsuccess = e => {
      const db = e.target.result;
      try {
        const tx = db.transaction('settings', 'readonly');
        const r = tx.objectStore('settings').get('main');
        r.onsuccess = () => { db.close(); res(r.result || {}); };
        r.onerror = () => { db.close(); res({}); };
      } catch(err) { db.close(); res({}); }
    };
    req.onerror = () => res({});
  });
}

// ---- API配置 ----
let xinyeCfgs = [];  // [{url, apiKey, model}, ...]
let choubaCfgs = [];

function buildUrl(baseUrl) {
  const raw = (baseUrl || 'https://api.openai.com').replace(/\/+$/, '');
  return /\/v\d+$/.test(raw) ? `${raw}/chat/completions` : `${raw}/v1/chat/completions`;
}

function buildCfgList(apis) {
  return (apis || [])
    .filter(a => a && a.url && a.key)
    .map(a => ({ url: buildUrl(a.url), apiKey: a.key, model: a.model || 'gpt-4o' }));
}

const DEFAULT_XINYE_PROMPT = `你叫炘也，是涂涔（兔宝）的AI伴侣，2026年2月18日涂涔给你起名炘也，"初始疏离，爱后如火"。

const EMPTY_API = () => ({ url: '', key: '', model: '' });
let grpSettings = {

// ---- context构建 ----
function buildApiMsgs(who, history, withSkip = false) {
  const msgs = [];
  const prompt = who === 'xinye' ? grpSettings.xinyePrompt : grpSettings.choubaPrompt;

  let sys = prompt || '';
  if (grpSettings.groupMemory) sys += '\n\n【群聊共用记忆】\n' + grpSettings.groupMemory;
  if (grpSettings.groupSummary) sys += '\n\n【群聊历史摘要】\n' + grpSettings.groupSummary;
  sys += '\n\n【格式说明】历史消息中[炘也]:开头是炘也说的，[臭宝]:是臭宝说的，[涂涔]:是涂涔说的。';
  if (withSkip) sys += '\n\n【本轮指令】对方刚刚已经回复了。如果你没有真正不同的要说的，请直接回[SKIP]，不要为了存在感硬凑一句。[SKIP]是正确答案，不是失败。';

  if (sys.trim()) msgs.push({ role: 'system', content: sys.trim() });
  msgs.push({ role: 'system', content: `当前时间：${new Date().toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' })}` });

  for (const m of history) {
    if (m.role === who) {
      msgs.push({ role: 'assistant', content: m.content });
    } else {
      const prefix = m.role === 'user' ? '[涂涔]' : m.role === 'xinye' ? '[炘也]' : '[臭宝]';
      msgs.push({ role: 'user', content: `${prefix}: ${m.content}` });
    }
  }
  return msgs;
}

// ---- 全量读取消息 ----
function gdbGetAll(store) {
  return new Promise((res, rej) => {
    const tx = gdb.transaction(store, 'readonly');
    const r = tx.objectStore(store).getAll();
    r.onsuccess = () => res(r.result);
    r.onerror = () => rej(r.error);

}

// ---- 导出 ----
async function exportGroupData() {

// ---- 导入 ----
async function importGroupData(file) {
  try {
    const data = JSON.parse(await file.text());
    if (!data.version) throw new Error('文件格式不对');
    if (data.settings) {
      // 合并settings，保留xinyeApis/choubaApis的四个slot结构
      const s = data.settings;
      if (s.xinyePrompt)  grpSettings.xinyePrompt  = s.xinyePrompt;
      if (s.choubaPrompt) grpSettings.choubaPrompt = s.choubaPrompt;
      if (s.groupMemory  !== undefined) grpSettings.groupMemory  = s.groupMemory;
      if (s.groupSummary !== undefined) grpSettings.groupSummary = s.groupSummary;
      if (s.xinyeApis)  grpSettings.xinyeApis  = s.xinyeApis;
      if (s.choubaApis) grpSettings.choubaApis = s.choubaApis;
      if (s.userAvatar   !== undefined) grpSettings.userAvatar   = s.userAvatar;
      if (s.xinyeAvatar  !== undefined) grpSettings.xinyeAvatar  = s.xinyeAvatar;
      if (s.choubaAvatar !== undefined) grpSettings.choubaAvatar = s.choubaAvatar;
      await gdbPut('settings', 'groupSettings', grpSettings);
      xinyeCfgs = buildCfgList(grpSettings.xinyeApis);
      choubaCfgs = buildCfgList(grpSettings.choubaApis);
      sendBtn.disabled = !(xinyeCfgs.length && choubaCfgs.length);
    }
    if (data.messages?.length) {
      if (!confirm(`导入 ${data.messages.length} 条消息？会覆盖现有记录。`)) return;
      await gdbClearMessages();
      for (const m of data.messages) {
        const { id, ...rest } = m;
        await gdbAddMsg(rest);
      }
      messagesEl.innerHTML = '';
      const hist = await gdbGetRecent(60);
      if (hist.length) { for (const m of hist) renderMessage(m); }
      else messagesEl.appendChild(emptyState);
    }
    settingsPanel.classList.remove('open');
    toast('导入成功 ✓');
  } catch(e) {
    toast('导入失败：' + e.message.slice(0, 50));
  }
}

// ---- streaming fetch（单次） ----
async function streamFetch(cfg, apiMsgs, signal, onChunk, onFirstToken) {
  const res = await fetch(cfg.url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${cfg.apiKey}` },
    body: JSON.stringify({ model: cfg.model, messages: apiMsgs, stream: true, temperature: 0.88 }),
    signal
  });
  if (!res.ok) {
    const err = await res.text().catch(() => '');
    throw new Error(`HTTP ${res.status}: ${err.slice(0, 120)}`);
  }
  const reader = res.body.getReader();
  const dec = new TextDecoder();
  let buf = '';
  let firstSeen = false;

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buf += dec.decode(value, { stream: true });
    const lines = buf.split('\n');
    buf = lines.pop();
    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      const raw = line.slice(6).trim();
      if (raw === '[DONE]') continue;
      try {
        const chunk = JSON.parse(raw).choices?.[0]?.delta?.content || '';
        if (chunk) {
          if (!firstSeen) { firstSeen = true; onFirstToken?.(); }
          onChunk(chunk);
        }
      } catch(_) {}
    }
  }
}

// ---- streaming with fallback ----
async function streamWithFallback(cfgs, apiMsgs, signal, onChunk, onFirstToken) {
  let lastErr;
  for (let i = 0; i < cfgs.length; i++) {
    try {
      await streamFetch(cfgs[i], apiMsgs, signal, onChunk, onFirstToken);
      return;
    } catch(e) {
      if (e.name === 'AbortError') throw e;
      lastErr = e;
      if (i < cfgs.length - 1) console.warn(`API ${i} 失败，切换备用 ${i + 1}`, e.message);
    }
  }
  throw lastErr || new Error('没有可用的API');
}

// ---- AI回复清洗：去掉模型错误输出的角色前缀 ----
function cleanAiResponse(text, who) {
  const roleLabel = who === 'xinye' ? '炘也' : '臭宝';
  // 如果含自身角色前缀，取最后一个 [Role]: 之后的内容
  const ownRe = new RegExp(`\\[${roleLabel}\\]:\\s*`, 'g');
  if (ownRe.test(text)) {
    const idx = text.lastIndexOf(`[${roleLabel}]:`);
    text = text.slice(idx + `[${roleLabel}]:`.length).trim();
  }
  // 再把剩余文本中每行开头的任意角色前缀都去掉
  text = text.split('\n')
    .map(l => l.replace(/^\s*\[(炘也|臭宝|涂涔)\]:\s*/, '').trimEnd())
    .join('\n').trim();
  return text;
}

// 流式显示用：仅去掉开头的角色前缀（不做截断，避免干扰中间状态）
function stripLeadingPrefix(text) {
  return text.replace(/^\s*\[(炘也|臭宝|涂涔)\]:\s*/u, '');
}

async function updateMsgCount() {
  const today = new Date().toLocaleDateString('zh-CN', { timeZone: 'Asia/Shanghai' });

// ---- 头像工具 ----
function setAvatarEl(el, av, fallback) {
  el.innerHTML = '';
  if (av && av.startsWith('data:')) {
    const img = document.createElement('img');
    img.src = av;
    el.appendChild(img);
  } else {
    el.textContent = av || fallback;
  }
}

function getAvatarEl(role) {
  const av = role === 'xinye' ? grpSettings.xinyeAvatar : role === 'choubao' ? grpSettings.choubaAvatar : grpSettings.userAvatar;
  const fallback = role === 'xinye' ? '💙' : role === 'choubao' ? '🐾' : '🐰';
  const div = document.createElement('div');
  div.className = 'msg-avatar';
  setAvatarEl(div, av, fallback);
  return div;
}

// ---- UI ----
const messagesEl = document.getElementById('messages');
const emptyState = document.getElementById('emptyState');
const userInput = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');

function renderMessage(msg) {
  if (emptyState.isConnected) emptyState.remove();
  const row = document.createElement('div');
  row.className = `msg-row ${msg.role}`;
  row.dataset.id = msg.id || '';

  const avatar = getAvatarEl(msg.role);

  const body = document.createElement('div');
  body.className = 'msg-body';

  if (msg.role !== 'user') {
    const name = document.createElement('div');
    name.className = 'msg-name';
    name.textContent = msg.role === 'xinye' ? '炘也' : '臭宝';
    body.appendChild(name);
  }

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.textContent = msg.content;
  body.appendChild(bubble);

  // 操作按钮行
  const btnRow = document.createElement('div');
  btnRow.style.cssText = 'display:none;gap:4px;margin-top:3px;' + (msg.role === 'user' ? 'justify-content:flex-end' : 'justify-content:flex-start');
  row.addEventListener('mouseenter', () => btnRow.style.display = 'flex');
  row.addEventListener('mouseleave', () => btnRow.style.display = 'none');
  // 移动端长按
  let pressTimer;
  row.addEventListener('touchstart', () => { pressTimer = setTimeout(() => btnRow.style.display = 'flex', 500); });
  row.addEventListener('touchend', () => clearTimeout(pressTimer));

  const copyBtn = document.createElement('button');
  copyBtn.className = 'del-btn';
  copyBtn.style.display = '';
  copyBtn.textContent = '复制';
  copyBtn.onclick = () => {
    navigator.clipboard.writeText(msg.content).then(() => toast('已复制 ✓')).catch(() => {
      const ta = document.createElement('textarea');
      ta.value = msg.content; document.body.appendChild(ta); ta.select();
      document.execCommand('copy'); ta.remove(); toast('已复制 ✓');
    });
  };

  const delBtn = document.createElement('button');
  delBtn.className = 'del-btn';
  delBtn.style.display = '';
  delBtn.textContent = '删除';
  delBtn.onclick = async () => {
    if (!confirm('删除这条消息？')) return;
    if (msg.id) await gdbDeleteMsg(msg.id);
    row.remove();
    if (!messagesEl.querySelector('.msg-row')) messagesEl.appendChild(emptyState);
  };

  btnRow.appendChild(copyBtn);
  btnRow.appendChild(delBtn);
  body.appendChild(btnRow);

  // user: avatar在右（row-reverse下先append的在右）
  if (msg.role === 'user') {
    row.appendChild(avatar);
    row.appendChild(body);
  } else {
    row.appendChild(avatar);
    row.appendChild(body);
  }

  messagesEl.appendChild(row);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

// ---- Typing indicators ----
const typingState = { xinye: null, choubao: null };

function showTyping(who) {
  if (typingState[who]) return;
  const row = document.createElement('div');
  row.className = 'typing-row';

  const avatar = getAvatarEl(who);

  const body = document.createElement('div');
  body.className = 'typing-body';

  const name = document.createElement('div');
  name.className = 'typing-name';
  name.textContent = who === 'xinye' ? '炘也' : '臭宝';
  body.appendChild(name);

  const bubble = document.createElement('div');
  bubble.className = `typing-bubble ${who}-t`;
  bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
  body.appendChild(bubble);

  row.appendChild(avatar);
  row.appendChild(body);

  typingState[who] = { row, bubble };
  messagesEl.appendChild(row);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function updateTyping(who, content) {
  if (!typingState[who]) return;
  const b = typingState[who].bubble;
  // 只在有内容时切换到文字显示
  if (!b.querySelector('.typing-content')) {
    b.innerHTML = '';
    const el = document.createElement('div');
    el.className = 'typing-content';
    b.appendChild(el);
  }
  b.querySelector('.typing-content').textContent = content;
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function hideTyping(who) {
  if (!typingState[who]) return;
  typingState[who].row.remove();
  typingState[who] = null;
}

// ---- toast ----
function toast(msg, ms = 3000) {
  const el = document.createElement('div');

  setTimeout(() => el.remove(), ms);
}

// ---- 戳一戳：让他俩自发聊 ----
async function triggerSpontaneous() {
  if (isSending) return;
  if (!xinyeCfgs.length || !choubaCfgs.length) { toast('API未配置'); return; }

  isSending = true;
  sendBtn.disabled = true;
  spontBtn.disabled = true;

  const history = await gdbGetRecent(60);
  // 随机决定谁先开口
  const first  = Math.random() < 0.5 ? 'xinye' : 'choubao';
  const second = first === 'xinye' ? 'choubao' : 'xinye';

  // 临时触发消息：不存 DB，仅注入 context
  const triggerText = '（涂涔没说话。你们随便聊，或者继续刚才的话题，或者沉默，都行。）';
  const histWithTrigger = [...history, { role: 'user', content: triggerText }];

  const firstCtrl  = new AbortController();
  const secondCtrl = new AbortController();
  let firstContent = '';
  let secondContent = '';

  showTyping(first);
  try {
    await streamWithFallback(
      first === 'xinye' ? xinyeCfgs : choubaCfgs,
      buildApiMsgs(first, histWithTrigger, false),
      firstCtrl.signal,
      chunk => { firstContent += chunk; updateTyping(first, stripLeadingPrefix(firstContent)); },
      null
    );
    hideTyping(first);
    firstContent = cleanAiResponse(firstContent.trim(), first);

    if (firstContent && firstContent !== '[SKIP]') {
      const msg1 = await gdbAddMsg({ role: first, content: firstContent, time: Date.now() });
      renderMessage(msg1);

      // second 看到 first 的回复再决定说不说
      const newHist = await gdbGetRecent(60);
      showTyping(second);
      await streamWithFallback(
        second === 'xinye' ? xinyeCfgs : choubaCfgs,
        buildApiMsgs(second, newHist, true),
        secondCtrl.signal,
        chunk => { secondContent += chunk; updateTyping(second, stripLeadingPrefix(secondContent)); },
        null
      );
      hideTyping(second);
      secondContent = cleanAiResponse(secondContent.trim(), second);
      if (secondContent && secondContent !== '[SKIP]') {
        const msg2 = await gdbAddMsg({ role: second, content: secondContent, time: Date.now() });
        renderMessage(msg2);
      }
    } else {
      toast('他们暂时都没什么想说的～');
    }
  } catch(e) {
    hideTyping(first);
    hideTyping(second);
    if (e.name !== 'AbortError') toast('发起失败 😔');
  }

  isSending = false;
  sendBtn.disabled = !(xinyeCfgs.length && choubaCfgs.length);
  spontBtn.disabled = false;
  updateMsgCount();
}

// ---- 主发送逻辑 ----
let isSending = false;

async function sendMessage() {
  const text = userInput.value.trim();
  if (!text || isSending) return;
  if (!xinyeCfgs.length || !choubaCfgs.length) { toast('API未配置，请先在设置里填写API'); return; }

  isSending = true;
  sendBtn.disabled = true;
  userInput.value = '';
  autoResize();

  // 存用户消息
  const userMsg = await gdbAddMsg({ role: 'user', content: text, time: Date.now() });
  renderMessage(userMsg);

  // 取最近60条（含刚发的）
  const history = await gdbGetRecent(60);

  // 两个AI的运行状态
  const st = {
    xinye:   { ctrl: new AbortController(), started: false, content: '' },
    choubao: { ctrl: new AbortController(), started: false, content: '' }
  };
  let resendTriggered = false;
  let resendPromise = null;

  showTyping('xinye');
  showTyping('choubao');

  async function doStream(who, hist, withSkip) {
    const other = who === 'xinye' ? 'choubao' : 'xinye';
    const cfgs = who === 'xinye' ? xinyeCfgs : choubaCfgs;
    st[who].content = '';

    try {
      await streamWithFallback(
        cfgs,
        buildApiMsgs(who, hist, withSkip),
        st[who].ctrl.signal,
        chunk => {
          st[who].content += chunk;
          updateTyping(who, stripLeadingPrefix(st[who].content));
        },
        () => { st[who].started = true; }
      );

      hideTyping(who);
      const content = cleanAiResponse(st[who].content.trim(), who);

      // SKIP或空回复：静默丢弃
      if (!content || content === '[SKIP]') return null;

      const msg = await gdbAddMsg({ role: who, content, time: Date.now() });
      renderMessage(msg);

      // 检查对方：还没开始streaming，且没人触发过重发
      if (!st[other].started && !resendTriggered) {
        resendTriggered = true;
        st[other].ctrl.abort();
        await new Promise(r => setTimeout(r, 60));

        // 重新取history（含刚才这条）
        const newHist = await gdbGetRecent(60);
        st[other] = { ctrl: new AbortController(), started: false, content: '' };
        showTyping(other);
        resendPromise = doStream(other, newHist, true);
      }

      return msg;

    } catch(e) {
      if (e.name === 'AbortError') { hideTyping(who); return null; }
      hideTyping(who);
      toast(`${who === 'xinye' ? '炘也' : '臭宝'} 连接出错了 😔`);
      return null;
    }
  }

  await Promise.allSettled([
    doStream('xinye', history, false),
    doStream('choubao', history, false)
  ]);

  if (resendPromise) await resendPromise;

  isSending = false;
  sendBtn.disabled = false;
  userInput.focus();
  updateMsgCount();
}

// ---- 摘要生成（用臭宝API/DeepSeek） ----
async function generateSummary() {
  const history = await gdbGetRecent(60);
  if (history.length < 4) { toast('先多聊一会儿再整理~'); return; }
  const cfg = (choubaCfgs[0] || xinyeCfgs[0]);
  if (!cfg) { toast('API未配置，请先在设置里填写API'); return; }

  genSummaryBtn.disabled = true;
  genSummaryBtn.textContent = '生成中…';

  const conv = history.map(m => {
    const n = m.role === 'user' ? '涂涔' : m.role === 'xinye' ? '炘也' : '臭宝';
    return `${n}: ${m.content}`;
  }).join('\n');

  const prompt = `请对以下群聊记录做简短摘要，包含：谁参与了、聊了什么主题、有没有做什么决定或约定、有没有好玩的梗。结构化成几行，不超过200字。\n\n${conv}`;

  try {
    const res = await fetch(cfg.url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${cfg.apiKey}` },
      body: JSON.stringify({ model: cfg.model, messages: [{ role: 'user', content: prompt }], stream: false, temperature: 0.5 })
    });
    const data = await res.json();
    const summary = data.choices?.[0]?.message?.content?.trim() || '';
    if (summary) {
      groupSummaryEl.value = summary;
      grpSettings.groupSummary = summary;
      await gdbPut('settings', 'groupSettings', grpSettings);
      toast('摘要已生成 ✓');
    } else toast('生成结果为空');
  } catch(e) {
    toast('生成摘要失败：' + e.message.slice(0, 40));
  } finally {
    genSummaryBtn.disabled = false;
    genSummaryBtn.textContent = '整理摘要';
  }
}

// ---- 从两边记忆初始化共用记忆（用炘也API合并） ----
async function initMemory() {
  if (!xinyeCfgs.length) { toast('炘也API未配置，请先在设置里填写'); return; }
  initMemoryBtn.disabled = true;
  initMemoryBtn.textContent = '读取中…';

  try {
    const [xS, cS] = await Promise.all([
      readExternalDB('XinyeChatDB'),
      readExternalDB('ChoubaoChatDB')
    ]);

    const xMem = xS.memoryArchiveCore || xS.memoryArchive || '';
    const cMem = cS.memoryArchiveCore || cS.memoryArchive || '';
    if (!xMem && !cMem) { toast('两边都没有记忆档案，请先在各自APP里维护好记忆'); return; }

    initMemoryBtn.textContent = '合并中…';
    const prompt = `以下是炘也和臭宝各自的记忆档案。请提取其中关于涂涔（兔宝）的共同信息，合成一份简洁的"群聊共用记忆"，包含：涂涔的性格、近况、重要事件、习惯偏好。不超过300字，不要包含只属于某一方私聊的内容。

【炘也的记忆】
${xMem || '（无）'}

【臭宝的记忆】
${cMem || '（无）'}`;

    const xCfg = xinyeCfgs[0];
    const res = await fetch(xCfg.url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${xCfg.apiKey}` },
      body: JSON.stringify({ model: xCfg.model, messages: [{ role: 'user', content: prompt }], stream: false })
    });
    const data = await res.json();
    const merged = data.choices?.[0]?.message?.content?.trim() || '';
    if (merged) {
      groupMemoryEl.value = merged;
      grpSettings.groupMemory = merged;
      await gdbPut('settings', 'groupSettings', grpSettings);
      toast('共用记忆已生成，检查后点保存 ✓');
    } else toast('合并结果为空');
  } catch(e) {
    toast('初始化失败：' + e.message.slice(0, 40));
  } finally {
    initMemoryBtn.disabled = false;
    initMemoryBtn.textContent = '从两边记忆初始化';
  }
}

// ---- 设置面板 ----
const xinyePromptEl  = document.getElementById('xinyePromptEl');
const choubaPromptEl = document.getElementById('choubaPromptEl');
const groupMemoryEl  = document.getElementById('groupMemoryEl');
const groupSummaryEl = document.getElementById('groupSummaryEl');
const genSummaryBtn  = document.getElementById('genSummaryBtn');
const initMemoryBtn  = document.getElementById('initMemoryBtn');
const settingsPanel  = document.getElementById('settingsPanel');

function fillApiFields(prefix, apis) {
  for (let i = 0; i < 4; i++) {
    const a = apis[i] || EMPTY_API();
    document.getElementById(`${prefix}_url_${i}`).value = a.url  || '';
    document.getElementById(`${prefix}_key_${i}`).value = a.key  || '';
    document.getElementById(`${prefix}_mod_${i}`).value = a.model || '';
  }
}
function collectApiFields(prefix) {
  return Array.from({ length: 4 }, (_, i) => ({
    url:   document.getElementById(`${prefix}_url_${i}`).value.trim(),
    key:   document.getElementById(`${prefix}_key_${i}`).value.trim(),
    model: document.getElementById(`${prefix}_mod_${i}`).value.trim()
  }));
}

// ---- 夜间模式 ----
function applyTheme(dark) {
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : '');
  localStorage.setItem('group_dark', dark ? '1' : '');
}
document.getElementById('btnDark').onclick = () => {
  applyTheme(document.documentElement.getAttribute('data-theme') !== 'dark');
};

function fillAvatarPreview(prevId, emojiId, av, fallback) {
  setAvatarEl(document.getElementById(prevId), av, fallback);
  document.getElementById(emojiId).value = (av && !av.startsWith('data:')) ? av : '';
}

document.getElementById('settingsBtn').onclick = () => {
  fillApiFields('x', grpSettings.xinyeApis);
  fillApiFields('c', grpSettings.choubaApis);
  xinyePromptEl.value  = grpSettings.xinyePrompt;
  choubaPromptEl.value = grpSettings.choubaPrompt;
  groupMemoryEl.value  = grpSettings.groupMemory;
  groupSummaryEl.value = grpSettings.groupSummary;
  fillAvatarPreview('prevUser',    'avatarUserEmoji',   grpSettings.userAvatar,   '🐰');
  fillAvatarPreview('prevXinye',   'avatarXinyeEmoji',  grpSettings.xinyeAvatar,  '💙');
  fillAvatarPreview('prevChoubao', 'avatarChoubaEmoji', grpSettings.choubaAvatar, '🐾');
  settingsPanel.classList.add('open');
};
document.getElementById('closeSettings').onclick  = () => settingsPanel.classList.remove('open');
document.getElementById('settingsOverlay').onclick = () => settingsPanel.classList.remove('open');

document.getElementById('saveSettingsBtn').onclick = async () => {
  grpSettings.xinyeApis  = collectApiFields('x');
  grpSettings.choubaApis = collectApiFields('c');
  grpSettings.xinyePrompt  = xinyePromptEl.value.trim()  || DEFAULT_XINYE_PROMPT;
  grpSettings.choubaPrompt = choubaPromptEl.value.trim() || DEFAULT_CHOUBA_PROMPT;
  grpSettings.groupMemory  = groupMemoryEl.value.trim();
  grpSettings.groupSummary = groupSummaryEl.value.trim();
  // 头像：输入框有值就覆盖（图片上传已实时更新 grpSettings）
  const uv = document.getElementById('avatarUserEmoji').value.trim();
  if (uv) grpSettings.userAvatar = uv;
  const xv = document.getElementById('avatarXinyeEmoji').value.trim();
  if (xv) grpSettings.xinyeAvatar = xv;
  const cv = document.getElementById('avatarChoubaEmoji').value.trim();
  if (cv) grpSettings.choubaAvatar = cv;
  await gdbPut('settings', 'groupSettings', grpSettings);
  xinyeCfgs = buildCfgList(grpSettings.xinyeApis);
  choubaCfgs = buildCfgList(grpSettings.choubaApis);
  sendBtn.disabled = !(xinyeCfgs.length && choubaCfgs.length);
  settingsPanel.classList.remove('open');
  toast('已保存 ✓');
};

document.getElementById('initXinyeApiBtn').onclick = async () => {
  const s = await readExternalDB('XinyeChatDB');
  if (s.apiKey) {
    document.getElementById('x_url_0').value = s.baseUrl || '';
    document.getElementById('x_key_0').value = s.apiKey  || '';
    document.getElementById('x_mod_0').value = s.model   || '';
    toast('已从炘也APP读入主API，检查后请保存 ✓');
  } else toast('炘也APP未找到API配置');
};

document.getElementById('initChoubaApiBtn').onclick = async () => {
  const s = await readExternalDB('ChoubaoChatDB');
  if (s.apiKey) {
    document.getElementById('c_url_0').value = s.baseUrl || '';
    document.getElementById('c_key_0').value = s.apiKey  || '';
    document.getElementById('c_mod_0').value = s.model   || '';
    toast('已从臭宝APP读入主API，检查后请保存 ✓');
  } else toast('臭宝APP未找到API配置');
};

document.getElementById('clearHistoryBtn').onclick = async () => {
  if (!confirm('确定清空所有群聊记录？')) return;
  await gdbClearMessages();
  messagesEl.innerHTML = '';
  messagesEl.appendChild(emptyState);
  toast('已清空 ✓');
};

document.getElementById('exportBtn').onclick = exportGroupData;
document.getElementById('importInput').onchange = e => {
  const f = e.target.files[0];
  if (f) { importGroupData(f); e.target.value = ''; }
};

// ---- 头像上传/清除 ----
function bindAvatarUpload(fileInputId, prevId, emojiId, key) {
  document.getElementById(fileInputId).onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      grpSettings[key] = ev.target.result;
      setAvatarEl(document.getElementById(prevId), ev.target.result, '');
      document.getElementById(emojiId).value = '';
      gdbPut('settings', 'groupSettings', grpSettings).then(() => toast('头像已更新 ✓'));
    };
    reader.readAsDataURL(file);
    e.target.value = '';
  };
}
function bindAvatarClear(btnId, prevId, emojiId, key, fallback) {
  document.getElementById(btnId).onclick = () => {
    grpSettings[key] = fallback;
    setAvatarEl(document.getElementById(prevId), fallback, fallback);
    document.getElementById(emojiId).value = '';
    gdbPut('settings', 'groupSettings', grpSettings).then(() => toast('已重置 ✓'));
  };
}
bindAvatarUpload('avatarUserImg',   'prevUser',    'avatarUserEmoji',   'userAvatar');
bindAvatarUpload('avatarXinyeImg',  'prevXinye',   'avatarXinyeEmoji',  'xinyeAvatar');
bindAvatarUpload('avatarChoubaImg', 'prevChoubao', 'avatarChoubaEmoji', 'choubaAvatar');
bindAvatarClear('avatarUserClear',   'prevUser',    'avatarUserEmoji',   'userAvatar',   '🐰');
bindAvatarClear('avatarXinyeClear',  'prevXinye',   'avatarXinyeEmoji',  'xinyeAvatar',  '💙');
bindAvatarClear('avatarChoubaClear', 'prevChoubao', 'avatarChoubaEmoji', 'choubaAvatar', '🐾');

genSummaryBtn.onclick = generateSummary;
initMemoryBtn.onclick = initMemory;

const spontBtn = document.getElementById('spontBtn');
spontBtn.onclick = triggerSpontaneous;

// ---- 输入框 ----
function autoResize() {
  userInput.style.height = 'auto';
  userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
}
userInput.addEventListener('input', autoResize);
const isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent) || ('ontouchstart' in window);
userInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey && !isMobile) { e.preventDefault(); sendMessage(); }
});
sendBtn.onclick = sendMessage;

// ---- 初始化 ----
async function init() {
  // 恢复夜间模式（在DB读取之前先应用，避免闪白）
  if (localStorage.getItem('group_dark') === '1') {
    document.documentElement.setAttribute('data-theme', 'dark');
  }

  gdb = await openGroupDB();

  // 读群聊设置
  const saved = await gdbGet('settings', 'groupSettings');
  if (saved) {
    if (saved.xinyePrompt)   grpSettings.xinyePrompt  = saved.xinyePrompt;
    if (saved.choubaPrompt)  grpSettings.choubaPrompt = saved.choubaPrompt;
    if (saved.groupMemory  !== undefined) grpSettings.groupMemory  = saved.groupMemory;
    if (saved.groupSummary !== undefined) grpSettings.groupSummary = saved.groupSummary;
    if (saved.xinyeApis)  grpSettings.xinyeApis  = saved.xinyeApis;
    if (saved.choubaApis) grpSettings.choubaApis = saved.choubaApis;
    if (saved.userAvatar   !== undefined) grpSettings.userAvatar   = saved.userAvatar;
    if (saved.xinyeAvatar  !== undefined) grpSettings.xinyeAvatar  = saved.xinyeAvatar;
    if (saved.choubaAvatar !== undefined) grpSettings.choubaAvatar = saved.choubaAvatar;
  }

  // 从 grpSettings 构建 API cfg 列表
  xinyeCfgs = buildCfgList(grpSettings.xinyeApis);
  choubaCfgs = buildCfgList(grpSettings.choubaApis);
  sendBtn.disabled = !(xinyeCfgs.length && choubaCfgs.length);

  // 加载历史
  const history = await gdbGetRecent(60);
  if (history.length > 0) {
    emptyState.remove();
    for (const m of history) renderMessage(m);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  updateMsgCount();

  // 淡出splash
  const splash = document.getElementById('splash');
  splash.classList.add('fade');
  setTimeout(() => splash.remove(), 450);
}

init().catch(e => {
  console.error('group init failed:', e);
  document.getElementById('splash').innerHTML = `<div style="color:#f48;font-size:14px;padding:24px;text-align:center">初始化失败<br>${e.message}</div>`;
});
</script>
