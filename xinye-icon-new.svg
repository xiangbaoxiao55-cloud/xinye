<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fce4ec"/>
      <stop offset="100%" stop-color="#fff8f0"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- 耳朵 -->
  <polygon points="145,228 182,88 262,215" fill="#f9c8d4" stroke="#d4809a" stroke-width="7" stroke-linejoin="round"/>
  <polygon points="250,215 330,88 367,228" fill="#f9c8d4" stroke="#d4809a" stroke-width="7" stroke-linejoin="round"/>
  <!-- 耳内粉 -->
  <polygon points="164,218 188,122 248,210" fill="#ffb3c6"/>
  <polygon points="264,210 324,122 348,218" fill="#ffb3c6"/>

  <!-- 脑袋 -->
  <ellipse cx="256" cy="315" rx="158" ry="148" fill="#fff5f8" stroke="#d4809a" stroke-width="6"/>

  <!-- 腮红 -->
  <ellipse cx="165" cy="348" rx="34" ry="20" fill="#ffb3c6" opacity="0.45"/>
  <ellipse cx="347" cy="348" rx="34" ry="20" fill="#ffb3c6" opacity="0.45"/>

  <!-- 眼睛 左 -->
  <ellipse cx="196" cy="292" rx="32" ry="28" fill="#2d1e1a"/>
  <ellipse cx="205" cy="282" rx="10" ry="10" fill="white"/>
  <ellipse cx="209" cy="286" rx="4" ry="4" fill="white" opacity="0.6"/>
  <!-- 眼睛 右 -->
  <ellipse cx="316" cy="292" rx="32" ry="28" fill="#2d1e1a"/>
  <ellipse cx="325" cy="282" rx="10" ry="10" fill="white"/>
  <ellipse cx="329" cy="286" rx="4" ry="4" fill="white" opacity="0.6"/>

  <!-- 鼻子 小粉三角 -->
  <polygon points="256,336 244,350 268,350" fill="#f48fb1"/>

  <!-- 嘴 猫咪W型 -->
  <path d="M244,350 Q256,368 268,350" stroke="#d4809a" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M244,350 Q233,361 222,356" stroke="#d4809a" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M268,350 Q279,361 290,356" stroke="#d4809a" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- 胡须 左 -->
  <line x1="82" y1="334" x2="228" y2="342" stroke="#d4809a" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <line x1="82" y1="356" x2="228" y2="354" stroke="#d4809a" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <!-- 胡须 右 -->
  <line x1="284" y1="342" x2="430" y2="334" stroke="#d4809a" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <line x1="284" y1="354" x2="430" y2="356" stroke="#d4809a" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
</svg>
