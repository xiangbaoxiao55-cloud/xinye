<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>我们的画廊</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --pink:#f48fb1;--pink-light:#fce4ec;--pink-deep:#e91e63;
  --apricot:#ffe0b2;--apricot-deep:#ffcc80;
  --bg:#fff8f3;--bg2:#fff0e8;--card:#ffffff;
  --text:#5d3a2e;--text-mid:#8d6e63;--text-light:#b0857a;
  --border:#f0ddd5;--shadow:0 2px 16px rgba(180,100,80,.09);
  --radius:18px;--radius-sm:12px;
  --header-h:56px;
}
html,body{height:100%;height:100svh;font-family:-apple-system,'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
.app{display:flex;flex-direction:column;height:100%;height:100svh;max-width:1200px;margin:0 auto;position:relative}

/* ===== Header ===== */
.header{
  height:var(--header-h);display:flex;align-items:center;padding:0 14px;gap:10px;
  background:rgba(255,255,255,.85);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);flex-shrink:0;z-index:20;
  padding-top:env(safe-area-inset-top,0);
}
.btn-back{
  width:38px;height:38px;border-radius:50%;background:var(--pink-light);border:none;
  color:var(--pink-deep);font-size:20px;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-weight:700;line-height:1;
}
.btn-back:active{background:var(--pink);color:#fff}
.header-title{flex:1;font-size:15px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.btn-icon-sm{
  width:38px;height:38px;border-radius:50%;border:1.5px solid var(--border);
  background:var(--card);color:var(--text-mid);font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.btn-icon-sm:active{background:var(--pink-light);border-color:var(--pink);color:var(--pink-deep)}

/* ===== Search bar ===== */
.search-bar{
  overflow:hidden;max-height:0;transition:max-height .3s ease,padding .3s ease;
  padding:0 14px;background:var(--bg);display:flex;gap:8px;align-items:center;
}
.search-bar.show{max-height:60px;padding:8px 14px 10px}
.search-input{
  flex:1;height:40px;border-radius:20px;border:1.5px solid var(--border);
  background:var(--card);padding:0 16px;font-size:14px;color:var(--text);
  outline:none;transition:border-color .2s;
}
.search-input::placeholder{color:var(--text-light)}
.search-input:focus{border-color:var(--pink)}
.month-filter{
  height:40px;border-radius:20px;border:1.5px solid var(--border);
  background:var(--card);padding:0 12px;font-size:13px;color:var(--text);
  outline:none;cursor:pointer;white-space:nowrap;
}
.month-filter:focus{border-color:var(--pink)}

/* ===== Tag bar ===== */
.tag-bar{
  display:flex;gap:8px;padding:10px 14px;overflow-x:auto;flex-shrink:0;
  -webkit-overflow-scrolling:touch;scrollbar-width:none;
}
.tag-bar::-webkit-scrollbar{display:none}
.tag-tab{
  flex-shrink:0;height:34px;padding:0 16px;border-radius:17px;border:1.5px solid var(--border);
  background:var(--card);color:var(--text-mid);font-size:13px;font-weight:600;
  cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:4px;
  transition:all .2s;
}
.tag-tab.active{background:var(--pink-deep);color:#fff;border-color:var(--pink-deep)}
.tag-tab:active{transform:scale(.95)}
.tag-tab .count{
  font-size:11px;background:rgba(0,0,0,.08);border-radius:8px;padding:1px 6px;
  min-width:20px;text-align:center;
}
.tag-tab.active .count{background:rgba(255,255,255,.25)}

/* ===== Grid container ===== */
.grid-wrap{
  flex:1;overflow-y:auto;padding:6px 14px 80px;-webkit-overflow-scrolling:touch;
}

/* ===== Masonry grid (CSS columns) — responsive ===== */
.masonry{column-count:2;column-gap:10px}
@media(min-width:500px){.masonry{column-count:3}}
@media(min-width:800px){.masonry{column-count:4}}
@media(min-width:1100px){.masonry{column-count:5}}

/* ===== Gallery card ===== */
.g-card{
  break-inside:avoid;margin-bottom:10px;border-radius:var(--radius-sm);
  overflow:hidden;background:var(--card);box-shadow:var(--shadow);
  cursor:pointer;transition:transform .15s,outline .15s;position:relative;
}
.g-card:active{transform:scale(.97)}
.g-card img{width:100%;display:block;background:var(--bg2);min-height:60px}
.g-card-info{padding:8px 10px 10px}
.g-card-prompt{
  font-size:11px;color:var(--text-light);line-height:1.4;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
  overflow:hidden;word-break:break-all;
}
.g-card-bottom{display:flex;align-items:center;justify-content:space-between;margin-top:6px}
.g-card-date{font-size:10px;color:var(--text-light);opacity:.7}
.g-card-source{font-size:9px;padding:2px 6px;border-radius:6px;font-weight:600}
.g-card-source.draw{background:rgba(244,143,177,.2);color:var(--pink-deep)}
.g-card-source.chat{background:rgba(178,223,219,.4);color:#00796b}
.g-card-source.imported{background:rgba(255,224,178,.4);color:#e65100}
.g-card-fav{
  position:absolute;top:8px;right:8px;width:30px;height:30px;border-radius:50%;
  background:rgba(0,0,0,.3);backdrop-filter:blur(4px);border:none;
  color:rgba(255,255,255,.7);font-size:14px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;z-index:2;
}
.g-card-fav.on{color:#ff1744;background:rgba(255,255,255,.85)}

/* ===== Multi-select mode ===== */
.g-card.selected{outline:3px solid var(--pink-deep);outline-offset:-3px}
.g-card .sel-check{
  position:absolute;top:8px;left:8px;width:26px;height:26px;border-radius:50%;
  border:2px solid rgba(255,255,255,.7);background:rgba(0,0,0,.25);
  display:none;align-items:center;justify-content:center;z-index:3;
  color:#fff;font-size:14px;font-weight:700;
}
.select-mode .g-card .sel-check{display:flex}
.g-card.selected .sel-check{background:var(--pink-deep);border-color:var(--pink-deep)}

/* Selection action bar */
.sel-bar{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--card);border-top:1px solid var(--border);
  padding:10px 16px calc(10px + env(safe-area-inset-bottom,0));
  display:none;z-index:50;align-items:center;gap:12px;
  box-shadow:0 -4px 16px rgba(0,0,0,.1);
}
.sel-bar.show{display:flex}
.sel-bar .sel-count{font-size:13px;font-weight:600;flex:1}
.sel-bar button{
  height:36px;padding:0 16px;border-radius:18px;border:none;
  font-size:13px;font-weight:600;cursor:pointer;
  display:flex;align-items:center;gap:4px;
}
.sel-bar .sel-tag{background:var(--pink-light);color:var(--pink-deep)}
.sel-bar .sel-fav{background:var(--apricot);color:#e65100}
.sel-bar .sel-cancel{background:var(--bg2);color:var(--text-mid)}

/* ===== Empty state ===== */
.empty-state{text-align:center;padding:60px 20px;color:var(--text-light)}
.empty-state .icon{font-size:48px;margin-bottom:16px;opacity:.6}
.empty-state .title{font-size:15px;font-weight:600;margin-bottom:8px;color:var(--text-mid)}
.empty-state .desc{font-size:13px;line-height:1.6}

/* ===== Load more ===== */
.load-more{text-align:center;padding:20px}
.load-more-btn{
  padding:10px 32px;border-radius:20px;border:1.5px solid var(--border);
  background:var(--card);color:var(--text-mid);font-size:13px;font-weight:600;
  cursor:pointer;transition:all .2s;
}
.load-more-btn:active{background:var(--pink-light);border-color:var(--pink);color:var(--pink-deep)}

/* ===== FAB ===== */
.fab{
  position:fixed;bottom:28px;right:20px;
  width:52px;height:52px;border-radius:50%;
  background:linear-gradient(135deg,var(--pink),var(--pink-deep));
  color:#fff;font-size:24px;border:none;cursor:pointer;
  box-shadow:0 4px 20px rgba(233,30,99,.4);
  display:flex;align-items:center;justify-content:center;
  z-index:30;transition:transform .2s;
}
.fab:active{transform:scale(.9)}

/* ===== Lightbox ===== */
.lightbox{
  position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:9999;
  display:flex;flex-direction:column;
  opacity:0;pointer-events:none;transition:opacity .25s;
}
.lightbox.show{opacity:1;pointer-events:auto}
.lb-top{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;padding-top:calc(12px + env(safe-area-inset-top,0));flex-shrink:0;
}
.lb-close{
  width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.12);
  border:none;color:#fff;font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.lb-counter{color:rgba(255,255,255,.6);font-size:13px}
.lb-img-wrap{
  flex:1;display:flex;align-items:center;justify-content:center;
  overflow:hidden;padding:0 8px;position:relative;touch-action:pan-y pinch-zoom;
}
.lb-img-wrap img{
  max-width:100%;max-height:100%;object-fit:contain;border-radius:4px;
  transition:opacity .2s;user-select:none;-webkit-user-drag:none;
}
.lb-nav{
  position:absolute;top:50%;transform:translateY(-50%);width:40px;height:40px;
  border-radius:50%;background:rgba(255,255,255,.1);border:none;color:#fff;
  font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2;
}
.lb-nav:active{background:rgba(255,255,255,.25)}
.lb-nav.prev{left:8px}
.lb-nav.next{right:8px}
.lb-bottom{
  flex-shrink:0;padding:12px 16px;padding-bottom:calc(12px + env(safe-area-inset-bottom,0));
  background:rgba(0,0,0,.6);backdrop-filter:blur(12px);max-height:40vh;overflow-y:auto;
}
.lb-prompt-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px}
.lb-prompt{color:rgba(255,255,255,.85);font-size:13px;line-height:1.6;word-break:break-all;flex:1}
.lb-copy{
  flex-shrink:0;width:32px;height:32px;border-radius:8px;
  background:rgba(255,255,255,.12);border:none;color:rgba(255,255,255,.7);
  font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;
}
.lb-copy:active{background:rgba(255,255,255,.3)}
.lb-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.lb-tag{
  font-size:11px;padding:3px 10px;border-radius:10px;
  background:rgba(244,143,177,.2);color:rgba(255,255,255,.8);
}
.lb-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
.lb-meta span{font-size:11px;color:rgba(255,255,255,.5)}
.lb-actions{display:flex;gap:8px;flex-wrap:wrap}
.lb-act{
  height:36px;padding:0 14px;border-radius:18px;border:1px solid rgba(255,255,255,.2);
  background:rgba(255,255,255,.08);color:rgba(255,255,255,.85);font-size:12px;
  cursor:pointer;display:flex;align-items:center;gap:5px;white-space:nowrap;
}
.lb-act:active{background:rgba(255,255,255,.2)}
.lb-act.danger{border-color:rgba(255,80,80,.3);color:#ff8a80}

/* ===== Modal / overlay ===== */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;
  display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .25s;
}
.modal-overlay.show{opacity:1;pointer-events:auto}
.modal{
  width:100%;max-width:600px;background:var(--card);
  border-radius:var(--radius) var(--radius) 0 0;
  padding:20px 20px calc(20px + env(safe-area-inset-bottom,0));
  max-height:80vh;overflow-y:auto;
  transform:translateY(100%);transition:transform .3s ease;
}
.modal-overlay.show .modal{transform:translateY(0)}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px;color:var(--text)}

/* ===== Import modal ===== */
.import-zone{
  border:2px dashed var(--border);border-radius:var(--radius-sm);
  padding:32px 16px;text-align:center;cursor:pointer;
  transition:border-color .2s,background .2s;margin-bottom:16px;
}
.import-zone:hover,.import-zone.dragover{border-color:var(--pink);background:var(--pink-light)}
.import-zone .icon{font-size:36px;margin-bottom:8px;opacity:.5}
.import-zone .text{font-size:13px;color:var(--text-mid)}
.import-preview{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.import-thumb{width:72px;height:72px;border-radius:10px;object-fit:cover;border:2px solid var(--border)}
.import-btn{
  width:100%;height:44px;border-radius:22px;border:none;
  background:linear-gradient(135deg,var(--pink),var(--pink-deep));
  color:#fff;font-size:14px;font-weight:700;cursor:pointer;transition:opacity .2s;
}
.import-btn:active{opacity:.8}
.import-btn:disabled{opacity:.4;cursor:default}

/* ===== Tag modal ===== */
.tag-check-item{
  display:flex;align-items:center;gap:12px;padding:12px;
  border-radius:var(--radius-sm);cursor:pointer;transition:background .15s;
}
.tag-check-item:active{background:var(--bg2)}
.tag-check-item .check{
  width:22px;height:22px;border-radius:6px;border:2px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:14px;
  transition:all .15s;flex-shrink:0;
}
.tag-check-item.checked .check{background:var(--pink-deep);border-color:var(--pink-deep);color:#fff}
.tag-check-item .name{flex:1;font-size:14px;font-weight:600}
.tag-input{
  width:100%;height:44px;border-radius:var(--radius-sm);border:1.5px solid var(--border);
  background:var(--card);padding:0 14px;font-size:14px;color:var(--text);
  outline:none;margin-bottom:12px;
}
.tag-input:focus{border-color:var(--pink)}
.tag-actions{display:flex;gap:8px}
.tag-actions button{
  flex:1;height:40px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;
  border:1.5px solid var(--border);background:var(--card);color:var(--text-mid);transition:all .2s;
}
.tag-actions button.primary{background:var(--pink-deep);color:#fff;border-color:var(--pink-deep)}
.tag-actions button:active{transform:scale(.97)}

/* ===== Toast ===== */
.toast{
  position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);
  background:rgba(60,30,20,.9);color:#fff;padding:10px 22px;border-radius:20px;
  font-size:13px;font-weight:500;z-index:10000;
  opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ===== Loading ===== */
.loading{text-align:center;padding:40px;color:var(--text-light);font-size:13px}

/* ===== 暗夜模式 ===== */
html.dark{
  --bg:#1a1015;--bg2:#221520;--card:#261820;
  --text:#f0dde0;--text-mid:#c0a0a8;--text-light:#8a6878;
  --border:#3a2530;--shadow:0 2px 16px rgba(0,0,0,.4);
}
html.dark body{background:var(--bg)}
html.dark .header{background:rgba(30,15,20,.85)}
html.dark .search-input{background:var(--bg2);border-color:var(--border)}
html.dark .month-filter{background:var(--bg2);border-color:var(--border)}
html.dark .tag-tab{background:var(--bg2);border-color:var(--border);color:var(--text-mid)}
html.dark .tag-tab.active{background:var(--pink-deep);color:#fff;border-color:var(--pink-deep)}
html.dark .g-card{background:var(--card)}
html.dark .g-card img{background:var(--bg2)}
html.dark .g-card-fav{background:rgba(255,255,255,.1)}
html.dark .g-card-fav.on{background:rgba(255,26,68,.2);color:#ff1744}
html.dark .modal{background:var(--card)}
html.dark .import-zone{border-color:var(--border)}
html.dark .import-zone:hover,.import-zone.dragover{border-color:var(--pink);background:rgba(244,143,177,.1)}
html.dark .tag-input{background:var(--bg2)}
html.dark .tag-check-item:active{background:var(--bg)}
html.dark .load-more-btn{background:var(--bg2);border-color:var(--border);color:var(--text-mid)}
html.dark .fab{box-shadow:0 4px 20px rgba(233,30,99,.25)}
html.dark .sel-bar{background:var(--card);border-color:var(--border)}
</style>
</head>
<body>
<div class="app">
  <!-- Header -->
  <div class="header">
    <button class="btn-back" onclick="goBack()">‹</button>
    <div class="header-title" id="headerTitle">🖼️ 我们的画廊</div>
    <button class="btn-icon-sm" id="btnSelect" onclick="toggleSelectMode()" title="多选">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
    </button>
    <button class="btn-icon-sm" id="btnSearch" onclick="toggleSearch()" title="搜索">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/></svg>
    </button>
    <button class="btn-icon-sm" id="btnDark" onclick="toggleDark()" title="暗夜模式">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79Z"/></svg>
    </button>
  </div>

  <!-- Search -->
  <div class="search-bar" id="searchBar">
    <input class="search-input" id="searchInput" type="text" placeholder="搜索 prompt 关键词..." oninput="onSearchInput()">
    <select class="month-filter" id="monthFilter" onchange="onMonthFilter()">
      <option value="">全部时间</option>
    </select>
  </div>

  <!-- Tag bar -->
  <div class="tag-bar" id="tagBar"></div>

  <!-- Grid -->
  <div class="grid-wrap" id="gridWrap">
    <div class="masonry" id="masonry"></div>
    <div class="load-more" id="loadMore" style="display:none">
      <button class="load-more-btn" onclick="loadNextPage()">加载更多 ✨</button>
    </div>
    <div class="loading" id="loadingEl" style="display:none">加载中...</div>
  </div>
</div>

<!-- FAB -->
<button class="fab" id="fab" onclick="showImportModal()">＋</button>

<!-- Selection bar -->
<div class="sel-bar" id="selBar">
  <span class="sel-count" id="selCount">已选 0 张</span>
  <button class="sel-tag" onclick="batchTag()">🏷️ 标签</button>
  <button class="sel-fav" onclick="batchFav()">❤️ 收藏</button>
  <button class="sel-cancel" onclick="toggleSelectMode()">取消</button>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <div class="lb-top">
    <button class="lb-close" onclick="closeLightbox()">✕</button>
    <span class="lb-counter" id="lbCounter"></span>
    <div style="width:36px"></div>
  </div>
  <div class="lb-img-wrap" id="lbImgWrap">
    <button class="lb-nav prev" onclick="lbPrev(event)">‹</button>
    <img id="lbImg" src="" alt="">
    <button class="lb-nav next" onclick="lbNext(event)">›</button>
  </div>
  <div class="lb-bottom" id="lbBottom">
    <div class="lb-prompt-row">
      <div class="lb-prompt" id="lbPrompt"></div>
      <button class="lb-copy" id="lbCopy" onclick="copyPrompt()" title="复制 prompt">📋</button>
    </div>
    <div class="lb-tags" id="lbTags"></div>
    <div class="lb-meta" id="lbMeta"></div>
    <div class="lb-actions" id="lbActions"></div>
  </div>
</div>

<!-- Import modal -->
<div class="modal-overlay" id="importModal">
  <div class="modal">
    <div class="modal-title">导入图片</div>
    <div class="import-zone" id="importZone" onclick="document.getElementById('importFile').click()">
      <div class="icon">📷</div>
      <div class="text">点击选择图片 或 拖放到这里</div>
    </div>
    <input type="file" id="importFile" accept="image/*" multiple style="display:none" onchange="onFilesSelected(event)">
    <div class="import-preview" id="importPreview"></div>
    <button class="import-btn" id="importBtn" disabled onclick="doImport()">导入选中的图片</button>
    <div style="height:12px"></div>
    <button class="import-btn" style="background:var(--bg2);color:var(--text-mid)" onclick="hideImportModal()">取消</button>
  </div>
</div>

<!-- Tag modal (multi-purpose) -->
<div class="modal-overlay" id="tagModal">
  <div class="modal" style="position:relative">
    <div class="modal-title" id="tagModalTitle">标签</div>
    <div id="tagModalContent"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// =============================
//  炘也和兔宝的画廊 💙
// =============================

const PAGE_SIZE = 20;
const THUMB_SIZE = 300;
const MAX_IMG_SIZE = 1500;
const IMG_QUALITY = 0.8;
const THUMB_QUALITY = 0.6;

// ===== State =====
let _gdb = null;       // GalleryDB
let _drawDB = null;    // DrawDB (read-only)
let _chatDB = null;    // XinyeChatDB (read-only)
let _allImages = [];
let _displayImages = [];
let _shownCount = 0;
let _currentTag = 'all'; // 'all' | 'fav' | tagId
let _searchQuery = '';
let _monthFilter = ''; // 'YYYY-MM' or ''
let _searchTimer = null;
let _lbIndex = -1;
let _importFiles = [];
let _swipeStartX = 0;
let _selectMode = false;
let _selected = new Set(); // set of item ids

// ===== Utilities =====
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8) }
function fmtDate(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
}
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2000);
}

//  IndexedDB

// GalleryDB v2 — tags system (multi-tag per image)
function openGalleryDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('GalleryDB', 2);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      const oldVer = e.oldVersion;
      if (oldVer < 1) {
        // Fresh install
        const imgs = db.createObjectStore('images', { keyPath: 'id' });
        imgs.createIndex('byDate', 'createdAt', { unique: false });
        db.createObjectStore('tags', { keyPath: 'id' });
        db.createObjectStore('drawMeta', { keyPath: 'drawId' });
      }
      if (oldVer === 1) {
        // Migrate from v1: albums → tags, albumId → tags[]
        // Delete old stores and recreate (no data exists yet realistically)
        if (db.objectStoreNames.contains('albums')) db.deleteObjectStore('albums');
        if (!db.objectStoreNames.contains('tags')) db.createObjectStore('tags', { keyPath: 'id' });
        // drawMeta & images stores already exist, schema change is soft (tags[] field)
      }
    };
    req.onsuccess = e => resolve(e.target.result);
    req.onerror = e => reject(e.target.error);
  });
}

// DrawDB v4 (read-only)
function openDrawDBReadOnly() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('DrawDB', 4);
    req.onupgradeneeded = e => { e.target.transaction.abort(); reject(new Error('DrawDB not found')); };
    req.onsuccess = e => resolve(e.target.result);
    req.onerror = e => reject(e.target.error);
  });
}

// XinyeChatDB v4 (read-only) — chat-generated images
function openChatDBReadOnly() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('XinyeChatDB', 4);
    req.onupgradeneeded = e => { e.target.transaction.abort(); reject(new Error('ChatDB not found')); };
    req.onsuccess = e => resolve(e.target.result);
    req.onerror = e => reject(e.target.error);
  });
}

//  Data loading

// DrawDB gallery images (metadata only)
async function loadDrawImagesMeta() {
  try { if (!_drawDB) _drawDB = await openDrawDBReadOnly(); } catch { return []; }
  return new Promise((resolve, reject) => {
    const tx = _drawDB.transaction('gallery', 'readonly');
    const results = [];
    const req = tx.objectStore('gallery').openCursor();
    req.onsuccess = e => {
      const c = e.target.result;
      if (c) {
        const v = c.value;
        results.push({
          id: v.id, source: 'draw',
          prompt: v.prompt || '', negPrompt: v.negPrompt || '',
          personaName: v.personaName || null, rating: v.rating || 0,
          drawTags: v.tags || [], createdAt: v.createdAt || 0,
          params: v.params || {},
        });
        c.continue();
      } else resolve(results);
    };
    req.onerror = e => reject(e.target.error);
  });
}

// Single DrawDB image data
async function loadDrawImageData(id) {
  try { if (!_drawDB) _drawDB = await openDrawDBReadOnly(); } catch { return null; }
  return new Promise((resolve, reject) => {
    const tx = _drawDB.transaction('gallery', 'readonly');
    const req = tx.objectStore('gallery').get(id);
    req.onsuccess = e => resolve(e.target.result ? e.target.result.imageData : null);
    req.onerror = e => reject(e.target.error);
  });
}

// Chat-generated images from XinyeChatDB
async function loadChatImages() {
  try { if (!_chatDB) _chatDB = await openChatDBReadOnly(); } catch { return []; }
  return new Promise((resolve, reject) => {
    const results = [];
    const tx = _chatDB.transaction('messages', 'readonly');
    const req = tx.objectStore('messages').openCursor();
    req.onsuccess = e => {
      const c = e.target.result;
      if (c) {
        const msg = c.value;
        if (msg.isGenImage && msg.genImageData && !msg.genImageData.startsWith('__HTTP_URL__:')) {
          // Extract prompt from content
          let prompt = '';
          const m = (msg.content || '').match(/提示词[：:]([\s\S]+?)$/);
          if (m) prompt = m[1].trim();
          results.push({
            id: 'chat_' + msg.id,
            chatMsgId: msg.id,
            source: 'chat',
            prompt,
            createdAt: msg.time || 0,
          });
        }
        c.continue();
      } else resolve(results);
    };
    req.onerror = e => reject(e.target.error);
  });
}

// Load single chat image data
async function loadChatImageData(chatMsgId) {
  try { if (!_chatDB) _chatDB = await openChatDBReadOnly(); } catch { return null; }
  return new Promise((resolve, reject) => {
    const tx = _chatDB.transaction('messages', 'readonly');
    const req = tx.objectStore('messages').get(chatMsgId);
    req.onsuccess = e => {
      const msg = e.target.result;
      if (msg && msg.genImageData) {
        // If it's an HTTP URL, try to use it directly
        if (msg.genImageData.startsWith('http')) resolve(msg.genImageData);
        else resolve(msg.genImageData);
      } else resolve(null);
    };
    req.onerror = e => reject(e.target.error);
  });
}

// Imported images from GalleryDB
async function loadImportedImages() {
  if (!_gdb) _gdb = await openGalleryDB();
  return new Promise((resolve, reject) => {
    const tx = _gdb.transaction('images', 'readonly');
    const req = tx.objectStore('images').getAll();
    req.onsuccess = e => resolve((e.target.result || []).map(v => ({ ...v, source: 'imported' })));
    req.onerror = e => reject(e.target.error);
  });
}

// Draw metadata (tags, favorites for draw/chat images)
async function loadDrawMeta() {
  if (!_gdb) _gdb = await openGalleryDB();
  return new Promise((resolve, reject) => {
    const tx = _gdb.transaction('drawMeta', 'readonly');
    const req = tx.objectStore('drawMeta').getAll();
    req.onsuccess = e => {
      const map = {};
      (e.target.result || []).forEach(m => { map[m.drawId] = m; });
      resolve(map);
    };
    req.onerror = e => reject(e.target.error);
  });
}

// Tags
async function loadTags() {
  if (!_gdb) _gdb = await openGalleryDB();
  return new Promise((resolve, reject) => {
    const tx = _gdb.transaction('tags', 'readonly');
    const req = tx.objectStore('tags').getAll();
    req.onsuccess = e => resolve(e.target.result || []);
    req.onerror = e => reject(e.target.error);
  });
}

// Merge all images
async function loadAllImages() {
  document.getElementById('loadingEl').style.display = '';
  const [drawImgs, chatImgs, importedImgs, metaMap] = await Promise.all([
    loadDrawImagesMeta(), loadChatImages(), loadImportedImages(), loadDrawMeta(),
  ]);
  // Apply metadata to draw & chat images
  [...drawImgs, ...chatImgs].forEach(img => {
    const meta = metaMap[img.id];
    if (meta) {
      img.tags = meta.tags || [];
      img.favorite = !!meta.favorite;
    } else {
      img.tags = [];
      img.favorite = false;
    }
  });
  importedImgs.forEach(img => {
    img.tags = img.tags || [];
    img.favorite = !!img.favorite;
  });
  _allImages = [...drawImgs, ...chatImgs, ...importedImgs].sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
  document.getElementById('loadingEl').style.display = 'none';
}

// Filter by tag & search
function filterImages() {
  let list = _allImages;
  if (_currentTag === 'fav') {
    list = list.filter(i => i.favorite);
  } else if (_currentTag !== 'all') {
    list = list.filter(i => (i.tags || []).includes(_currentTag));
  }
  if (_monthFilter) {
    list = list.filter(i => {
      const d = new Date(i.createdAt);
      const ym = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
      return ym === _monthFilter;
    });
  }
  if (_searchQuery) {
    const q = _searchQuery.toLowerCase();
    list = list.filter(i => {
      const p = (i.prompt || '').toLowerCase();
      const n = (i.note || '').toLowerCase();
      const pn = (i.personaName || '').toLowerCase();
      const t = (i.drawTags || []).join(' ').toLowerCase();
      return p.includes(q) || n.includes(q) || pn.includes(q) || t.includes(q);
    });
  }
  _displayImages = list;
  _shownCount = 0;
}

// ================================
//  Image helpers
// ================================
function resizeImage(dataUrl, maxSize, quality) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      let w = img.width, h = img.height;
      if (w > maxSize || h > maxSize) {
        const r = Math.min(maxSize / w, maxSize / h);
        w = Math.round(w * r); h = Math.round(h * r);
      }
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(c.toDataURL('image/jpeg', quality));
    };
    img.onerror = () => resolve(dataUrl);
    img.src = dataUrl;
  });
}

function fileToDataUrl(f) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.onerror = rej;
    r.readAsDataURL(f);
  });
}

// Thumbnail cache (LRU-ish, max 200)
const _thumbCache = new Map();
const THUMB_CACHE_MAX = 200;
function thumbCacheSet(id, val) {
  if (_thumbCache.size >= THUMB_CACHE_MAX) {
    const first = _thumbCache.keys().next().value;
    _thumbCache.delete(first);
  }
  _thumbCache.set(id, val);
}
async function getThumbUrl(item) {
  if (item.source === 'imported') return item.thumbnail || item.imageData;
  if (_thumbCache.has(item.id)) {
    const v = _thumbCache.get(item.id);
    _thumbCache.delete(item.id); _thumbCache.set(item.id, v);
    return v;
  }
  let data;
  if (item.source === 'draw') data = await loadDrawImageData(item.id);
  else if (item.source === 'chat') data = await loadChatImageData(item.chatMsgId);
  if (!data) return '';
  if (typeof data === 'string' && data.startsWith('http')) {
    thumbCacheSet(item.id, data);
    return data;
  }
  const thumb = await resizeImage(data, THUMB_SIZE, THUMB_QUALITY);
  thumbCacheSet(item.id, thumb);
  return thumb;
}

// Get full image data
async function getFullImageData(item) {
  if (item.source === 'imported') return item.imageData;
  if (item.source === 'draw') return await loadDrawImageData(item.id);
  if (item.source === 'chat') return await loadChatImageData(item.chatMsgId);
  return null;
}

// ================================
//  Import
// ================================
async function importImages(files) {
  if (!_gdb) _gdb = await openGalleryDB();
  const items = [];
  for (const f of files) {
    const raw = await fileToDataUrl(f);
    const imageData = await resizeImage(raw, MAX_IMG_SIZE, IMG_QUALITY);
    const thumbnail = await resizeImage(raw, THUMB_SIZE, THUMB_QUALITY);
    items.push({
      id: uid(), imageData, thumbnail,
      note: '', tags: [], favorite: false,
      createdAt: f.lastModified || Date.now(),
    });
  }
  const tx = _gdb.transaction('images', 'readwrite');
  const s = tx.objectStore('images');
  for (const item of items) s.put(item);
  await new Promise((r, j) => { tx.oncomplete = r; tx.onerror = j; });
  return items.length;
}

//  Tag CRUD
// ================================
async function createTag(name) {
  if (!_gdb) _gdb = await openGalleryDB();
  const tag = { id: uid(), name, createdAt: Date.now() };
  const tx = _gdb.transaction('tags', 'readwrite');
  tx.objectStore('tags').put(tag);
  await new Promise((r, j) => { tx.oncomplete = r; tx.onerror = j; });
  return tag;
}

async function renameTag(id, name) {
  if (!_gdb) _gdb = await openGalleryDB();
  const tx = _gdb.transaction('tags', 'readwrite');
  const s = tx.objectStore('tags');
  const tag = await new Promise(r => { const q = s.get(id); q.onsuccess = () => r(q.result); });
  if (tag) { tag.name = name; s.put(tag); }
  await new Promise((r, j) => { tx.oncomplete = r; tx.onerror = j; });
}

async function deleteTag(id) {
  if (!_gdb) _gdb = await openGalleryDB();
  const tx = _gdb.transaction('tags', 'readwrite');
  tx.objectStore('tags').delete(id);
  await new Promise((r, j) => { tx.oncomplete = r; tx.onerror = j; });
  // Remove tag from all images
  const tx2 = _gdb.transaction(['images', 'drawMeta'], 'readwrite');
  const imgS = tx2.objectStore('images');
  const dmS = tx2.objectStore('drawMeta');
  const removeTagFrom = (store) => {
    const req = store.openCursor();
    req.onsuccess = e => {
      const c = e.target.result;
      if (c) {
        const v = c.value;
        if (v.tags && v.tags.includes(id)) {
          v.tags = v.tags.filter(t => t !== id);
          store.put(v);
        }
        c.continue();
      }
    };
  };
  removeTagFrom(imgS);
  removeTagFrom(dmS);
  await new Promise((r, j) => { tx2.oncomplete = r; tx2.onerror = j; });
}

// Assign/remove tags for an image
async function setImageTags(imageId, source, tagIds) {
  if (!_gdb) _gdb = await openGalleryDB();
  if (source === 'imported') {
    const tx = _gdb.transaction('images', 'readwrite');
    const s = tx.objectStore('images');
    const item = await new Promise(r => { const q = s.get(imageId); q.onsuccess = () => r(q.result); });
    if (item) { item.tags = tagIds; s.put(item); }
    await new Promise((r, j) => { tx.oncomplete = r; tx.onerror = j; });
  } else {
    const tx = _gdb.transaction('drawMeta', 'readwrite');
    const s = tx.objectStore('drawMeta');
    const existing = await new Promise(r => { const q = s.get(imageId); q.onsuccess = () => r(q.result); });
    const meta = existing || { drawId: imageId, tags: [], favorite: false };
    meta.tags = tagIds;
    s.put(meta);
    await new Promise((r, j) => { tx.oncomplete = r; tx.onerror = j; });
  }
  const img = _allImages.find(i => i.id === imageId);
  if (img) img.tags = tagIds;
}

// Toggle favorite
async function toggleFavorite(imageId, source) {
  if (!_gdb) _gdb = await openGalleryDB();
  let newFav;
  if (source === 'imported') {
    const tx = _gdb.transaction('images', 'readwrite');
    const s = tx.objectStore('images');
    const item = await new Promise(r => { const q = s.get(imageId); q.onsuccess = () => r(q.result); });
    if (item) { item.favorite = !item.favorite; newFav = item.favorite; s.put(item); }
    await new Promise((r, j) => { tx.oncomplete = r; tx.onerror = j; });
  } else {
    const tx = _gdb.transaction('drawMeta', 'readwrite');
    const s = tx.objectStore('drawMeta');
    const existing = await new Promise(r => { const q = s.get(imageId); q.onsuccess = () => r(q.result); });
    const meta = existing || { drawId: imageId, tags: [], favorite: false };
    meta.favorite = !meta.favorite; newFav = meta.favorite;
    s.put(meta);
    await new Promise((r, j) => { tx.oncomplete = r; tx.onerror = j; });
  }
  const img = _allImages.find(i => i.id === imageId);
  if (img) img.favorite = newFav;
  return newFav;
}

// Delete imported image
async function deleteImportedImage(id) {
  if (!_gdb) _gdb = await openGalleryDB();
  const tx = _gdb.transaction('images', 'readwrite');
  tx.objectStore('images').delete(id);
  await new Promise((r, j) => { tx.oncomplete = r; tx.onerror = j; });
  _allImages = _allImages.filter(i => i.id !== id);
  _thumbCache.delete(id);
}

// Download
async function downloadImage(item) {
  const data = await getFullImageData(item);
  if (!data) { toast('图片加载失败'); return; }
  const a = document.createElement('a');
  a.href = data; a.download = `gallery_${item.id}.jpg`; a.click();
  toast('已保存 💙');
}

// ================================
//  UI: Tag bar
// ================================
async function renderTagBar() {
  const tags = await loadTags();
  const bar = document.getElementById('tagBar');
  const allC = _allImages.length;
  const favC = _allImages.filter(i => i.favorite).length;
  const tagCounts = {};
  tags.forEach(t => { tagCounts[t.id] = 0; });
  _allImages.forEach(i => (i.tags || []).forEach(t => { if (tagCounts[t] !== undefined) tagCounts[t]++; }));

  let h = `<button class="tag-tab ${_currentTag==='all'?'active':''}" onclick="switchTag('all')">全部 <span class="count">${allC}</span></button>`;
  h += `<button class="tag-tab ${_currentTag==='fav'?'active':''}" onclick="switchTag('fav')">❤️ <span class="count">${favC}</span></button>`;
  tags.forEach(t => {
    h += `<button class="tag-tab ${_currentTag===t.id?'active':''}" onclick="switchTag('${t.id}')" oncontextmenu="event.preventDefault();showTagEdit('${t.id}','${t.name.replace(/'/g,"\\'")}')">
      ${esc(t.name)} <span class="count">${tagCounts[t.id]||0}</span>
    </button>`;
  });
  h += `<button class="tag-tab" onclick="showNewTagInput()">＋ 新建</button>`;
  bar.innerHTML = h;
}

function switchTag(tagId) {
  _currentTag = tagId;
  filterImages(); renderGrid(); renderTagBar();
}

// ================================
//  UI: Masonry Grid
// ================================
function renderGrid() {
  const masonry = document.getElementById('masonry');
  const batch = _displayImages.slice(0, _shownCount + PAGE_SIZE);
  _shownCount = batch.length;

  if (batch.length === 0) {
    masonry.innerHTML = `<div class="empty-state">
      <div class="icon">🖼️</div>
      <div class="title">${_searchQuery ? '没有找到匹配的图' : '还没有图片'}</div>
      <div class="desc">${_searchQuery ? '换个关键词试试？' : '点右下角 ＋ 导入图片<br>画图台和聊天画的图也会自动出现'}</div>
    </div>`;
  } else {
    masonry.innerHTML = batch.map((item, idx) => cardHtml(item, idx)).join('');
  }
  document.getElementById('loadMore').style.display = _shownCount < _displayImages.length ? '' : 'none';
  lazyLoadThumbs();
}

function cardHtml(item, idx) {
  const p = item.prompt || item.note || '';
  const ps = p.length > 60 ? p.slice(0,60)+'...' : p;
  const src = item.source === 'draw' ? '<span class="g-card-source draw">画图台</span>'
    : item.source === 'chat' ? '<span class="g-card-source chat">聊天</span>'
    : '<span class="g-card-source imported">导入</span>';
  const sel = _selected.has(item.id) ? ' selected' : '';
  return `<div class="g-card${sel}" data-idx="${idx}" data-id="${item.id}" onclick="onCardClick(${idx},event)">
    <div class="sel-check">${_selected.has(item.id)?'✓':''}</div>
    <img data-id="${item.id}" data-source="${item.source}" loading="lazy" alt="">
    <button class="g-card-fav ${item.favorite?'on':''}" onclick="event.stopPropagation();onCardFav(${idx})">♥</button>
    ${ps ? `<div class="g-card-info"><div class="g-card-prompt">${esc(ps)}</div><div class="g-card-bottom"><span class="g-card-date">${fmtDate(item.createdAt)}</span>${src}</div></div>`
    : `<div class="g-card-info"><div class="g-card-bottom"><span class="g-card-date">${fmtDate(item.createdAt)}</span>${src}</div></div>`}
  </div>`;
}

function loadNextPage() {
  const masonry = document.getElementById('masonry');
  const start = _shownCount;
  const batch = _displayImages.slice(start, start + PAGE_SIZE);
  _shownCount = start + batch.length;
  batch.forEach((item, i) => {
    const div = document.createElement('div');
    div.innerHTML = cardHtml(item, start + i);
    masonry.appendChild(div.firstElementChild);
  });
  document.getElementById('loadMore').style.display = _shownCount < _displayImages.length ? '' : 'none';
  lazyLoadThumbs();
}

// Lazy thumbnails + recycling
let _thumbObserver, _recycleObserver;
function lazyLoadThumbs() {
  if (!_thumbObserver) {
    _thumbObserver = new IntersectionObserver(entries => {
      entries.forEach(en => {
        const img = en.target;
        if (en.isIntersecting) {
          if (img.src && img.src !== location.href) return;
          const item = _allImages.find(i => i.id === img.dataset.id);
          if (item) getThumbUrl(item).then(u => { if (u) img.src = u; });
        }
      });
    }, { root: document.getElementById('gridWrap'), rootMargin: '300px' });
  }
  if (!_recycleObserver) {
    _recycleObserver = new IntersectionObserver(entries => {
      entries.forEach(en => {
        if (!en.isIntersecting) {
          const img = en.target;
          if (img.src && img.src !== location.href) {
            img.removeAttribute('src');
            _thumbCache.delete(img.dataset.id);
          }
        }
      });
    }, { root: document.getElementById('gridWrap'), rootMargin: '1500px' });
  }
  document.querySelectorAll('.g-card img[data-id]').forEach(img => {
    _thumbObserver.observe(img);
    _recycleObserver.observe(img);
  });
}

// Card click
function onCardClick(idx, e) {
  if (_selectMode) {
    e.preventDefault();
    const item = _displayImages[idx];
    if (!item) return;
    if (_selected.has(item.id)) _selected.delete(item.id);
    else _selected.add(item.id);
    const card = document.querySelector(`.g-card[data-idx="${idx}"]`);
    if (card) {
      card.classList.toggle('selected', _selected.has(item.id));
      card.querySelector('.sel-check').textContent = _selected.has(item.id) ? '✓' : '';
    }
    document.getElementById('selCount').textContent = `已选 ${_selected.size} 张`;
  } else {
    openLightbox(idx);
  }
}

// Card favorite
async function onCardFav(idx) {
  const item = _displayImages[idx];
  if (!item) return;
  const nf = await toggleFavorite(item.id, item.source);
  const card = document.querySelector(`.g-card[data-idx="${idx}"] .g-card-fav`);
  if (card) card.classList.toggle('on', nf);
  toast(nf ? '已收藏 ❤️' : '取消收藏');
  renderTagBar();
}

// ================================
//  Multi-select mode
// ================================
function toggleSelectMode() {
  _selectMode = !_selectMode;
  _selected.clear();
  document.getElementById('masonry').classList.toggle('select-mode', _selectMode);
  document.getElementById('selBar').classList.toggle('show', _selectMode);
  document.getElementById('fab').style.display = _selectMode ? 'none' : '';
  document.getElementById('selCount').textContent = '已选 0 张';
  document.getElementById('headerTitle').textContent = _selectMode ? '选择图片' : '🖼️ 我们的画廊';
  // Clear selection UI
  document.querySelectorAll('.g-card.selected').forEach(c => {
    c.classList.remove('selected');
    c.querySelector('.sel-check').textContent = '';
  });
}

async function batchFav() {
  if (!_selected.size) { toast('先选几张图吧'); return; }
  for (const id of _selected) {
    const item = _allImages.find(i => i.id === id);
    if (item && !item.favorite) await toggleFavorite(item.id, item.source);
  }
  toast(`已收藏 ${_selected.size} 张 ❤️`);
  toggleSelectMode();
  renderTagBar();
}

async function batchTag() {
  if (!_selected.size) { toast('先选几张图吧'); return; }
  showTagPicker(null); // null = batch mode
}

// ================================
//  Lightbox
// ================================
async function openLightbox(idx) {
  _lbIndex = idx;
  const item = _displayImages[idx];
  if (!item) return;
  const lb = document.getElementById('lightbox');
  const img = document.getElementById('lbImg');
  img.src = ''; img.style.opacity = '0.3';
  lb.classList.add('show');
  document.body.style.overflow = 'hidden';
  updateLbInfo(item);
  updateLbCounter();
  const data = await getFullImageData(item);
  if (data) { img.src = data; img.style.opacity = '1'; }
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('show');
  document.body.style.overflow = '';
  document.getElementById('lbImg').src = '';
  _lbIndex = -1;
}

async function lbPrev(e) { e&&e.stopPropagation(); if (_lbIndex>0) await openLightbox(_lbIndex-1); }
async function lbNext(e) { e&&e.stopPropagation(); if (_lbIndex<_displayImages.length-1) await openLightbox(_lbIndex+1); }

function updateLbCounter() {
  document.getElementById('lbCounter').textContent = `${_lbIndex+1} / ${_displayImages.length}`;
}

async function updateLbInfo(item) {
  const promptText = item.prompt || item.note || '';
  document.getElementById('lbPrompt').textContent = promptText;
  document.getElementById('lbCopy').style.display = promptText ? '' : 'none';

  // Tags
  const allTags = await loadTags();
  const tagMap = {}; allTags.forEach(t => { tagMap[t.id] = t.name; });
  const tagsEl = document.getElementById('lbTags');
  tagsEl.innerHTML = (item.tags || []).map(tid => `<span class="lb-tag">${esc(tagMap[tid]||tid)}</span>`).join('');

  // Meta
  const meta = document.getElementById('lbMeta');
  let mh = `<span>${fmtDate(item.createdAt)}</span>`;
  if (item.source === 'draw') {
    mh += '<span>🎨 画图台</span>';
    if (item.personaName) mh += `<span>👤 ${esc(item.personaName)}</span>`;
    if (item.rating) mh += `<span>${'⭐'.repeat(item.rating)}</span>`;
    if (item.params && item.params.size) mh += `<span>📐 ${item.params.size}</span>`;
  } else if (item.source === 'chat') {
    mh += '<span>💬 聊天画图</span>';
  } else {
    mh += '<span>📥 导入</span>';
  }
  meta.innerHTML = mh;

  // Actions
  const acts = document.getElementById('lbActions');
  let ah = `<button class="lb-act" onclick="lbToggleFav()">${item.favorite?'❤️ 已收藏':'🤍 收藏'}</button>`;
  ah += `<button class="lb-act" onclick="lbTagPicker()">🏷️ 标签</button>`;
  ah += `<button class="lb-act" onclick="lbDownload()">💾 保存</button>`;
  if (item.source === 'imported') ah += `<button class="lb-act danger" onclick="lbDelete()">🗑️ 删除</button>`;
  acts.innerHTML = ah;
}

function copyPrompt() {
  const text = document.getElementById('lbPrompt').textContent;
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => toast('已复制 prompt 📋')).catch(() => {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
    toast('已复制 prompt 📋');
  });
}

async function lbToggleFav() {
  const item = _displayImages[_lbIndex]; if (!item) return;
  await toggleFavorite(item.id, item.source);
  item.favorite = !item.favorite;
  updateLbInfo(item); renderTagBar();
  const card = document.querySelector(`.g-card[data-idx="${_lbIndex}"] .g-card-fav`);
  if (card) card.classList.toggle('on', item.favorite);
  toast(item.favorite ? '已收藏 ❤️' : '取消收藏');
}

async function lbDownload() { const item = _displayImages[_lbIndex]; if (item) await downloadImage(item); }

async function lbDelete() {
  const item = _displayImages[_lbIndex];
  if (!item || item.source !== 'imported') return;
  if (!confirm('确定删除这张图片吗？')) return;
  await deleteImportedImage(item.id);
  filterImages(); closeLightbox(); renderGrid(); renderTagBar();
  toast('已删除');
}

function lbTagPicker() { showTagPicker(_displayImages[_lbIndex]); }

// Swipe
document.getElementById('lbImgWrap').addEventListener('touchstart', e => { _swipeStartX = e.touches[0].clientX; }, { passive: true });
document.getElementById('lbImgWrap').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - _swipeStartX;
  if (Math.abs(dx) > 50) { dx > 0 ? lbPrev() : lbNext(); }
});

// Keyboard
document.addEventListener('keydown', e => {
  if (_lbIndex < 0) return;
  if (e.key === 'ArrowLeft') lbPrev();
  else if (e.key === 'ArrowRight') lbNext();
  else if (e.key === 'Escape') closeLightbox();
});

// ================================
//  Search
// ================================
function toggleSearch() {
  const bar = document.getElementById('searchBar');
  bar.classList.toggle('show');
  if (bar.classList.contains('show')) {
    document.getElementById('searchInput').focus();
  } else {
    document.getElementById('searchInput').value = '';
    document.getElementById('monthFilter').value = '';
    _searchQuery = ''; _monthFilter = ''; filterImages(); renderGrid();
  }
}
function onSearchInput() {
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(() => {
    _searchQuery = document.getElementById('searchInput').value.trim();
    filterImages(); renderGrid();
  }, 300);
}
function onMonthFilter() {
  _monthFilter = document.getElementById('monthFilter').value;
  filterImages(); renderGrid();
}
function buildMonthOptions() {
  const months = new Set();
  for (const img of _allImages) {
    const d = new Date(img.createdAt);
    months.add(d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0'));
  }
  const sorted = [...months].sort().reverse();
  const sel = document.getElementById('monthFilter');
  sel.innerHTML = '<option value="">全部时间</option>' +
    sorted.map(m => {
      const [y, mo] = m.split('-');
      return `<option value="${m}"${m === _monthFilter ? ' selected' : ''}>${y}年${parseInt(mo)}月</option>`;
    }).join('');
}

// ================================
//  Import Modal
// ================================
function showImportModal() {
  _importFiles = [];
  document.getElementById('importPreview').innerHTML = '';
  document.getElementById('importBtn').disabled = true;
  document.getElementById('importFile').value = '';
  document.getElementById('importModal').classList.add('show');
}
function hideImportModal() { document.getElementById('importModal').classList.remove('show'); _importFiles = []; }

function onFilesSelected(e) {
  const files = Array.from(e.target.files || []);
  if (files.length) { _importFiles = files; renderImportPreview(); }
}

function renderImportPreview() {
  const c = document.getElementById('importPreview');
  c.innerHTML = '';
  const btn = document.getElementById('importBtn');
  btn.disabled = !_importFiles.length;
  btn.textContent = `导入 ${_importFiles.length} 张图片`;
  _importFiles.slice(0, 12).forEach(f => {
    const img = document.createElement('img');
    img.className = 'import-thumb'; img.src = URL.createObjectURL(f);
    c.appendChild(img);
  });
  if (_importFiles.length > 12) {
    const d = document.createElement('div');
    d.className = 'import-thumb';
    d.style.cssText = 'display:flex;align-items:center;justify-content:center;background:var(--bg2);font-size:13px;color:var(--text-mid)';
    d.textContent = `+${_importFiles.length-12}`;
    c.appendChild(d);
  }
}

async function doImport() {
  const btn = document.getElementById('importBtn');
  btn.disabled = true; btn.textContent = '导入中...';
  try {
    const count = await importImages(_importFiles);
    hideImportModal();
    toast(`成功导入 ${count} 张图片 💙`);
    await loadAllImages(); filterImages(); renderGrid(); renderTagBar();
  } catch (err) {
    toast('导入失败: ' + err.message);
    btn.disabled = false; btn.textContent = `导入 ${_importFiles.length} 张图片`;
  }
}

// Drag & drop
const iz = document.getElementById('importZone');
iz.addEventListener('dragover', e => { e.preventDefault(); iz.classList.add('dragover'); });
iz.addEventListener('dragleave', () => iz.classList.remove('dragover'));
iz.addEventListener('drop', e => {
  e.preventDefault(); iz.classList.remove('dragover');
  const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
  if (files.length) { _importFiles = files; renderImportPreview(); }
});

// Close modals on overlay
document.getElementById('importModal').addEventListener('click', e => { if (e.target === e.currentTarget) hideImportModal(); });
document.getElementById('tagModal').addEventListener('click', e => { if (e.target === e.currentTarget) hideTagModal(); });

// ================================
//  Tag Management
// ================================
function showNewTagInput() {
  const modal = document.getElementById('tagModal');
  document.getElementById('tagModalTitle').textContent = '新建标签';
  document.getElementById('tagModalContent').innerHTML = `
    <input class="tag-input" id="newTagName" placeholder="标签名称..." autofocus>
    <div class="tag-actions">
      <button onclick="hideTagModal()">取消</button>
      <button class="primary" onclick="doCreateTag()">创建</button>
    </div>`;
  modal.classList.add('show');
  setTimeout(() => { const i = document.getElementById('newTagName'); if (i) i.focus(); }, 300);
}

async function doCreateTag() {
  const name = document.getElementById('newTagName').value.trim();
  if (!name) { toast('请输入标签名称'); return; }
  await createTag(name);
  hideTagModal(); await renderTagBar();
  toast(`标签「${name}」已创建 🏷️`);
}

function showTagEdit(id, name) {
  const modal = document.getElementById('tagModal');
  document.getElementById('tagModalTitle').textContent = `管理标签「${name}」`;
  document.getElementById('tagModalContent').innerHTML = `
    <input class="tag-input" id="editTagName" value="${name}">
    <div class="tag-actions">
      <button style="border-color:rgba(255,80,80,.3);color:#e53935" onclick="doDeleteTag('${id}')">删除</button>
      <button onclick="hideTagModal()">取消</button>
      <button class="primary" onclick="doRenameTag('${id}')">保存</button>
    </div>`;
  modal.classList.add('show');
  setTimeout(() => { const i = document.getElementById('editTagName'); if (i) { i.focus(); i.select(); } }, 300);
}

async function doRenameTag(id) {
  const name = document.getElementById('editTagName').value.trim();
  if (!name) { toast('名称不能为空'); return; }
  await renameTag(id, name); hideTagModal(); await renderTagBar();
  toast('已重命名 ✨');
}

async function doDeleteTag(id) {
  if (!confirm('确定删除这个标签吗？（图片不会被删除）')) return;
  await deleteTag(id); hideTagModal();
  if (_currentTag === id) _currentTag = 'all';
  // Remove from in-memory
  _allImages.forEach(i => { if (i.tags) i.tags = i.tags.filter(t => t !== id); });
  filterImages(); renderGrid(); await renderTagBar();
  toast('标签已删除');
}

// Tag picker — multi-check for single image or batch
let _tagPickerItem = null; // null = batch mode
async function showTagPicker(item) {
  _tagPickerItem = item;
  const tags = await loadTags();
  const modal = document.getElementById('tagModal');
  const isBatch = !item;
  document.getElementById('tagModalTitle').textContent = isBatch
    ? `为 ${_selected.size} 张图片打标签` : '选择标签（可多选）';

  // Determine current tags
  const currentTags = isBatch ? [] : (item.tags || []);

  let h = '';
  tags.forEach(t => {
    const checked = currentTags.includes(t.id);
    h += `<div class="tag-check-item ${checked?'checked':''}" onclick="toggleTagCheck(this,'${t.id}')">
      <div class="check">${checked?'✓':''}</div>
      <span class="name">${esc(t.name)}</span>
    </div>`;
  });
  h += `<div style="margin-top:12px"><input class="tag-input" id="quickTagName" placeholder="或输入新标签名直接创建..."></div>`;
  h += `<div class="tag-actions" style="margin-top:12px">
    <button onclick="hideTagModal()">取消</button>
    <button class="primary" onclick="doApplyTags()">确定</button>
  </div>`;
  document.getElementById('tagModalContent').innerHTML = h;
  modal.classList.add('show');
}

function toggleTagCheck(el, tagId) {
  el.classList.toggle('checked');
  el.querySelector('.check').textContent = el.classList.contains('checked') ? '✓' : '';
}

async function doApplyTags() {
  // Collect checked tag IDs
  const checked = [];
  document.querySelectorAll('#tagModalContent .tag-check-item.checked').forEach(el => {
    const id = el.getAttribute('onclick').match(/'([^']+)'/)[1];
    checked.push(id);
  });
  // Quick-create tag if typed
  const quickName = document.getElementById('quickTagName').value.trim();
  if (quickName) {
    const newTag = await createTag(quickName);
    checked.push(newTag.id);
  }

  if (_tagPickerItem) {
    // Single image
    await setImageTags(_tagPickerItem.id, _tagPickerItem.source, checked);
    hideTagModal();
    if (_lbIndex >= 0) updateLbInfo(_displayImages[_lbIndex]);
  } else {
    // Batch mode
    for (const id of _selected) {
      const item = _allImages.find(i => i.id === id);
      if (item) {
        // Merge: add checked tags without removing existing ones
        const merged = [...new Set([...(item.tags||[]), ...checked])];
        await setImageTags(item.id, item.source, merged);
      }
    }
    hideTagModal();
    toggleSelectMode();
    toast(`已为 ${_selected.size || checked.length} 张图片打标签 🏷️`);
  }
  filterImages(); renderGrid(); renderTagBar();
}

function hideTagModal() {
  document.getElementById('tagModal').classList.remove('show');
  _tagPickerItem = null;
}

// ================================
//  Dark Mode
// ================================
function applyDark(on) {
  document.documentElement.classList.toggle('dark', on);
  document.getElementById('btnDark').innerHTML = on
    ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
    : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79Z"/></svg>';
}
function toggleDark() {
  const on = !document.documentElement.classList.contains('dark');
  localStorage.setItem('gallery_dark', on ? '1' : '0');
  applyDark(on);
}
(function initDark() {
  const saved = localStorage.getItem('gallery_dark');
  if (saved !== null) applyDark(saved === '1');
  else if (window.matchMedia('(prefers-color-scheme:dark)').matches) applyDark(true);
})();

// ================================
//  Navigation
// ================================
function goBack() {
  if (window.parent !== window) {
    window.parent.postMessage('closeOverlay', '*');
  } else if (document.referrer) {
    history.back();
  } else {
    location.href = 'index.html';
  }
}

// Scroll to load more
document.getElementById('gridWrap').addEventListener('scroll', function() {
  if (this.scrollTop + this.clientHeight >= this.scrollHeight - 200) {
    if (_shownCount < _displayImages.length) loadNextPage();
  }
});

// ================================
//  Init
// ================================
async function init() {
  try { _gdb = await openGalleryDB(); } catch(e) { console.error('GalleryDB:', e); }
  await loadAllImages();
  buildMonthOptions();
  filterImages(); renderGrid(); await renderTagBar();
}
init();
</script>
