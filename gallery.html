<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>我们的画廊</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --pink:#f48fb1;--pink-light:#fce4ec;--pink-deep:#e91e63;
  --apricot:#ffe0b2;--apricot-deep:#ffcc80;
  --bg:#fff8f3;--bg2:#fff0e8;--card:#ffffff;
  --text:#5d3a2e;--text-mid:#8d6e63;--text-light:#b0857a;
  --border:#f0ddd5;--shadow:0 2px 16px rgba(180,100,80,.09);
  --radius:18px;--radius-sm:12px;
  --header-h:56px;
}
html,body{height:100%;height:100svh;font-family:-apple-system,'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
.app{display:flex;flex-direction:column;height:100%;height:100svh;max-width:600px;margin:0 auto;position:relative}

/* ===== Header ===== */
.header{
  height:var(--header-h);display:flex;align-items:center;padding:0 14px;gap:10px;
  background:rgba(255,255,255,.85);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);flex-shrink:0;z-index:20;
  padding-top:env(safe-area-inset-top,0);
}
.btn-back{
  width:38px;height:38px;border-radius:50%;background:var(--pink-light);border:none;
  color:var(--pink-deep);font-size:20px;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-weight:700;line-height:1;
}
.btn-back:active{background:var(--pink);color:#fff}
.header-title{flex:1;font-size:15px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.btn-icon-sm{
  width:38px;height:38px;border-radius:50%;border:1.5px solid var(--border);
  background:var(--card);color:var(--text-mid);font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.btn-icon-sm:active{background:var(--pink-light);border-color:var(--pink);color:var(--pink-deep)}

/* ===== Search bar ===== */
.search-bar{
  overflow:hidden;max-height:0;transition:max-height .3s ease,padding .3s ease;
  padding:0 14px;background:var(--bg);
}
.search-bar.show{max-height:60px;padding:8px 14px 10px}
.search-input{
  width:100%;height:40px;border-radius:20px;border:1.5px solid var(--border);
  background:var(--card);padding:0 16px;font-size:14px;color:var(--text);
  outline:none;transition:border-color .2s;
}
.search-input::placeholder{color:var(--text-light)}
.search-input:focus{border-color:var(--pink)}

/* ===== Album tabs ===== */
.album-bar{
  display:flex;gap:8px;padding:10px 14px;overflow-x:auto;flex-shrink:0;
  -webkit-overflow-scrolling:touch;scrollbar-width:none;
}
.album-bar::-webkit-scrollbar{display:none}
.album-tab{
  flex-shrink:0;height:34px;padding:0 16px;border-radius:17px;border:1.5px solid var(--border);
  background:var(--card);color:var(--text-mid);font-size:13px;font-weight:600;
  cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:4px;
  transition:all .2s;
}
.album-tab.active{background:var(--pink-deep);color:#fff;border-color:var(--pink-deep)}
.album-tab:active{transform:scale(.95)}
.album-tab .count{
  font-size:11px;background:rgba(0,0,0,.08);border-radius:8px;padding:1px 6px;
  min-width:20px;text-align:center;
}
.album-tab.active .count{background:rgba(255,255,255,.25)}

/* ===== Grid container ===== */
.grid-wrap{
  flex:1;overflow-y:auto;padding:6px 14px 80px;-webkit-overflow-scrolling:touch;
}

/* ===== Masonry grid (CSS columns) ===== */
.masonry{
  column-count:2;column-gap:10px;
}
@media(min-width:400px){.masonry{column-count:3}}

/* ===== Gallery card ===== */
.g-card{
  break-inside:avoid;margin-bottom:10px;border-radius:var(--radius-sm);
  overflow:hidden;background:var(--card);box-shadow:var(--shadow);
  cursor:pointer;transition:transform .15s;position:relative;
}
.g-card:active{transform:scale(.97)}
.g-card img{
  width:100%;display:block;background:var(--bg2);min-height:60px;
}
.g-card-info{padding:8px 10px 10px}
.g-card-prompt{
  font-size:11px;color:var(--text-light);line-height:1.4;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
  overflow:hidden;word-break:break-all;
}
.g-card-bottom{display:flex;align-items:center;justify-content:space-between;margin-top:6px}
.g-card-date{font-size:10px;color:var(--text-light);opacity:.7}
.g-card-source{
  font-size:9px;padding:2px 6px;border-radius:6px;font-weight:600;
}
.g-card-source.draw{background:rgba(244,143,177,.2);color:var(--pink-deep)}
.g-card-source.imported{background:rgba(255,224,178,.4);color:#e65100}
.g-card-fav{
  position:absolute;top:8px;right:8px;width:30px;height:30px;border-radius:50%;
  background:rgba(0,0,0,.3);backdrop-filter:blur(4px);border:none;
  color:rgba(255,255,255,.7);font-size:14px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;z-index:2;
}
.g-card-fav.on{color:#ff1744;background:rgba(255,255,255,.85)}

/* ===== Empty state ===== */
.empty-state{
  text-align:center;padding:60px 20px;color:var(--text-light);
}
.empty-state .icon{font-size:48px;margin-bottom:16px;opacity:.6}
.empty-state .title{font-size:15px;font-weight:600;margin-bottom:8px;color:var(--text-mid)}
.empty-state .desc{font-size:13px;line-height:1.6}

/* ===== Load more ===== */
.load-more{
  text-align:center;padding:20px;
}
.load-more-btn{
  padding:10px 32px;border-radius:20px;border:1.5px solid var(--border);
  background:var(--card);color:var(--text-mid);font-size:13px;font-weight:600;
  cursor:pointer;transition:all .2s;
}
.load-more-btn:active{background:var(--pink-light);border-color:var(--pink);color:var(--pink-deep)}

/* ===== FAB ===== */
.fab{
  position:fixed;bottom:28px;right:max(14px,calc((100vw - 600px)/2 + 14px));
  width:52px;height:52px;border-radius:50%;
  background:linear-gradient(135deg,var(--pink),var(--pink-deep));
  color:#fff;font-size:24px;border:none;cursor:pointer;
  box-shadow:0 4px 20px rgba(233,30,99,.4);
  display:flex;align-items:center;justify-content:center;
  z-index:30;transition:transform .2s;
  padding-bottom:env(safe-area-inset-bottom,0);
}
.fab:active{transform:scale(.9)}

/* ===== Lightbox ===== */
.lightbox{
  position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:9999;
  display:flex;flex-direction:column;
  opacity:0;pointer-events:none;transition:opacity .25s;
}
.lightbox.show{opacity:1;pointer-events:auto}
.lb-top{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;padding-top:calc(12px + env(safe-area-inset-top,0));
  flex-shrink:0;
}
.lb-close{
  width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.12);
  border:none;color:#fff;font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.lb-counter{color:rgba(255,255,255,.6);font-size:13px}
.lb-img-wrap{
  flex:1;display:flex;align-items:center;justify-content:center;
  overflow:hidden;padding:0 8px;position:relative;
  touch-action:pan-y pinch-zoom;
}
.lb-img-wrap img{
  max-width:100%;max-height:100%;object-fit:contain;border-radius:4px;
  transition:opacity .2s;user-select:none;-webkit-user-drag:none;
}
.lb-nav{
  position:absolute;top:50%;transform:translateY(-50%);width:40px;height:40px;
  border-radius:50%;background:rgba(255,255,255,.1);border:none;color:#fff;
  font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  z-index:2;
}
.lb-nav:active{background:rgba(255,255,255,.25)}
.lb-nav.prev{left:8px}
.lb-nav.next{right:8px}
.lb-bottom{
  flex-shrink:0;padding:12px 16px;padding-bottom:calc(12px + env(safe-area-inset-bottom,0));
  background:rgba(0,0,0,.6);backdrop-filter:blur(12px);max-height:40vh;overflow-y:auto;
}
.lb-prompt{color:rgba(255,255,255,.85);font-size:13px;line-height:1.6;word-break:break-all;margin-bottom:8px}
.lb-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
.lb-meta span{font-size:11px;color:rgba(255,255,255,.5)}
.lb-actions{display:flex;gap:8px;flex-wrap:wrap}
.lb-act{
  height:36px;padding:0 14px;border-radius:18px;border:1px solid rgba(255,255,255,.2);
  background:rgba(255,255,255,.08);color:rgba(255,255,255,.85);font-size:12px;
  cursor:pointer;display:flex;align-items:center;gap:5px;white-space:nowrap;
}
.lb-act:active{background:rgba(255,255,255,.2)}
.lb-act.danger{border-color:rgba(255,80,80,.3);color:#ff8a80}

/* ===== Modal / overlay ===== */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;
  display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .25s;
}
.modal-overlay.show{opacity:1;pointer-events:auto}
.modal{
  width:100%;max-width:600px;background:var(--card);
  border-radius:var(--radius) var(--radius) 0 0;
  padding:20px 20px calc(20px + env(safe-area-inset-bottom,0));
  max-height:80vh;overflow-y:auto;
  transform:translateY(100%);transition:transform .3s ease;
}
.modal-overlay.show .modal{transform:translateY(0)}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px;color:var(--text)}
.modal-close{
  position:absolute;top:16px;right:16px;width:30px;height:30px;border-radius:50%;
  background:var(--bg2);border:none;color:var(--text-mid);font-size:16px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
}

/* ===== Import modal ===== */
.import-zone{
  border:2px dashed var(--border);border-radius:var(--radius-sm);
  padding:32px 16px;text-align:center;cursor:pointer;
  transition:border-color .2s,background .2s;margin-bottom:16px;
}
.import-zone:hover,.import-zone.dragover{border-color:var(--pink);background:var(--pink-light)}
.import-zone .icon{font-size:36px;margin-bottom:8px;opacity:.5}
.import-zone .text{font-size:13px;color:var(--text-mid)}
.import-preview{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.import-thumb{
  width:72px;height:72px;border-radius:10px;object-fit:cover;
  border:2px solid var(--border);
}
.import-btn{
  width:100%;height:44px;border-radius:22px;border:none;
  background:linear-gradient(135deg,var(--pink),var(--pink-deep));
  color:#fff;font-size:14px;font-weight:700;cursor:pointer;
  transition:opacity .2s;
}
.import-btn:active{opacity:.8}
.import-btn:disabled{opacity:.4;cursor:default}

/* ===== Album modal ===== */
.album-list-item{
  display:flex;align-items:center;gap:12px;padding:12px;
  border-radius:var(--radius-sm);cursor:pointer;transition:background .15s;
}
.album-list-item:active{background:var(--bg2)}
.album-list-item.active{background:var(--pink-light)}
.album-list-item .name{flex:1;font-size:14px;font-weight:600}
.album-list-item .cnt{font-size:12px;color:var(--text-light)}
.album-input{
  width:100%;height:44px;border-radius:var(--radius-sm);border:1.5px solid var(--border);
  background:var(--card);padding:0 14px;font-size:14px;color:var(--text);
  outline:none;margin-bottom:12px;
}
.album-input:focus{border-color:var(--pink)}
.album-actions{display:flex;gap:8px}
.album-actions button{
  flex:1;height:40px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;
  border:1.5px solid var(--border);background:var(--card);color:var(--text-mid);
  transition:all .2s;
}
.album-actions button.primary{
  background:var(--pink-deep);color:#fff;border-color:var(--pink-deep);
}
.album-actions button:active{transform:scale(.97)}

/* ===== Toast ===== */
.toast{
  position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);
  background:rgba(60,30,20,.9);color:#fff;padding:10px 22px;border-radius:20px;
  font-size:13px;font-weight:500;z-index:10000;
  opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ===== Loading ===== */
.loading{text-align:center;padding:40px;color:var(--text-light);font-size:13px}

/* ===== 暗夜模式 ===== */
html.dark{
  --bg:#1a1015;--bg2:#221520;--card:#261820;
  --text:#f0dde0;--text-mid:#c0a0a8;--text-light:#8a6878;
  --border:#3a2530;--shadow:0 2px 16px rgba(0,0,0,.4);
}
html.dark body{background:var(--bg)}
html.dark .header{background:rgba(30,15,20,.85)}
html.dark .search-input{background:var(--bg2);border-color:var(--border)}
html.dark .album-tab{background:var(--bg2);border-color:var(--border);color:var(--text-mid)}
html.dark .album-tab.active{background:var(--pink-deep);color:#fff;border-color:var(--pink-deep)}
html.dark .g-card{background:var(--card)}
html.dark .g-card img{background:var(--bg2)}
html.dark .g-card-fav{background:rgba(255,255,255,.1)}
html.dark .g-card-fav.on{background:rgba(255,26,68,.2);color:#ff1744}
html.dark .modal{background:var(--card)}
html.dark .import-zone{border-color:var(--border)}
html.dark .import-zone:hover,.import-zone.dragover{border-color:var(--pink);background:rgba(244,143,177,.1)}
html.dark .album-input{background:var(--bg2)}
html.dark .album-list-item:active{background:var(--bg)}
html.dark .album-list-item.active{background:rgba(244,143,177,.15)}
html.dark .load-more-btn{background:var(--bg2);border-color:var(--border);color:var(--text-mid)}
html.dark .fab{box-shadow:0 4px 20px rgba(233,30,99,.25)}
</style>
</head>
<body>
<div class="app">
  <!-- Header -->
  <div class="header">
    <button class="btn-back" onclick="goBack()">‹</button>
    <div class="header-title">🖼️ 我们的画廊</div>
    <button class="btn-icon-sm" id="btnSearch" onclick="toggleSearch()" title="搜索">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/></svg>
    </button>
    <button class="btn-icon-sm" id="btnDark" onclick="toggleDark()" title="暗夜模式">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79Z"/></svg>
    </button>
  </div>

  <!-- Search -->
  <div class="search-bar" id="searchBar">
    <input class="search-input" id="searchInput" type="text" placeholder="搜索 prompt 关键词..." oninput="onSearchInput()">
  </div>

  <!-- Album tabs -->
  <div class="album-bar" id="albumBar">
    <!-- Rendered by JS -->
  </div>

  <!-- Grid -->
  <div class="grid-wrap" id="gridWrap">
    <div class="masonry" id="masonry">
      <!-- Cards rendered by JS -->
    </div>
    <div class="load-more" id="loadMore" style="display:none">
      <button class="load-more-btn" onclick="loadNextPage()">加载更多 ✨</button>
    </div>
    <div class="loading" id="loadingEl" style="display:none">加载中...</div>
  </div>
</div>

<!-- FAB -->
<button class="fab" onclick="showImportModal()">＋</button>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <div class="lb-top">
    <button class="lb-close" onclick="closeLightbox()">✕</button>
    <span class="lb-counter" id="lbCounter"></span>
    <div style="width:36px"></div>
  </div>
  <div class="lb-img-wrap" id="lbImgWrap">
    <button class="lb-nav prev" onclick="lbPrev(event)">‹</button>
    <img id="lbImg" src="" alt="">
    <button class="lb-nav next" onclick="lbNext(event)">›</button>
  </div>
  <div class="lb-bottom" id="lbBottom">
    <div class="lb-prompt" id="lbPrompt"></div>
    <div class="lb-meta" id="lbMeta"></div>
    <div class="lb-actions" id="lbActions"></div>
  </div>
</div>

<!-- Import modal -->
<div class="modal-overlay" id="importModal">
  <div class="modal">
    <div class="modal-title">导入图片</div>
    <div class="import-zone" id="importZone" onclick="document.getElementById('importFile').click()">
      <div class="icon">📷</div>
      <div class="text">点击选择图片 或 拖放到这里</div>
    </div>
    <input type="file" id="importFile" accept="image/*" multiple style="display:none" onchange="onFilesSelected(event)">
    <div class="import-preview" id="importPreview"></div>
    <button class="import-btn" id="importBtn" disabled onclick="doImport()">导入选中的图片</button>
    <div style="height:12px"></div>
    <button class="import-btn" style="background:var(--bg2);color:var(--text-mid)" onclick="hideImportModal()">取消</button>
  </div>
</div>

<!-- Album picker modal (for assigning images) -->
<div class="modal-overlay" id="albumModal">
  <div class="modal" style="position:relative">
    <div class="modal-title" id="albumModalTitle">选择相册</div>
    <div id="albumModalContent"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// =============================
//  炘也和兔宝的画廊 💙
// =============================

// ===== Config =====
const PAGE_SIZE = 20;
const THUMB_SIZE = 300;
const MAX_IMG_SIZE = 1500;
const IMG_QUALITY = 0.8;
const THUMB_QUALITY = 0.6;

// ===== State =====
let _galleryDB = null;
let _drawDB = null;
let _allImages = [];      // merged sorted array of metadata
let _displayImages = [];   // after filter/search
let _shownCount = 0;
let _currentAlbum = 'all'; // 'all' | 'fav' | albumId
let _searchQuery = '';
let _searchTimer = null;
let _lbIndex = -1;
let _importFiles = [];     // pending files for import
let _swipeStartX = 0;

// ===== Utilities =====
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8) }
function fmtDate(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
}
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2000);
}

// ===== IndexedDB: GalleryDB =====
function openGalleryDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('GalleryDB', 1);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('images')) {
        const s = db.createObjectStore('images', { keyPath: 'id' });
        s.createIndex('byAlbum', 'albumId', { unique: false });
        s.createIndex('byDate', 'createdAt', { unique: false });
      }
      if (!db.objectStoreNames.contains('albums')) {
        db.createObjectStore('albums', { keyPath: 'id' });
      }
      if (!db.objectStoreNames.contains('drawMeta')) {
        const dm = db.createObjectStore('drawMeta', { keyPath: 'drawId' });
        dm.createIndex('byAlbum', 'albumId', { unique: false });
      }
    };
    req.onsuccess = e => resolve(e.target.result);
    req.onerror = e => reject(e.target.error);
  });
}

// ===== IndexedDB: DrawDB (read-only) =====
function openDrawDBReadOnly() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('DrawDB', 4);
    req.onupgradeneeded = e => {
      // Abort! We don't want to create/modify stores in DrawDB
      e.target.transaction.abort();
      reject(new Error('DrawDB not found or version mismatch'));
    };
    req.onsuccess = e => resolve(e.target.result);
    req.onerror = e => reject(e.target.error);
  });
}

// ===== Load all DrawDB images (metadata only, no imageData) =====
async function loadDrawImagesMeta() {
  try {
    if (!_drawDB) _drawDB = await openDrawDBReadOnly();
  } catch { return []; }
  return new Promise((resolve, reject) => {
    const tx = _drawDB.transaction('gallery', 'readonly');
    const store = tx.objectStore('gallery');
    const results = [];
    const req = store.openCursor();
    req.onsuccess = e => {
      const cursor = e.target.result;
      if (cursor) {
        const v = cursor.value;
        results.push({
          id: v.id,
          source: 'draw',
          prompt: v.prompt || '',
          negPrompt: v.negPrompt || '',
          personaName: v.personaName || null,
          rating: v.rating || 0,
          tags: v.tags || [],
          createdAt: v.createdAt || 0,
          params: v.params || {},
          // No imageData — load on demand
        });
        cursor.continue();
      } else {
        resolve(results);
      }
    };
    req.onerror = e => reject(e.target.error);
  });
}

// ===== Load single DrawDB image's full data =====
async function loadDrawImageData(id) {
  try {
    if (!_drawDB) _drawDB = await openDrawDBReadOnly();
  } catch { return null; }
  return new Promise((resolve, reject) => {
    const tx = _drawDB.transaction('gallery', 'readonly');
    const req = tx.objectStore('gallery').get(id);
    req.onsuccess = e => {
      const v = e.target.result;
      resolve(v ? v.imageData : null);
    };
    req.onerror = e => reject(e.target.error);
  });
}

// ===== Load DrawDB thumbnail (downscale at display time) =====
// For DrawDB images we load the full data lazily into an <img>, relying on
// the browser to handle display.  To save memory we generate a small thumbnail
// URL via canvas when the card scrolls into view.
const _thumbCache = new Map();

async function getThumbUrl(item) {
  if (item.source === 'imported') return item.thumbnail || item.imageData;
  if (_thumbCache.has(item.id)) return _thumbCache.get(item.id);
  // Load full data
  const data = await loadDrawImageData(item.id);
  if (!data) return '';
  // Downscale to thumbnail
  const thumb = await resizeImage(data, THUMB_SIZE, THUMB_QUALITY);
  _thumbCache.set(item.id, thumb);
  return thumb;
}

// ===== Merge & sort all images =====
async function loadAllImages() {
  document.getElementById('loadingEl').style.display = '';
  const [drawImages, importedImages, drawMetaMap] = await Promise.all([
    loadDrawImagesMeta(),
    loadImportedImages(),
    loadDrawMeta(),
  ]);
  // Apply draw metadata
  drawImages.forEach(img => {
    const meta = drawMetaMap[img.id];
    if (meta) {
      img.albumId = meta.albumId || null;
      img.favorite = !!meta.favorite;
    } else {
      img.albumId = null;
      img.favorite = false;
    }
  });
  // Ensure imported images have favorite field
  importedImages.forEach(img => {
    img.favorite = !!img.favorite;
  });
  // Merge and sort by date (newest first)
  _allImages = [...drawImages, ...importedImages].sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
  document.getElementById('loadingEl').style.display = 'none';
}

// ===== Filter images by album & search =====
function filterImages() {
  let list = _allImages;
  // Filter by album
  if (_currentAlbum === 'fav') {
    list = list.filter(i => i.favorite);
  } else if (_currentAlbum !== 'all') {
    list = list.filter(i => i.albumId === _currentAlbum);
  }
  // Filter by search
  if (_searchQuery) {
    const q = _searchQuery.toLowerCase();
    list = list.filter(i => {
      const prompt = (i.prompt || '').toLowerCase();
      const note = (i.note || '').toLowerCase();
      const persona = (i.personaName || '').toLowerCase();
      const tags = (i.tags || []).join(' ').toLowerCase();
      return prompt.includes(q) || note.includes(q) || persona.includes(q) || tags.includes(q);
    });
  }
  _displayImages = list;
  _shownCount = 0;
}

// ===== Image compression =====
function resizeImage(dataUrl, maxSize, quality) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      let w = img.width, h = img.height;
      if (w > maxSize || h > maxSize) {
        const ratio = Math.min(maxSize / w, maxSize / h);
        w = Math.round(w * ratio);
        h = Math.round(h * ratio);
      }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', quality));
    };
    img.onerror = () => resolve(dataUrl);
    img.src = dataUrl;
  });
}

function fileToDataUrl(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// ===== Import images =====
async function importImages(files) {
  if (!_galleryDB) _galleryDB = await openGalleryDB();
  const items = [];
  for (const file of files) {
    const raw = await fileToDataUrl(file);
    const imageData = await resizeImage(raw, MAX_IMG_SIZE, IMG_QUALITY);
    const thumbnail = await resizeImage(raw, THUMB_SIZE, THUMB_QUALITY);
    const item = {
      id: uid(),
      imageData,
      thumbnail,
      note: '',
      albumId: null,
      favorite: false,
      createdAt: file.lastModified || Date.now(),
    };
    items.push(item);
  }
  // Save to DB
  const tx = _galleryDB.transaction('images', 'readwrite');
  const store = tx.objectStore('images');
  for (const item of items) store.put(item);
  await new Promise((res, rej) => { tx.oncomplete = res; tx.onerror = rej; });
  return items.length;
}

async function deleteAlbum(id) {
  if (!_galleryDB) _galleryDB = await openGalleryDB();
  // Remove album
  const tx1 = _galleryDB.transaction('albums', 'readwrite');
  tx1.objectStore('albums').delete(id);
  await new Promise((res, rej) => { tx1.oncomplete = res; tx1.onerror = rej; });
  // Unassign images from this album
  const tx2 = _galleryDB.transaction(['images', 'drawMeta'], 'readwrite');
  const imgStore = tx2.objectStore('images');
  const dmStore = tx2.objectStore('drawMeta');
  // Images
  const imgReq = imgStore.index('byAlbum').openCursor(IDBKeyRange.only(id));
  imgReq.onsuccess = e => {
    const c = e.target.result;
    if (c) { c.value.albumId = null; imgStore.put(c.value); c.continue(); }
  };
  // Draw meta
  const dmReq = dmStore.index('byAlbum').openCursor(IDBKeyRange.only(id));
  dmReq.onsuccess = e => {
    const c = e.target.result;
    if (c) { c.value.albumId = null; dmStore.put(c.value); c.continue(); }
  };
  await new Promise((res, rej) => { tx2.oncomplete = res; tx2.onerror = rej; });
}

// ===== Assign image to album =====
async function assignToAlbum(imageId, source, albumId) {
  if (!_galleryDB) _galleryDB = await openGalleryDB();
  if (source === 'imported') {
    const tx = _galleryDB.transaction('images', 'readwrite');
    const store = tx.objectStore('images');
    const item = await new Promise(r => { const req = store.get(imageId); req.onsuccess = () => r(req.result); });
    if (item) { item.albumId = albumId; store.put(item); }
    await new Promise((res, rej) => { tx.oncomplete = res; tx.onerror = rej; });
  } else {
    const tx = _galleryDB.transaction('drawMeta', 'readwrite');
    const store = tx.objectStore('drawMeta');
    const existing = await new Promise(r => { const req = store.get(imageId); req.onsuccess = () => r(req.result); });
    const meta = existing || { drawId: imageId, albumId: null, favorite: false };
    meta.albumId = albumId;
    store.put(meta);
    await new Promise((res, rej) => { tx.oncomplete = res; tx.onerror = rej; });
  }
  // Update in-memory
  const img = _allImages.find(i => i.id === imageId);
  if (img) img.albumId = albumId;
}

// ===== Toggle favorite =====
async function toggleFavorite(imageId, source) {
  if (!_galleryDB) _galleryDB = await openGalleryDB();
  let newFav;
  if (source === 'imported') {
    const tx = _galleryDB.transaction('images', 'readwrite');
    const store = tx.objectStore('images');
    const item = await new Promise(r => { const req = store.get(imageId); req.onsuccess = () => r(req.result); });
    if (item) { item.favorite = !item.favorite; newFav = item.favorite; store.put(item); }
    await new Promise((res, rej) => { tx.oncomplete = res; tx.onerror = rej; });
  } else {
    const tx = _galleryDB.transaction('drawMeta', 'readwrite');
    const store = tx.objectStore('drawMeta');
    const existing = await new Promise(r => { const req = store.get(imageId); req.onsuccess = () => r(req.result); });
    const meta = existing || { drawId: imageId, albumId: null, favorite: false };
    meta.favorite = !meta.favorite;
    newFav = meta.favorite;
    store.put(meta);
    await new Promise((res, rej) => { tx.oncomplete = res; tx.onerror = rej; });
  }
  // Update in-memory
  const img = _allImages.find(i => i.id === imageId);
  if (img) img.favorite = newFav;
  return newFav;
}

// ===== Render masonry grid =====
function renderGrid() {
  const masonry = document.getElementById('masonry');
  const batch = _displayImages.slice(0, _shownCount + PAGE_SIZE);
  _shownCount = batch.length;

  let html = '';
  if (batch.length === 0) {
    html = `<div class="empty-state">
      <div class="icon">🖼️</div>
      <div class="title">${_searchQuery ? '没有找到匹配的图' : '还没有图片'}</div>
      <div class="desc">${_searchQuery ? '换个关键词试试？' : '点右下角 ＋ 导入你的图片<br>画图台的图也会自动出现哦'}</div>
    </div>`;
  } else {
    batch.forEach((item, idx) => {
      const promptText = item.prompt || item.note || '';
      const promptSnippet = promptText.length > 60 ? promptText.slice(0, 60) + '...' : promptText;
      const sourceLabel = item.source === 'draw'
        ? '<span class="g-card-source draw">画图台</span>'
        : '<span class="g-card-source imported">导入</span>';
      html += `<div class="g-card" onclick="openLightbox(${idx})" data-idx="${idx}">
        <img data-id="${item.id}" data-source="${item.source}" loading="lazy" alt="">
        <button class="g-card-fav ${item.favorite ? 'on' : ''}" onclick="event.stopPropagation();onCardFav(${idx})">♥</button>
        ${promptSnippet ? `<div class="g-card-info">
          <div class="g-card-prompt">${esc(promptSnippet)}</div>
          <div class="g-card-bottom">
            <span class="g-card-date">${fmtDate(item.createdAt)}</span>
            ${sourceLabel}
          </div>
        </div>` : `<div class="g-card-info"><div class="g-card-bottom"><span class="g-card-date">${fmtDate(item.createdAt)}</span>${sourceLabel}</div></div>`}
      </div>`;
    });
  }

  masonry.innerHTML = html;

  // Show/hide load more
  const loadMoreEl = document.getElementById('loadMore');
  loadMoreEl.style.display = _shownCount < _displayImages.length ? '' : 'none';

  // Lazy-load thumbnails via IntersectionObserver
  lazyLoadThumbs();
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function loadNextPage() {
  const masonry = document.getElementById('masonry');
  const start = _shownCount;
  const batch = _displayImages.slice(start, start + PAGE_SIZE);
  _shownCount = start + batch.length;

  batch.forEach((item, i) => {
    const idx = start + i;
    const promptText = item.prompt || item.note || '';
    const promptSnippet = promptText.length > 60 ? promptText.slice(0, 60) + '...' : promptText;
    const sourceLabel = item.source === 'draw'
      ? '<span class="g-card-source draw">画图台</span>'
      : '<span class="g-card-source imported">导入</span>';
    const card = document.createElement('div');
    card.className = 'g-card';
    card.setAttribute('data-idx', idx);
    card.onclick = () => openLightbox(idx);
    card.innerHTML = `
      <img data-id="${item.id}" data-source="${item.source}" loading="lazy" alt="">
      <button class="g-card-fav ${item.favorite ? 'on' : ''}" onclick="event.stopPropagation();onCardFav(${idx})">♥</button>
      ${promptSnippet ? `<div class="g-card-info">
        <div class="g-card-prompt">${esc(promptSnippet)}</div>
        <div class="g-card-bottom">
          <span class="g-card-date">${fmtDate(item.createdAt)}</span>
          ${sourceLabel}
        </div>
      </div>` : `<div class="g-card-info"><div class="g-card-bottom"><span class="g-card-date">${fmtDate(item.createdAt)}</span>${sourceLabel}</div></div>`}`;
    masonry.appendChild(card);
  });

  document.getElementById('loadMore').style.display = _shownCount < _displayImages.length ? '' : 'none';
  lazyLoadThumbs();
}

// ===== Lazy thumbnail loading =====
let _thumbObserver;
function lazyLoadThumbs() {
  if (!_thumbObserver) {
    _thumbObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const img = entry.target;
          const id = img.dataset.id;
          const source = img.dataset.source;
          if (img.src && img.src !== location.href) return; // already loaded
          const item = _allImages.find(i => i.id === id);
          if (!item) return;
          getThumbUrl(item).then(url => {
            if (url) img.src = url;
          });
          _thumbObserver.unobserve(img);
        }
      });
    }, { rootMargin: '200px' });
  }
  document.querySelectorAll('.g-card img[data-id]').forEach(img => {
    if (!img.src || img.src === location.href) _thumbObserver.observe(img);
  });
}

// ===== Card favorite toggle =====
async function onCardFav(idx) {
  const item = _displayImages[idx];
  if (!item) return;
  const newFav = await toggleFavorite(item.id, item.source);
  // Update button
  const card = document.querySelector(`.g-card[data-idx="${idx}"] .g-card-fav`);
  if (card) card.classList.toggle('on', newFav);
  toast(newFav ? '已收藏 ❤️' : '取消收藏');
  renderAlbumBar();
}

// ================================
//  Lightbox
// ================================
async function openLightbox(idx) {
  _lbIndex = idx;
  const item = _displayImages[idx];
  if (!item) return;

  const lb = document.getElementById('lightbox');
  const img = document.getElementById('lbImg');

  // Show lightbox first with loading state
  img.src = '';
  img.style.opacity = '0.3';
  lb.classList.add('show');
  document.body.style.overflow = 'hidden';

  updateLbInfo(item);
  updateLbCounter();

  // Load full image
  let data;
  if (item.source === 'imported') {
    data = item.imageData;
  } else {
    data = await loadDrawImageData(item.id);
  }
  if (data) {
    img.src = data;
    img.style.opacity = '1';
  }
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('show');
  document.body.style.overflow = '';
  document.getElementById('lbImg').src = '';
  _lbIndex = -1;
}

async function lbPrev(e) {
  e && e.stopPropagation();
  if (_lbIndex <= 0) return;
  await openLightbox(_lbIndex - 1);
}

async function lbNext(e) {
  e && e.stopPropagation();
  if (_lbIndex >= _displayImages.length - 1) return;
  await openLightbox(_lbIndex + 1);
}

function updateLbCounter() {
  document.getElementById('lbCounter').textContent = `${_lbIndex + 1} / ${_displayImages.length}`;
}

function updateLbInfo(item) {
  // Prompt
  document.getElementById('lbPrompt').textContent = item.prompt || item.note || '';

  // Meta
  const meta = document.getElementById('lbMeta');
  let metaHtml = `<span>${fmtDate(item.createdAt)}</span>`;
  if (item.source === 'draw') {
    metaHtml += `<span>🎨 画图台</span>`;
    if (item.personaName) metaHtml += `<span>👤 ${esc(item.personaName)}</span>`;
    if (item.rating) metaHtml += `<span>${'⭐'.repeat(item.rating)}</span>`;
    if (item.params && item.params.size) metaHtml += `<span>📐 ${item.params.size}</span>`;
  } else {
    metaHtml += `<span>📥 导入</span>`;
  }
  meta.innerHTML = metaHtml;

  // Actions
  const acts = document.getElementById('lbActions');
  let actHtml = `
    <button class="lb-act" onclick="lbToggleFav()">
      ${item.favorite ? '❤️ 已收藏' : '🤍 收藏'}
    </button>
    <button class="lb-act" onclick="lbAssignAlbum()">📁 相册</button>
    <button class="lb-act" onclick="lbDownload()">💾 保存</button>
  `;
  if (item.source === 'imported') {
    actHtml += `<button class="lb-act danger" onclick="lbDelete()">🗑️ 删除</button>`;
  }
  acts.innerHTML = actHtml;
}

async function lbToggleFav() {
  const item = _displayImages[_lbIndex];
  if (!item) return;
  await toggleFavorite(item.id, item.source);
  item.favorite = !item.favorite;
  updateLbInfo(item);
  renderAlbumBar();
  // Also update card in grid
  const card = document.querySelector(`.g-card[data-idx="${_lbIndex}"] .g-card-fav`);
  if (card) card.classList.toggle('on', item.favorite);
  toast(item.favorite ? '已收藏 ❤️' : '取消收藏');
}

async function lbDownload() {
  const item = _displayImages[_lbIndex];
  if (item) await downloadImage(item);
}

async function lbDelete() {
  const item = _displayImages[_lbIndex];
  if (!item || item.source !== 'imported') return;
  if (!confirm('确定删除这张图片吗？')) return;
  await deleteImportedImage(item.id);
  filterImages();
  closeLightbox();
  renderGrid();
  renderAlbumBar();
  toast('已删除');
}

function lbAssignAlbum() {
  showAlbumPicker(_displayImages[_lbIndex]);
}

    const more = document.createElement('div');
    more.className = 'import-thumb';
    more.style.cssText = 'display:flex;align-items:center;justify-content:center;background:var(--bg2);font-size:13px;color:var(--text-mid)';
    more.textContent = `+${_importFiles.length - 12}`;
    container.appendChild(more);
  }
}

async function doImport() {
  const btn = document.getElementById('importBtn');
  btn.disabled = true;
  btn.textContent = '导入中...';
  try {
    const count = await importImages(_importFiles);
    hideImportModal();
    toast(`成功导入 ${count} 张图片 💙`);
    await loadAllImages();
    filterImages();
    renderGrid();
    renderAlbumBar();
  } catch (err) {
    toast('导入失败: ' + err.message);
    btn.disabled = false;
    btn.textContent = `导入 ${_importFiles.length} 张图片`;
  }
}

// Drag & drop
const importZone = document.getElementById('importZone');
importZone.addEventListener('dragover', e => { e.preventDefault(); importZone.classList.add('dragover'); });
importZone.addEventListener('dragleave', () => importZone.classList.remove('dragover'));
importZone.addEventListener('drop', e => {
  e.preventDefault();
  importZone.classList.remove('dragover');
  const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
  if (files.length) {
    _importFiles = files;
    renderImportPreview();
  }
});

// Close modals on overlay click
document.getElementById('importModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) hideImportModal();
});
document.getElementById('albumModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) hideAlbumModal();
});

// ================================
//  Album Management
// ================================
function showNewAlbumInput() {
  const modal = document.getElementById('albumModal');
  document.getElementById('albumModalTitle').textContent = '新建相册';
  document.getElementById('albumModalContent').innerHTML = `
    <input class="album-input" id="newAlbumName" placeholder="相册名称..." autofocus>
    <div class="album-actions">
      <button onclick="hideAlbumModal()">取消</button>
      <button class="primary" onclick="doCreateAlbum()">创建</button>
    </div>
  `;
  modal.classList.add('show');
  setTimeout(() => { const inp = document.getElementById('newAlbumName'); if (inp) inp.focus(); }, 300);
}

async function doCreateAlbum() {
  const name = document.getElementById('newAlbumName').value.trim();
  if (!name) { toast('请输入相册名称'); return; }
  await createAlbum(name);
  hideAlbumModal();
  await renderAlbumBar();
  toast(`相册「${name}」已创建 📁`);
}

function showAlbumEdit(id, name) {
  const modal = document.getElementById('albumModal');
  document.getElementById('albumModalTitle').textContent = `管理相册「${name}」`;
  document.getElementById('albumModalContent').innerHTML = `
    <input class="album-input" id="editAlbumName" value="${name}">
    <div class="album-actions">
      <button style="border-color:rgba(255,80,80,.3);color:#e53935" onclick="doDeleteAlbum('${id}')">删除</button>
      <button onclick="hideAlbumModal()">取消</button>
      <button class="primary" onclick="doRenameAlbum('${id}')">保存</button>
    </div>
  `;
  modal.classList.add('show');
  setTimeout(() => { const inp = document.getElementById('editAlbumName'); if (inp) { inp.focus(); inp.select(); } }, 300);
}

async function doRenameAlbum(id) {
  const name = document.getElementById('editAlbumName').value.trim();
  if (!name) { toast('名称不能为空'); return; }
  await renameAlbum(id, name);
  hideAlbumModal();
  await renderAlbumBar();
  toast('已重命名 ✨');
}

async function doDeleteAlbum(id) {
  if (!confirm('确定删除这个相册吗？（图片不会被删除）')) return;
  await deleteAlbum(id);
  hideAlbumModal();
  if (_currentAlbum === id) _currentAlbum = 'all';
  filterImages();
  renderGrid();
  await renderAlbumBar();
  toast('相册已删除');
}

// ===== Album picker (assign image to album) =====
let _albumPickerItem = null;
async function showAlbumPicker(item) {
  if (!item) return;
  _albumPickerItem = item;
  const albums = await loadAlbums();
  const modal = document.getElementById('albumModal');
  document.getElementById('albumModalTitle').textContent = '归入相册';
  let html = `<div class="album-list-item ${!item.albumId ? 'active' : ''}" onclick="doAssignAlbum(null)">
    <span class="name">不归入任何相册</span>
  </div>`;
  albums.forEach(a => {
    html += `<div class="album-list-item ${item.albumId === a.id ? 'active' : ''}" onclick="doAssignAlbum('${a.id}')">
      <span class="name">${esc(a.name)}</span>
    </div>`;
  });
  document.getElementById('albumModalContent').innerHTML = html;
  modal.classList.add('show');
}

async function doAssignAlbum(albumId) {
  if (!_albumPickerItem) return;
  await assignToAlbum(_albumPickerItem.id, _albumPickerItem.source, albumId);
  hideAlbumModal();
  filterImages();
  renderGrid();
  renderAlbumBar();
  // Update lightbox if open
  if (_lbIndex >= 0) updateLbInfo(_displayImages[_lbIndex]);
  toast(albumId ? '已归入相册 📁' : '已移出相册');
}

function hideAlbumModal() {
  document.getElementById('albumModal').classList.remove('show');
  _albumPickerItem = null;
}

// ================================
//  Dark Mode
// ================================
function applyDark(on) {
  document.documentElement.classList.toggle('dark', on);
  document.getElementById('btnDark').innerHTML = on
    ? `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>`
    : `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79Z"/></svg>`;
}
function toggleDark() {
  const on = !document.documentElement.classList.contains('dark');
  localStorage.setItem('gallery_dark', on ? '1' : '0');
  applyDark(on);
}
(function initDark() {
  const saved = localStorage.getItem('gallery_dark');
  if (saved !== null) {
    applyDark(saved === '1');
  } else if (window.matchMedia('(prefers-color-scheme:dark)').matches) {
    applyDark(true);
  }
})();

// ================================
//  Navigation
// ================================
function goBack() {
  if (window.parent !== window) {
    window.parent.postMessage('closeOverlay', '*');
  } else if (document.referrer) {
    history.back();
  } else {
    location.href = 'index.html';
  }
}

// ===== Scroll to load more =====
document.getElementById('gridWrap').addEventListener('scroll', function() {
  const el = this;
  if (el.scrollTop + el.clientHeight >= el.scrollHeight - 200) {
    if (_shownCount < _displayImages.length) {
      loadNextPage();
    }
  }
});

// ================================
//  Init
// ================================
async function init() {
  try {
    _galleryDB = await openGalleryDB();
  } catch (err) {
    console.error('GalleryDB error:', err);
  }
  await loadAllImages();
  filterImages();
  renderGrid();
  await renderAlbumBar();
}

init();
</script>
